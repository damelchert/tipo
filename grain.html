<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipo — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipo — Grain</title>
<link rel="stylesheet" href="shared/style.css">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js"></script>
<script src="shared/ui.js"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
</style>
</head>
<body>
<div class="tipo-panel" id="panel">
  <h1>Grain <span style="display:flex;gap:8px;"><a href="index.html#visual" class="back-link">VISUAL TOOLS</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section"><div class="section-title">Image</div>
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Upload Image</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <div style="font-size:10px;color:var(--text-5);text-align:center;">or drag &amp; drop onto canvas</div>
  </div>

  <div class="section"><div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('film')">Film</span>
      <span class="preset-chip" onclick="applyPreset('heavy')">Heavy</span>
      <span class="preset-chip" onclick="applyPreset('subtle')">Subtle</span>
      <span class="preset-chip" onclick="applyPreset('vintage')">Vintage</span>
      <span class="preset-chip" onclick="applyPreset('colorNoise')">Color Noise</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section"><div class="section-title">Grain</div>
    <div class="range-row"><span class="range-label">Density</span><input type="range" id="density" min="0" max="100" value="40"><span class="range-value" id="densityVal">40</span></div>
    <div class="range-row"><span class="range-label">Size</span><input type="range" id="grainSize" min="1" max="10" value="2"><span class="range-value" id="grainSizeVal">2</span></div>
    <div class="range-row"><span class="range-label">Opacity</span><input type="range" id="opacity" min="0" max="100" value="60"><span class="range-value" id="opacityVal">60</span></div>
    <label class="checkbox-label"><input type="checkbox" id="monochrome" checked> Monochrome</label>
  </div>

  <div class="section"><div class="section-title">Color</div>
    <div class="color-section-row"><span class="range-label">Grain Tint</span><input type="color" id="grainTint" value="#ffffff"></div>
  </div>

  <div class="section section-divider"><div class="section-title">Export</div>
    <div class="btn-row"><button class="btn" onclick="savePNG()">PNG</button></div>
  </div>
  <div style="height:40px;"></div>
</div>
<div id="canvasContainer"></div>
<div class="tipo-toast" id="toast"></div>
<script>
let font, sourceImg = null;

function createDefaultImage() {
  const g = createGraphics(640, 480);
  for (let y = 0; y < 480; y++) {
    const t = y / 480;
    g.stroke(lerpColor(color('#ff6600'), color('#000033'), t));
    g.line(0, y, 640, y);
  }
  g.textSize(60); g.fill(255); g.textAlign(CENTER, CENTER);
  g.text('DROP IMAGE', 320, 240);
  return g;
}

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }

function setup() {
  const c = createCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
  c.parent('canvasContainer');
  textFont(font);
  pixelDensity(1);
  sourceImg = createDefaultImage();
  TipoUI.init({ mode: 'grain', formatters: {} });

  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      loadImage(url, img => { sourceImg = img; });
    }
  });

  const container = document.getElementById('canvasContainer');
  container.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      loadImage(url, img => { sourceImg = img; });
    }
  });
  container.addEventListener('dragover', e => e.preventDefault());
}

function windowResized() {
  resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
}

function val(id) { return TipoUI.val(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

function draw() {
  background(0);
  if (!sourceImg) return;

  // Draw source image fitted to canvas
  const scale = Math.min(width / sourceImg.width, height / sourceImg.height);
  const w = sourceImg.width * scale;
  const h = sourceImg.height * scale;
  const x = (width - w) / 2;
  const y = (height - h) / 2;
  image(sourceImg, x, y, w, h);

  // Grain overlay
  const dens = val('density') / 100;
  const gs = val('grainSize');
  const opa = val('opacity') / 100 * 255;
  const mono = document.getElementById('monochrome').checked;
  const tintC = color(document.getElementById('grainTint').value);

  const numDots = floor(width * height * dens * 0.005);
  noStroke();

  for (let i = 0; i < numDots; i++) {
    const gx = random(x, x + w);
    const gy = random(y, y + h);

    if (mono) {
      const bright = random(255);
      const r = red(tintC) * bright / 255;
      const g = green(tintC) * bright / 255;
      const b = blue(tintC) * bright / 255;
      fill(r, g, b, random(opa * 0.5, opa));
    } else {
      fill(random(255), random(255), random(255), random(opa * 0.5, opa));
    }
    rect(gx, gy, gs, gs);
  }

  TipoUI.captureFrame();
}

function resetAll() {
  setVal('density', 40); setVal('grainSize', 2); setVal('opacity', 60);
  document.getElementById('monochrome').checked = true;
  document.getElementById('grainTint').value = '#ffffff';
}

const PRESETS = {
  film: () => { resetAll(); setVal('density', 50); setVal('grainSize', 1); setVal('opacity', 40); },
  heavy: () => { resetAll(); setVal('density', 90); setVal('grainSize', 3); setVal('opacity', 80); },
  subtle: () => { resetAll(); setVal('density', 20); setVal('grainSize', 1); setVal('opacity', 25); },
  vintage: () => { resetAll(); setVal('density', 60); setVal('grainSize', 2); setVal('opacity', 50); document.getElementById('grainTint').value = '#e8d5a3'; },
  colorNoise: () => { resetAll(); setVal('density', 70); setVal('grainSize', 2); setVal('opacity', 55); document.getElementById('monochrome').checked = false; },
};

function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body></html>
