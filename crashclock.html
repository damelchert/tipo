<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — CrashClock</title>
<link rel="stylesheet" href="shared/style.css">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js"></script>
<script src="shared/ui.js"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="tipo-panel" id="panel">
  <h1>CrashClock <span style="display:flex;gap:8px;"><a href="index.html#kinetic" class="back-link">KINETIC TYPE</a><a href="index.html" class="back-link">HOME</a></span></h1>
  <div class="section"><div class="section-title">Text</div><input type="text" id="textInput" value="TIPÓ" placeholder="Type here..."></div>
  <div class="section"><div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('classic')">Classic</span>
      <span class="preset-chip" onclick="applyPreset('chaos')">Chaos</span>
      <span class="preset-chip" onclick="applyPreset('slow')">Slow</span>
      <span class="preset-chip" onclick="applyPreset('tiny')">Tiny</span>
      <span class="preset-chip" onclick="applyPreset('pride')">Pride</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>
  <div class="section"><div class="section-title">Animation</div>
    <div class="range-row"><span class="range-label">Font Size</span><input type="range" id="fontSize" min="10" max="100" value="30"><span class="range-value" id="fontSizeVal">30</span></div>
    <div class="range-row"><span class="range-label">Gravity</span><input type="range" id="gravity" min="1" max="100" value="40"><span class="range-value" id="gravityVal">40</span></div>
    <div class="range-row"><span class="range-label">Clock Scale</span><input type="range" id="clockScale" min="10" max="100" value="50"><span class="range-value" id="clockScaleVal">50</span></div>
    <div class="range-row"><span class="range-label">Speed</span><input type="range" id="speed" min="1" max="100" value="50"><span class="range-value" id="speedVal">50</span></div>
  </div>
  <div class="section"><div class="section-title">Color</div>
    <div class="color-section-row"><span class="range-label">Text</span><input type="color" id="typeColor" value="#ffffff"><button class="swap-btn" onclick="swapColors()" title="Swap">&#8646;</button><input type="color" id="bgColor" value="#000000"><span class="range-label">Bg</span></div>
  </div>
  <div class="section section-divider"><div class="section-title">Export</div><div class="btn-row"><button class="btn" onclick="savePNG()">PNG</button><button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button></div><div class="record-timer" id="recTimer"></div></div>
  <div style="height:40px;"></div>
</div>
<div id="canvasContainer"></div>
<div class="tipo-progress-overlay" id="exportProgress"><div class="progress-box"><div class="progress-title" id="progressTitle">Finalizing...</div><div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div><div class="progress-info" id="progressInfo"></div></div></div>
<div class="tipo-toast" id="toast"></div>
<script>
let font, recorder;
let prideMode = false;
const prideColors = ['#e70000','#ff8c00','#ffef00','#00811f','#0044ff','#760089'];
let nums = [];

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }
function setup() {
  const c = createCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
  c.parent('canvasContainer'); textFont(font); pixelDensity(1);
  TipoUI.init({ mode: 'crashclock', formatters: {} }); recorder = TipoUI.recorder;
  initNums();
}
function windowResized() { resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight); }
function val(id) { return TipoUI.val(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

function initNums() {
  nums = [];
  const r = min(width, height) * 0.3;
  for (let i = 1; i <= 12; i++) {
    const a = map(i, 0, 12, 0, TWO_PI) - HALF_PI;
    nums.push({ n: i, hx: cos(a)*r, hy: sin(a)*r, x: cos(a)*r, y: sin(a)*r, vx: 0, vy: 0 });
  }
}

function draw() {
  background(document.getElementById('bgColor').value);
  const fSize = val('fontSize');
  const grav = val('gravity') * 0.008;
  const cScale = val('clockScale') / 50;
  const spd = val('speed') / 50;
  const txtC = document.getElementById('typeColor').value;
  const cx = width/2, cy = height/2;
  const radius = min(width, height) * 0.3 * cScale;

  // Time
  const now = new Date();
  const s = now.getSeconds() + now.getMilliseconds()/1000;
  const m = now.getMinutes() + s/60;
  const h = (now.getHours() % 12) + m/60;

  // Update number physics
  for (let n of nums) {
    n.vy += grav * spd;
    n.vx *= 0.99; n.vy *= 0.99;
    n.x += n.vx * spd; n.y += n.vy * spd;
    // Contain within circle
    const d = dist(n.x, n.y, 0, 0);
    if (d > radius - fSize*0.5) {
      const ang = atan2(n.y, n.x);
      n.x = cos(ang) * (radius - fSize*0.5);
      n.y = sin(ang) * (radius - fSize*0.5);
      const dot = n.vx*cos(ang) + n.vy*sin(ang);
      n.vx -= 2*dot*cos(ang)*0.6;
      n.vy -= 2*dot*sin(ang)*0.6;
    }
  }

  push(); translate(cx, cy);

  // Clock circle
  noFill(); stroke(txtC); strokeWeight(1.5);
  ellipse(0, 0, radius*2, radius*2);

  // Hands
  strokeWeight(3); stroke(txtC);
  // Hour
  const ha = map(h, 0, 12, 0, TWO_PI) - HALF_PI;
  line(0, 0, cos(ha)*radius*0.5, sin(ha)*radius*0.5);
  // Minute
  strokeWeight(2);
  const ma = map(m, 0, 60, 0, TWO_PI) - HALF_PI;
  line(0, 0, cos(ma)*radius*0.7, sin(ma)*radius*0.7);
  // Second
  strokeWeight(1); stroke(prideMode ? prideColors[0] : '#ff4444');
  const sa = map(s, 0, 60, 0, TWO_PI) - HALF_PI;
  line(0, 0, cos(sa)*radius*0.8, sin(sa)*radius*0.8);

  // Numbers
  noStroke(); textSize(fSize); textAlign(CENTER, CENTER);
  for (let i = 0; i < nums.length; i++) {
    const n = nums[i];
    const col = prideMode ? color(prideColors[i % 6]) : color(txtC);
    fill(col);
    text(n.n, n.x, n.y);
  }
  pop();

  // Title text at bottom
  const title = document.getElementById('textInput').value || 'TIPÓ';
  textSize(fSize * 0.6); textAlign(CENTER, CENTER); noStroke();
  fill(prideMode ? color(prideColors[3]) : color(txtC));
  text(title, cx, cy + radius + fSize * 1.5);

  TipoUI.captureFrame();
}

function swapColors() { TipoUI.swapColors('typeColor', 'bgColor'); }
function resetAll() { prideMode = false; setVal('fontSize',30);setVal('gravity',40);setVal('clockScale',50);setVal('speed',50); document.getElementById('typeColor').value='#ffffff';document.getElementById('bgColor').value='#000000'; initNums(); }
const PRESETS = {
  classic: () => { resetAll(); setVal('clockScale',60);setVal('gravity',20);setVal('fontSize',24); },
  chaos: () => { resetAll(); setVal('gravity',100);setVal('speed',100);setVal('fontSize',40); },
  slow: () => { resetAll(); setVal('gravity',10);setVal('speed',15);setVal('clockScale',70); },
  tiny: () => { resetAll(); setVal('fontSize',14);setVal('clockScale',30);setVal('gravity',30); document.getElementById('bgColor').value='#0a0a20'; },
  pride: () => { prideMode = true; },
};
function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
async function toggleRec() { await TipoUI.toggleRec(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body></html>
