<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipo — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipo — Duotone</title>
<link rel="stylesheet" href="shared/style.css">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js"></script>
<script src="shared/ui.js"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
</style>
</head>
<body>
<div class="tipo-panel" id="panel">
  <h1>Duotone <span style="display:flex;gap:8px;"><a href="index.html#visual" class="back-link">VISUAL TOOLS</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section"><div class="section-title">Image</div>
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Upload Image</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <div style="font-size:10px;color:var(--text-5);text-align:center;">or drag &amp; drop onto canvas</div>
  </div>

  <div class="section"><div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('midnight')">Midnight</span>
      <span class="preset-chip" onclick="applyPreset('sunset')">Sunset</span>
      <span class="preset-chip" onclick="applyPreset('ocean')">Ocean</span>
      <span class="preset-chip" onclick="applyPreset('forest')">Forest</span>
      <span class="preset-chip" onclick="applyPreset('neon')">Neon</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section"><div class="section-title">Colors</div>
    <div class="color-section-row"><span class="range-label">Shadow</span><input type="color" id="shadowColor" value="#000033"><button class="swap-btn" onclick="swapColors()" title="Swap">&#8646;</button><input type="color" id="highlightColor" value="#ff6600"><span class="range-label">Highlight</span></div>
  </div>

  <div class="section"><div class="section-title">Adjustments</div>
    <div class="range-row"><span class="range-label">Contrast</span><input type="range" id="contrast" min="0" max="100" value="50"><span class="range-value" id="contrastVal">50</span></div>
    <div class="range-row"><span class="range-label">Brightness</span><input type="range" id="brightness" min="0" max="100" value="50"><span class="range-value" id="brightnessVal">50</span></div>
    <div class="range-row"><span class="range-label">Threshold</span><input type="range" id="threshold" min="0" max="100" value="50"><span class="range-value" id="thresholdVal">50</span></div>
  </div>

  <div class="section section-divider"><div class="section-title">Export</div>
    <div class="btn-row"><button class="btn" onclick="savePNG()">PNG</button></div>
  </div>
  <div style="height:40px;"></div>
</div>
<div id="canvasContainer"></div>
<div class="tipo-toast" id="toast"></div>
<script>
let font, sourceImg = null;
let processed = null;

function createDefaultImage() {
  const g = createGraphics(640, 480);
  for (let y = 0; y < 480; y++) {
    const t = y / 480;
    g.stroke(lerpColor(color('#ff6600'), color('#000033'), t));
    g.line(0, y, 640, y);
  }
  g.textSize(60); g.fill(255); g.textAlign(CENTER, CENTER);
  g.text('DROP IMAGE', 320, 240);
  return g;
}

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }

function setup() {
  const c = createCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
  c.parent('canvasContainer');
  textFont(font);
  pixelDensity(1);
  sourceImg = createDefaultImage();
  processed = createGraphics(sourceImg.width, sourceImg.height);
  TipoUI.init({ mode: 'duotone', formatters: {} });

  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      loadImage(url, img => {
        sourceImg = img;
        processed = createGraphics(img.width, img.height);
      });
    }
  });

  const container = document.getElementById('canvasContainer');
  container.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      loadImage(url, img => {
        sourceImg = img;
        processed = createGraphics(img.width, img.height);
      });
    }
  });
  container.addEventListener('dragover', e => e.preventDefault());
}

function windowResized() {
  resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
}

function val(id) { return TipoUI.val(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

function draw() {
  background(0);
  if (!sourceImg) return;

  const shadowC = color(document.getElementById('shadowColor').value);
  const highlightC = color(document.getElementById('highlightColor').value);
  const cont = val('contrast') / 50;
  const bright = (val('brightness') - 50) * 2.55;
  const thresh = val('threshold') / 100;

  // Process image
  processed.image(sourceImg, 0, 0, processed.width, processed.height);
  processed.loadPixels();

  for (let i = 0; i < processed.pixels.length; i += 4) {
    // Grayscale
    let gray = processed.pixels[i] * 0.299 + processed.pixels[i+1] * 0.587 + processed.pixels[i+2] * 0.114;

    // Brightness
    gray = gray + bright;

    // Contrast
    gray = ((gray - 128) * cont) + 128;

    // Clamp
    gray = constrain(gray, 0, 255);

    // Threshold shift: push midtones toward shadows or highlights
    let t = gray / 255;
    t = pow(t, 1 + (0.5 - thresh) * 2);
    t = constrain(t, 0, 1);

    // Map to duotone
    const c = lerpColor(shadowC, highlightC, t);
    processed.pixels[i] = red(c);
    processed.pixels[i+1] = green(c);
    processed.pixels[i+2] = blue(c);
  }
  processed.updatePixels();

  // Draw fitted
  const scale = Math.min(width / processed.width, height / processed.height);
  const w = processed.width * scale;
  const h = processed.height * scale;
  const x = (width - w) / 2;
  const y = (height - h) / 2;
  image(processed, x, y, w, h);

  TipoUI.captureFrame();
}

function swapColors() { TipoUI.swapColors('shadowColor', 'highlightColor'); }

function resetAll() {
  setVal('contrast', 50); setVal('brightness', 50); setVal('threshold', 50);
  document.getElementById('shadowColor').value = '#000033';
  document.getElementById('highlightColor').value = '#ff6600';
}

const PRESETS = {
  midnight: () => { resetAll(); document.getElementById('shadowColor').value = '#000033'; document.getElementById('highlightColor').value = '#4488ff'; setVal('contrast', 60); },
  sunset: () => { resetAll(); document.getElementById('shadowColor').value = '#1a0011'; document.getElementById('highlightColor').value = '#ff6600'; setVal('contrast', 55); setVal('brightness', 55); },
  ocean: () => { resetAll(); document.getElementById('shadowColor').value = '#001122'; document.getElementById('highlightColor').value = '#00ccaa'; setVal('contrast', 50); },
  forest: () => { resetAll(); document.getElementById('shadowColor').value = '#0a1a00'; document.getElementById('highlightColor').value = '#88cc22'; setVal('contrast', 45); },
  neon: () => { resetAll(); document.getElementById('shadowColor').value = '#0f001a'; document.getElementById('highlightColor').value = '#ff00ff'; setVal('contrast', 70); setVal('brightness', 45); },
};

function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body></html>
