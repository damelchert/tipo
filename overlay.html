<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Overlay Generator. Seamless procedural textures for design.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Overlay Generator</title>
<link rel="stylesheet" href="shared/style.css?v=20260612-bhv">
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js?v=20260612-cap"></script>
<script src="shared/ui.js?v=20260702-tl"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasWrap { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: var(--bg-0); }
  #canvasWrap canvas { image-rendering: pixelated; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
  .tile-preview { position: absolute; bottom: 16px; right: 16px; border: 1px solid var(--border-2); border-radius: 4px; overflow: hidden; background: #888; }
  .tile-preview canvas { display: block; }
  .tile-label { position: absolute; bottom: 0; left: 0; right: 0; text-align: center; font-size: 8px; color: #fff; background: rgba(0,0,0,0.6); padding: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .drop-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-5); letter-spacing: 2px; pointer-events: none; text-transform: uppercase; }
  .size-row { display: flex; gap: 6px; align-items: center; }
  .size-row select { flex: 1; background: var(--bg-2); color: var(--text-1); border: 1px solid var(--border-2); padding: 6px; font-size: 11px; font-family: var(--font-ui); }
</style>
</head>
<body>

<div class="tipo-panel" id="panel">
  <h1>Overlays <span style="display:flex;gap:8px;"><a href="index.html#visual" class="back-link">VISUAL TOOLS</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">
    <div class="section-title">Source</div>
    <div class="btn-row">
      <button class="btn" onclick="document.getElementById('fileInput').click()">Upload</button>
      <button class="btn btn-secondary" id="webcamBtn" onclick="toggleWebcam()">Webcam</button>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
  </div>

  <div class="section">
    <div class="section-title">Pattern</div>
    <select id="pattern" style="width:100%;background:var(--bg-2);color:var(--text-1);border:1px solid var(--border-2);padding:6px;font-size:11px;font-family:var(--font-ui);">
      <option value="film-grain">Film Grain</option>
      <option value="fine-noise">Fine Noise</option>
      <option value="paper">Paper Texture</option>
      <option value="linen">Linen / Fabric</option>
      <option value="halftone">Halftone Dots</option>
      <option value="grid">Grid Lines</option>
      <option value="crosshatch">Crosshatch</option>
      <option value="scanlines">Scanlines</option>
      <option value="stipple">Stipple</option>
      <option value="concrete">Concrete / Rough</option>
      <option value="dust">Dust & Scratches</option>
      <option value="canvas-weave">Canvas Weave</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('subtle')">Subtle</span>
      <span class="preset-chip" onclick="applyPreset('medium')">Medium</span>
      <span class="preset-chip" onclick="applyPreset('heavy')">Heavy</span>
      <span class="preset-chip" onclick="applyPreset('photo')">Photo Film</span>
      <span class="preset-chip" onclick="applyPreset('print')">Print</span>
      <span class="preset-chip" onclick="applyPreset('digital')">Digital</span>
      <span class="preset-chip" onclick="applyPreset('vintage')">Vintage</span>
      <span class="preset-chip" onclick="applyPreset('editorial')">Editorial</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Texture</div>
    <div class="range-row"><span class="range-label">Density</span><input type="range" id="density" min="1" max="100" value="50"><span class="range-value" id="densityVal">50</span></div>
    <div class="range-row"><span class="range-label">Scale</span><input type="range" id="scale" min="1" max="100" value="50"><span class="range-value" id="scaleVal">50</span></div>
    <div class="range-row"><span class="range-label">Opacity</span><input type="range" id="opacity" min="1" max="100" value="30"><span class="range-value" id="opacityVal">30</span></div>
    <div class="range-row"><span class="range-label">Roughness</span><input type="range" id="roughness" min="0" max="100" value="50"><span class="range-value" id="roughnessVal">50</span></div>
    <div class="range-row"><span class="range-label">Contrast</span><input type="range" id="contrast" min="0" max="100" value="50"><span class="range-value" id="contrastVal">50</span></div>
    <label class="checkbox-label"><input type="checkbox" id="monochrome" checked> Monochrome</label>
    <label class="checkbox-label"><input type="checkbox" id="invert"> Invert</label>
  </div>

  <div class="section">
    <div class="section-title">Output</div>
    <div class="size-row">
      <select id="tileSize">
        <option value="256">256 × 256</option>
        <option value="512" selected>512 × 512</option>
        <option value="1024">1024 × 1024</option>
        <option value="2048">2048 × 2048</option>
      </select>
    </div>
    <div class="color-section-row" style="margin-top:8px">
      <span class="range-label">Base</span>
      <input type="color" id="baseColor" value="#808080">
    </div>
    <label class="checkbox-label"><input type="checkbox" id="transparent" checked> Transparent background</label>
  </div>

  <div class="section section-divider">
    <div class="section-title">Export</div>
    <div class="btn-row">
      <button class="btn" onclick="exportPNG()">PNG</button>
      <button class="btn" onclick="exportTile()">Tile PNG</button>
      <button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button>
    </div>
    <div class="record-timer" id="recTimer"></div>
    <div style="font-size:9px;color:var(--text-5);margin-top:6px">PNG = composite • Tile = seamless pattern • MP4 = video</div>
  </div>
  <div style="height:40px;"></div>
</div>

<div id="canvasWrap">
  <div class="drop-hint" id="dropHint">Drop image or video here</div>
  <canvas id="mainCanvas"></canvas>
  <div class="tile-preview">
    <canvas id="tilePreview" width="200" height="200"></canvas>
    <div class="tile-label">Tile Preview (3×3)</div>
  </div>
</div>

<script>
// ============================================================
// TIPÓ — OVERLAY GENERATOR
// Professional seamless procedural texture generator.
// Image/Video/Webcam + overlay compositing + MP4 recording.
// ============================================================
const mainCanvas = document.getElementById('mainCanvas');
const mainCtx = mainCanvas.getContext('2d');
const tileCanvas = document.getElementById('tilePreview');
const tileCtx = tileCanvas.getContext('2d');

// Overlay texture buffer (generated once, composited each frame)
let overlayBuffer = null;
let overlayDirty = true;

// Source management
let sourceImg = null;
let sourceVideo = null;
let webcamStream = null;
let sourceType = null; // null | 'image' | 'video' | 'webcam'
let recorder = null;
let animFrame = null;

let seed = Math.random() * 10000;

let mediaUrl = null; // object URL of current video file (revoked on replace)

function setMediaUrl(url) {
  if (mediaUrl) URL.revokeObjectURL(mediaUrl);
  mediaUrl = url;
}

function releaseVideo() {
  if (!sourceVideo) return;
  sourceVideo.pause();
  sourceVideo.srcObject = null;
  sourceVideo.removeAttribute('src');
  sourceVideo.load(); // release decoder
  sourceVideo = null;
}

function handleFile(file) {
  document.getElementById('dropHint').style.display = 'none';
  if (file.type.startsWith('image/')) {
    if (webcamStream) { webcamStream.getTracks().forEach(t => t.stop()); webcamStream = null; }
    releaseVideo();
    setMediaUrl(null);
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); sourceImg = img; sourceType = 'image'; stopLoop(); renderComposite(); };
    img.onerror = () => URL.revokeObjectURL(url);
    img.src = url;
  } else if (file.type.startsWith('video/')) {
    if (webcamStream) { webcamStream.getTracks().forEach(t => t.stop()); webcamStream = null; }
    releaseVideo();
    const url = URL.createObjectURL(file);
    setMediaUrl(url);
    const vid = document.createElement('video');
    vid.src = url;
    vid.loop = true; vid.muted = true; vid.playsInline = true;
    vid.play();
    sourceVideo = vid; sourceImg = null; sourceType = 'video';
    document.getElementById('webcamBtn').textContent = 'Webcam';
    document.getElementById('webcamBtn').style.borderColor = '';
    startLoop();
  }
}

function toggleWebcam() {
  if (webcamStream) {
    webcamStream.getTracks().forEach(t => t.stop());
    webcamStream = null;
    releaseVideo();
    sourceType = sourceImg ? 'image' : null;
    stopLoop(); renderComposite();
    document.getElementById('webcamBtn').textContent = 'Webcam';
    document.getElementById('webcamBtn').style.borderColor = '';
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
    .then(stream => {
      webcamStream = stream;
      releaseVideo();
      setMediaUrl(null);
      const vid = document.createElement('video');
      vid.srcObject = stream; vid.muted = true; vid.playsInline = true;
      vid.play();
      sourceVideo = vid; sourceType = 'webcam';
      document.getElementById('dropHint').style.display = 'none';
      document.getElementById('webcamBtn').textContent = 'Stop Cam';
      document.getElementById('webcamBtn').style.borderColor = 'var(--red)';
      startLoop();
    })
    .catch(err => {
      console.error('Webcam error:', err);
      const btn = document.getElementById('webcamBtn');
      btn.textContent = 'Cam denied';
      setTimeout(() => { btn.textContent = 'Webcam'; }, 2000);
    });
}

function getCurrentFrame() {
  if ((sourceType === 'video' || sourceType === 'webcam') && sourceVideo) return sourceVideo;
  return sourceImg;
}

function startLoop() {
  if (animFrame) return;
  function loop() {
    renderComposite();
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

function stopLoop() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// Seeded random for reproducibility
function seededRandom(x, y) {
  const n = Math.sin(x * 12.9898 + y * 78.233 + seed) * 43758.5453;
  return n - Math.floor(n);
}

// 2D value noise (seamless tileable)
function valueNoise(x, y, size) {
  const ix = Math.floor(x) % size;
  const iy = Math.floor(y) % size;
  const fx = x - Math.floor(x);
  const fy = y - Math.floor(y);

  const ix1 = (ix + 1) % size;
  const iy1 = (iy + 1) % size;

  const v00 = seededRandom(ix, iy);
  const v10 = seededRandom(ix1, iy);
  const v01 = seededRandom(ix, iy1);
  const v11 = seededRandom(ix1, iy1);

  // Smoothstep interpolation
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);

  const a = v00 + sx * (v10 - v00);
  const b = v01 + sx * (v11 - v01);
  return a + sy * (b - a);
}

// Fractal noise (multiple octaves, seamless)
function fractalNoise(x, y, size, octaves, roughness) {
  let val = 0, amp = 1, freq = 1, max = 0;
  for (let o = 0; o < octaves; o++) {
    val += valueNoise(x * freq, y * freq, size * freq) * amp;
    max += amp;
    amp *= roughness;
    freq *= 2;
  }
  return val / max;
}

function val(id) { return Number(document.getElementById(id).value); }
function chk(id) { return document.getElementById(id).checked; }

// Composite: source image + overlay texture
function renderComposite() {
  const frame = getCurrentFrame();
  const wrap = document.getElementById('canvasWrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  if (mainCanvas.width !== w || mainCanvas.height !== h) {
    mainCanvas.width = w;
    mainCanvas.height = h;
  }

  mainCtx.fillStyle = '#000';
  mainCtx.fillRect(0, 0, w, h);

  // Draw source frame
  if (frame) {
    const sw = frame.videoWidth || frame.naturalWidth || frame.width;
    const sh = frame.videoHeight || frame.naturalHeight || frame.height;
    if (sw && sh) {
      const sc = Math.min(w / sw, h / sh);
      const dw = sw * sc, dh = sh * sc;
      const ox = (w - dw) / 2, oy = (h - dh) / 2;
      mainCtx.drawImage(frame, ox, oy, dw, dh);
    }
  }

  // Generate overlay if dirty
  if (overlayDirty || !overlayBuffer) {
    generateOverlay();
    overlayDirty = false;
  }

  // Tile overlay across canvas
  if (overlayBuffer) {
    const blendOpac = val('opacity') / 100;
    mainCtx.globalAlpha = blendOpac;
    mainCtx.globalCompositeOperation = 'source-over';
    for (let ty = 0; ty < h; ty += overlayBuffer.height) {
      for (let tx = 0; tx < w; tx += overlayBuffer.width) {
        mainCtx.drawImage(overlayBuffer, tx, ty);
      }
    }
    mainCtx.globalAlpha = 1;
  }

  // Recording
  if (recorder && recorder.isRecording) recorder.captureFrame();

  updateTilePreview();
}

// Generate overlay texture buffer (tileable)
function generateOverlay() {
  const size = Number(document.getElementById('tileSize').value);
  const pattern = document.getElementById('pattern').value;
  const density = val('density') / 100;
  const scale = val('scale') / 100;
  const opac = val('opacity') / 100;
  const rough = val('roughness') / 100;
  const cont = val('contrast') / 100;
  const mono = chk('monochrome');
  const inv = chk('invert');
  const transp = chk('transparent');
  const baseCol = document.getElementById('baseColor').value;

  // Use a temporary context for generating the overlay (NOT mainCanvas)
  if (!overlayBuffer || overlayBuffer.width !== size || overlayBuffer.height !== size) {
    overlayBuffer = document.createElement('canvas');
    overlayBuffer.width = size;
    overlayBuffer.height = size;
  }
  const genCtx = overlayBuffer.getContext('2d');
  const imageData = genCtx.createImageData(size, size);
  const px = imageData.data;

  // Parse base color
  const br = parseInt(baseCol.slice(1, 3), 16);
  const bg = parseInt(baseCol.slice(3, 5), 16);
  const bb = parseInt(baseCol.slice(5, 7), 16);

  const noiseScale = Math.max(1, scale * 20);
  const octaves = Math.max(1, Math.round(rough * 6 + 1));

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const idx = (y * size + x) * 4;
      let v = 0;

      switch (pattern) {
        case 'film-grain': {
          v = seededRandom(x, y);
          // Add slight spatial correlation
          if (scale > 0.3) {
            v = v * 0.7 + fractalNoise(x / noiseScale, y / noiseScale, size / noiseScale, 2, 0.5) * 0.3;
          }
          break;
        }
        case 'fine-noise': {
          v = fractalNoise(x / noiseScale, y / noiseScale, Math.max(1, size / noiseScale), octaves, rough * 0.5 + 0.3);
          break;
        }
        case 'paper': {
          const n1 = fractalNoise(x / (noiseScale * 2), y / (noiseScale * 2), Math.max(1, size / (noiseScale * 2)), 4, 0.6);
          const n2 = fractalNoise(x / (noiseScale * 0.5), y / (noiseScale * 0.5), Math.max(1, size / (noiseScale * 0.5)), 2, 0.4);
          v = n1 * 0.6 + n2 * 0.4;
          // Add fiber-like streaks
          v += Math.sin(x * 0.1 + n1 * 5) * 0.05;
          v = Math.max(0, Math.min(1, v));
          break;
        }
        case 'linen': {
          const tx = (x % Math.max(1, Math.round(4 / scale))) / Math.max(1, Math.round(4 / scale));
          const ty = (y % Math.max(1, Math.round(4 / scale))) / Math.max(1, Math.round(4 / scale));
          const weaveX = Math.sin(tx * Math.PI) * 0.5 + 0.5;
          const weaveY = Math.sin(ty * Math.PI) * 0.5 + 0.5;
          v = (weaveX + weaveY) * 0.5;
          v += seededRandom(x, y) * rough * 0.3;
          v = Math.max(0, Math.min(1, v));
          break;
        }
        case 'halftone': {
          const cellSize = Math.max(2, Math.round(20 * scale));
          const cx = (x % cellSize) - cellSize / 2;
          const cy = (y % cellSize) - cellSize / 2;
          const dist = Math.sqrt(cx * cx + cy * cy);
          const maxR = cellSize * 0.45 * density;
          v = dist < maxR ? 0 : 1;
          if (inv) v = 1 - v;
          // Add noise to edges
          if (Math.abs(dist - maxR) < 2) v += seededRandom(x, y) * rough * 0.3;
          break;
        }
        case 'grid': {
          const cellSize = Math.max(4, Math.round(30 * scale));
          const lineW = Math.max(1, Math.round(density * 3));
          const gx = x % cellSize;
          const gy = y % cellSize;
          v = (gx < lineW || gy < lineW) ? 0 : 1;
          if (inv) v = 1 - v;
          v += seededRandom(x, y) * rough * 0.1;
          break;
        }
        case 'crosshatch': {
          const spacing = Math.max(3, Math.round(15 * scale));
          const lineW = Math.max(1, Math.round(density * 2));
          const d1 = (x + y) % spacing;
          const d2 = (x - y + size * 2) % spacing;
          const h1 = d1 < lineW ? 0.3 : 0;
          const h2 = d2 < lineW ? 0.3 : 0;
          v = 1 - h1 - h2;
          v += seededRandom(x, y) * rough * 0.15;
          v = Math.max(0, Math.min(1, v));
          break;
        }
        case 'scanlines': {
          const gap = Math.max(2, Math.round(6 * scale));
          v = (y % gap < 1) ? 0 : 1;
          v += seededRandom(x, y) * rough * 0.1;
          break;
        }
        case 'stipple': {
          const prob = density * 0.15;
          const r = seededRandom(x, y);
          if (r < prob) {
            v = seededRandom(x + 1, y + 1) * 0.5;
          } else {
            v = 1;
          }
          break;
        }
        case 'concrete': {
          const n1 = fractalNoise(x / (noiseScale * 1.5), y / (noiseScale * 1.5), Math.max(1, size / (noiseScale * 1.5)), 5, 0.65);
          const n2 = seededRandom(x, y) * 0.15;
          v = n1 * 0.85 + n2;
          // Add pitting
          if (seededRandom(x * 3, y * 7) < density * 0.02) {
            v *= 0.5;
          }
          break;
        }
        case 'dust': {
          v = 1;
          const r = seededRandom(x, y);
          // Dust particles
          if (r < density * 0.005) {
            v = 0.2 + seededRandom(x + 99, y + 77) * 0.3;
          }
          // Scratches (horizontal)
          if (seededRandom(0, y) < density * 0.003) {
            const scratchLen = seededRandom(y, 0) * 100 * scale;
            const scratchStart = seededRandom(y, 1) * size;
            if (x > scratchStart && x < scratchStart + scratchLen) {
              v = 0.4 + seededRandom(x, y + 55) * 0.2;
            }
          }
          break;
        }
        case 'canvas-weave': {
          const cellW = Math.max(3, Math.round(8 * scale));
          const cellH = Math.max(3, Math.round(8 * scale));
          const wx = x % cellW;
          const wy = y % cellH;
          const block = (Math.floor(x / cellW) + Math.floor(y / cellH)) % 2;
          if (block === 0) {
            v = 0.4 + (wx / cellW) * 0.3;
          } else {
            v = 0.4 + (wy / cellH) * 0.3;
          }
          v += seededRandom(x, y) * rough * 0.2;
          v = Math.max(0, Math.min(1, v));
          break;
        }
      }

      // Apply contrast
      v = (v - 0.5) * (cont * 2 + 0.5) + 0.5;
      v = Math.max(0, Math.min(1, v));

      // Invert
      if (inv && pattern !== 'halftone' && pattern !== 'grid') v = 1 - v;

      // Always render solid grayscale into buffer
      // Compositing blend mode handles the overlay effect
      // "Transparent" checkbox only affects Tile PNG export
      const lum = Math.round(v * 255);
      if (mono) {
        px[idx] = lum;
        px[idx + 1] = lum;
        px[idx + 2] = lum;
      } else {
        px[idx] = Math.round(br * v);
        px[idx + 1] = Math.round(bg * v);
        px[idx + 2] = Math.round(bb * v);
      }
      px[idx + 3] = 255;
    }
  }

  genCtx.putImageData(imageData, 0, 0);
}

function updateTilePreview() {
  const size = mainCanvas.width;
  tileCtx.clearRect(0, 0, 200, 200);

  // Draw checkerboard background to show transparency
  for (let y = 0; y < 200; y += 10) {
    for (let x = 0; x < 200; x += 10) {
      tileCtx.fillStyle = ((x + y) / 10) % 2 === 0 ? '#666' : '#888';
      tileCtx.fillRect(x, y, 10, 10);
    }
  }

  // Tile 3×3
  const ts = 200 / 3;
  for (let ty = 0; ty < 3; ty++) {
    for (let tx = 0; tx < 3; tx++) {
      tileCtx.drawImage(mainCanvas, tx * ts, ty * ts, ts, ts);
    }
  }

  // Grid lines to show tile boundaries
  tileCtx.strokeStyle = 'rgba(255,255,255,0.15)';
  tileCtx.lineWidth = 1;
  for (let i = 1; i < 3; i++) {
    tileCtx.beginPath();
    tileCtx.moveTo(i * ts, 0);
    tileCtx.lineTo(i * ts, 200);
    tileCtx.stroke();
    tileCtx.beginPath();
    tileCtx.moveTo(0, i * ts);
    tileCtx.lineTo(200, i * ts);
    tileCtx.stroke();
  }
}

function exportPNG() {
  // Export at source image resolution (not screen size)
  const frame = getCurrentFrame();
  let expW = mainCanvas.width, expH = mainCanvas.height;
  if (frame) {
    expW = frame.videoWidth || frame.naturalWidth || frame.width || expW;
    expH = frame.videoHeight || frame.naturalHeight || frame.height || expH;
  }
  const expCanvas = document.createElement('canvas');
  expCanvas.width = expW;
  expCanvas.height = expH;
  const ctx = expCanvas.getContext('2d');

  // Draw source at full res
  if (frame) {
    ctx.drawImage(frame, 0, 0, expW, expH);
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, expW, expH);
  }

  // Tile overlay at full res
  if (overlayBuffer) {
    ctx.globalAlpha = val('opacity') / 100;
    for (let ty = 0; ty < expH; ty += overlayBuffer.height) {
      for (let tx = 0; tx < expW; tx += overlayBuffer.width) {
        ctx.drawImage(overlayBuffer, tx, ty);
      }
    }
    ctx.globalAlpha = 1;
  }

  const link = document.createElement('a');
  link.download = 'tipo-overlay-composite.png';
  link.href = expCanvas.toDataURL('image/png');
  link.click();
}

function exportTile() {
  if (!overlayBuffer) { generateOverlay(); }
  const pattern = document.getElementById('pattern').value;
  const size = Number(document.getElementById('tileSize').value);
  const transp = chk('transparent');

  let exportCanvas = overlayBuffer;

  // If transparent mode, convert solid gray to transparent overlay
  if (transp) {
    exportCanvas = document.createElement('canvas');
    exportCanvas.width = size;
    exportCanvas.height = size;
    const ctx = exportCanvas.getContext('2d');
    const srcData = overlayBuffer.getContext('2d').getImageData(0, 0, size, size);
    const dst = ctx.createImageData(size, size);
    for (let i = 0; i < srcData.data.length; i += 4) {
      const lum = srcData.data[i]; // grayscale value
      // Map: 128 (mid gray) = transparent, darker/lighter = more visible
      const deviation = Math.abs(lum - 128) / 128;
      dst.data[i] = lum < 128 ? 0 : 255;
      dst.data[i + 1] = lum < 128 ? 0 : 255;
      dst.data[i + 2] = lum < 128 ? 0 : 255;
      dst.data[i + 3] = Math.round(deviation * 255);
    }
    ctx.putImageData(dst, 0, 0);
  }

  const link = document.createElement('a');
  link.download = `tipo-overlay-${pattern}-${size}px-tile.png`;
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
}

async function toggleRec() {
  if (!recorder) {
    recorder = new TipoRecorder(mainCanvas);
    recorder.setTimerElement(document.getElementById('recTimer'));
  }
  const btn = document.getElementById('recBtn');
  if (!recorder.isRecording) {
    await recorder.start(8000000);
    btn.textContent = 'Stop Recording';
    btn.style.borderColor = 'var(--red)';
    if (!animFrame) startLoop();
  } else {
    const result = await recorder.stop();
    TipoRecorder.download(result.blob, result.filename);
    btn.textContent = 'Record MP4';
    btn.style.borderColor = '';
    if (sourceType === 'image' || !sourceType) stopLoop();
  }
}

// Presets
function resetAll() {
  document.getElementById('pattern').value = 'film-grain';
  document.getElementById('density').value = 50;
  document.getElementById('scale').value = 50;
  document.getElementById('opacity').value = 30;
  document.getElementById('roughness').value = 50;
  document.getElementById('contrast').value = 50;
  document.getElementById('monochrome').checked = true;
  document.getElementById('invert').checked = false;
  document.getElementById('transparent').checked = true;
  document.getElementById('baseColor').value = '#808080';
  document.getElementById('tileSize').value = '512';
  updateLabels();
  seed = Math.random() * 10000;
  overlayDirty = true;
}

function applyPreset(name) {
  resetAll();
  const P = {
    subtle: () => { setP('film-grain', 30, 60, 15, 40, 40); },
    medium: () => { setP('film-grain', 50, 50, 30, 50, 50); },
    heavy: () => { setP('film-grain', 80, 40, 60, 70, 60); },
    photo: () => { setP('film-grain', 60, 30, 40, 60, 55); document.getElementById('tileSize').value = '1024'; },
    print: () => { setP('halftone', 50, 40, 25, 30, 60); },
    digital: () => { setP('scanlines', 50, 50, 20, 10, 40); },
    vintage: () => { setP('dust', 60, 50, 35, 50, 45); document.getElementById('monochrome').checked = false; document.getElementById('baseColor').value = '#d4c5a0'; },
    editorial: () => { setP('paper', 50, 70, 20, 60, 45); },
  };
  if (P[name]) P[name]();
  updateLabels();
  overlayDirty = true;
  renderComposite();
  document.querySelectorAll('.preset-chip').forEach(el => el.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
}

function setP(pat, dens, sc, op, rough, cont) {
  document.getElementById('pattern').value = pat;
  document.getElementById('density').value = dens;
  document.getElementById('scale').value = sc;
  document.getElementById('opacity').value = op;
  document.getElementById('roughness').value = rough;
  document.getElementById('contrast').value = cont;
}

function updateLabels() {
  ['density', 'scale', 'opacity', 'roughness', 'contrast'].forEach(id => {
    document.getElementById(id + 'Val').textContent = document.getElementById(id).value;
  });
}

// Bind all controls
document.querySelectorAll('input[type="range"], input[type="checkbox"], input[type="color"], select').forEach(el => {
  el.addEventListener('input', () => {
    updateLabels();
    overlayDirty = true;
    renderComposite();
  });
});

// File input + drag & drop
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
const wrap = document.getElementById('canvasWrap');
wrap.addEventListener('dragover', e => e.preventDefault());
wrap.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// Randomize seed on double-click
wrap.addEventListener('dblclick', () => {
  seed = Math.random() * 10000;
  overlayDirty = true;
  renderComposite();
});

// Theme toggle (standalone — no TipoUI since no p5.js)
(function initTheme() {
  const saved = localStorage.getItem('tipo-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.createElement('button');
  btn.className = 'tipo-theme-toggle';
  btn.title = 'Toggle light/dark theme';
  btn.textContent = saved === 'dark' ? '\u263C' : '\u263E';
  btn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('tipo-theme', next);
    btn.textContent = next === 'dark' ? '\u263C' : '\u263E';
  });
  document.body.appendChild(btn);

  // Back button
  const back = document.createElement('a');
  back.className = 'tipo-back-btn';
  back.href = 'index.html#visual';
  back.title = 'Back to menu';
  back.textContent = '\u2190';
  document.body.appendChild(back);

  // Editable hex fields next to color pickers (standalone version of TipoUI.initHexInputs)
  document.querySelectorAll('input[type="color"]').forEach(el => {
    const hex = document.createElement('input');
    hex.type = 'text';
    hex.className = 'tipo-hex-input';
    hex.maxLength = 7;
    hex.spellcheck = false;
    hex.value = el.value;
    el.insertAdjacentElement('afterend', hex);
    el.addEventListener('input', () => { hex.value = el.value; });
    const commit = () => {
      let v = hex.value.trim();
      if (v && v[0] !== '#') v = '#' + v;
      if (/^#[0-9a-fA-F]{3}$/.test(v)) v = '#' + v[1] + v[1] + v[2] + v[2] + v[3] + v[3];
      if (/^#[0-9a-fA-F]{6}$/.test(v)) {
        el.value = v.toLowerCase();
        el.dispatchEvent(new Event('input', { bubbles: true }));
        el.dispatchEvent(new Event('change', { bubbles: true }));
      }
      hex.value = el.value;
    };
    hex.addEventListener('change', commit);
    hex.addEventListener('keydown', (e) => { if (e.key === 'Enter') { commit(); hex.blur(); } });
  });
})();

// Init
overlayDirty = true;
renderComposite();
</script>
