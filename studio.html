<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="description" content="Tipó — Studio. An infinite canvas where effects stack as nodes on multiple media at once: halftone, dither, gradient map, glitch, wave, grain — chained live.">

<title>Tipó — Studio</title>
<link rel="stylesheet" href="shared/style.css?v=20260713-id1">
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js" integrity="sha384-ut5hA6QX8px1vwvHCiy1MqfODbif8Iy0Gr+X61/AoNxP3VXx2wF99Pu9PeTEkG5E" crossorigin="anonymous"></script>

<style>
  @font-face { font-family: 'Clash Display'; src: url('assets/fonts/ClashDisplay-Semibold.otf') format('opentype'); font-weight: 600 900; font-display: swap; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body { background: var(--bg-0); }

  /* ============ O ESPAÇO — canvas infinito com grade de pontos ============ */
  #space {
    position: fixed; inset: 0; overflow: hidden; touch-action: none; cursor: grab;
    background-color: var(--bg-0);
    background-image: radial-gradient(circle, var(--border-2, #333) 1.25px, transparent 1.25px);
  }
  #space.panning { cursor: grabbing; }
  #world { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; }

  /* frames (mídias) flutuantes */
  .frame { position: absolute; }
  /* label com tamanho CONSTANTE em tela (contra-escala o zoom, padrão Figma) */
  .frame-label { position: absolute; bottom: 100%; margin-bottom: 8px; left: 2px; width: calc(100% * var(--st-z, 1)); display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-5); font-family: var(--font-mono); white-space: nowrap; cursor: move; transform: scale(var(--st-invz, 1)); transform-origin: 0 100%; }
  .frame-label b { color: var(--accent); font-weight: 400; }
  .fl-name { cursor: text; border-bottom: 1px dashed transparent; }
  .fl-name:hover { border-bottom-color: var(--text-5); }
  .fl-name-input { background: var(--bg-2); border: 1px solid var(--accent); color: var(--text-1); font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; width: 130px; }
  .fl-actions { margin-left: auto; display: flex; gap: 5px; }
  .fl-actions button { border: 1px solid var(--border-2, #333); background: color-mix(in srgb, var(--bg-1, #141414) 88%, transparent); color: var(--text-4); cursor: pointer; font-size: 12px; width: 26px; height: 24px; border-radius: 6px; font-family: inherit; line-height: 1; padding: 0; }
  .fl-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .fl-actions .fl-x:hover { color: var(--red); border-color: var(--red); }
  .fl-actions .fl-rec.live { border-color: var(--red); color: var(--red); animation: stRecPulse 1.2s ease-in-out infinite; }
  .frame canvas { display: block; box-shadow: 0 18px 70px rgba(0,0,0,0.5); border-radius: 4px; background: #111; cursor: move; }
  .frame.active canvas { outline: 1.5px solid var(--accent); outline-offset: 3px; }
  .frame.recording canvas { outline: 2px solid var(--red); outline-offset: 3px; animation: stRecPulse 1.2s ease-in-out infinite; }

  /* fios ligando docks aos frames */
  #wires { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; }
  #wires path { fill: none; stroke: var(--border-2, #3a3a3a); stroke-width: 1.5; }

  /* ============ NODES (stack) por frame ============ */
  .frame-dock { position: absolute; width: 232px; display: flex; flex-direction: column; gap: 8px; }
  .stk-card {
    display: flex; align-items: center; gap: 9px; padding: 10px 12px;
    background: var(--bg-1, #141414); border: 1px solid var(--border-2, #333);
    border-radius: 10px; cursor: pointer; user-select: none;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    font-family: var(--font-ui);
  }
  .stk-card:hover { border-color: var(--text-5); }
  .stk-card.sel { border-color: var(--accent); box-shadow: 0 6px 24px rgba(0,0,0,0.35), 0 0 0 1px var(--accent); }
  .stk-card.off .stk-name, .stk-card.off .stk-ico { opacity: 0.35; }
  .stk-ico { flex: none; width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-family: var(--font-mono); color: #F8F5F0; }
  .stk-name { flex: 1; font-size: 11.5px; letter-spacing: 0.4px; color: var(--text-1); }
  .stk-card.sel .stk-name { color: var(--accent); }
  .stk-dot { flex: none; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); border: 1px solid var(--accent); }
  .stk-card.off .stk-dot { background: transparent; border-color: var(--text-5); }
  .stk-btns { display: none; gap: 3px; }
  .stk-card:hover .stk-btns, .stk-card.sel .stk-btns { display: flex; }
  .stk-btns button { width: 20px; height: 20px; padding: 0; border: none; border-radius: 4px; background: transparent; color: var(--text-5); font-size: 10px; cursor: pointer; font-family: var(--font-mono); line-height: 1; }
  .stk-btns button:hover { background: var(--bg-2); color: var(--accent); }
  .stk-btns button.stk-x:hover { color: var(--red); }
  .stk-src { border-style: dashed; }
  .stk-src .stk-sub { display: block; font-size: 8.5px; color: var(--text-5); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .stk-add {
    text-align: center; font-size: 11px; letter-spacing: 1px; color: var(--text-4);
    border: 1px dashed var(--border-2, #333); border-radius: 10px; padding: 10px;
    cursor: pointer; user-select: none; font-family: var(--font-ui); background: transparent;
  }
  .stk-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ============ TOPBAR flutuante ============ */
  #topbar {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 900;
    display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    background: color-mix(in srgb, var(--bg-1, #141414) 88%, transparent);
    border: 1px solid var(--border-2, #333); border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35); backdrop-filter: blur(10px);
    font-family: var(--font-mono); flex-wrap: wrap; justify-content: center;
    max-width: calc(100vw - 120px);
  }
  #topbar .tb-title { font-size: 11px; letter-spacing: 2.5px; color: var(--text-1); }
  #topbar .tb-title i { font-style: normal; color: var(--accent-warm, #D4A040); }
  #topbar select { background: var(--bg-2); color: var(--text-1); border: 1px solid var(--border-2); padding: 5px 7px; font-size: 10px; font-family: var(--font-ui); border-radius: 6px; }
  #topbar .tb-btn { border: 1px solid var(--border-2); background: transparent; color: var(--text-2); font-size: 10px; letter-spacing: 0.8px; padding: 6px 11px; border-radius: 7px; cursor: pointer; font-family: var(--font-ui); text-transform: uppercase; }
  #topbar .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
  #topbar .tb-btn.rec-live { border-color: var(--red); color: var(--red); animation: stRecPulse 1.2s ease-in-out infinite; }
  @keyframes stRecPulse { 50% { opacity: 0.55; } }

  /* zoom HUD */
  #viewHud { position: fixed; bottom: 18px; left: 18px; z-index: 900; display: flex; gap: 8px; align-items: center; font-family: var(--font-mono); }
  #viewHud .vh-zoom { font-size: 10px; color: var(--text-5); letter-spacing: 1px; min-width: 40px; }
  #viewHud button { border: 1px solid var(--border-2); background: color-mix(in srgb, var(--bg-1, #141414) 88%, transparent); color: var(--text-3); font-size: 10px; padding: 6px 10px; border-radius: 7px; cursor: pointer; font-family: var(--font-ui); letter-spacing: 0.5px; }
  #viewHud button:hover { border-color: var(--accent); color: var(--accent); }
  #spaceHint { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 890; font-size: 9.5px; letter-spacing: 1.5px; color: var(--text-5); text-transform: uppercase; font-family: var(--font-mono); pointer-events: none; text-align: center; }

  /* ============ INSPECTOR flutuante (params do node) ============ */
  #inspector {
    position: fixed; top: 90px; left: 24px; z-index: 920; width: 252px;
    background: color-mix(in srgb, var(--bg-1, #141414) 94%, transparent);
    border: 1px solid var(--border-2, #333); border-radius: 12px;
    box-shadow: 0 14px 50px rgba(0,0,0,0.45); backdrop-filter: blur(10px);
    display: none; font-family: var(--font-ui);
  }
  #inspector.open { display: block; }
  #inspHead { display: flex; align-items: center; gap: 9px; padding: 11px 13px; cursor: move; border-bottom: 1px solid var(--border-2, #2a2a2a); user-select: none; }
  #inspHead .stk-ico { width: 20px; height: 20px; font-size: 10px; }
  #inspName { flex: 1; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); }
  #inspHead button { border: none; background: transparent; color: var(--text-5); font-size: 13px; cursor: pointer; padding: 2px 5px; font-family: var(--font-mono); }
  #inspHead button:hover { color: var(--accent); }
  #inspHead button.insp-x:hover { color: var(--red); }
  #inspBody { padding: 10px 14px 14px; max-height: min(52vh, 460px); overflow-y: auto; }
  .fx-pane { display: none; }
  .fx-pane.sel { display: block; }
  .fx-pane .range-row { margin-top: 7px; }
  .fx-pane .color-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .fx-pane .color-row label { font-size: 9.5px; color: var(--text-4); min-width: 52px; text-transform: uppercase; letter-spacing: 0.5px; }
  .fx-pane input[type="color"] { width: 36px; height: 22px; border: 1px solid var(--border-2); background: var(--bg-2); padding: 0; cursor: pointer; }
  .fx-pane select { flex: 1; background: var(--bg-2); color: var(--text-1); border: 1px solid var(--border-2); padding: 5px 6px; font-size: 10.5px; font-family: var(--font-ui); border-radius: 5px; }
  #inspBody .insp-hint { font-size: 9px; color: var(--text-5); letter-spacing: 0.4px; margin-top: 10px; line-height: 1.5; }

  /* ============ MODAL de ferramentas (add node / trocar fonte) ============ */
  #toolsModal { position: fixed; inset: 0; z-index: 950; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
  #toolsModal.open { display: flex; }
  #toolsBox { width: min(560px, calc(100vw - 40px)); max-height: 80vh; overflow-y: auto; background: var(--bg-1, #141414); border: 1px solid var(--border-2, #333); border-radius: 14px; padding: 20px 22px; box-shadow: 0 24px 80px rgba(0,0,0,0.55); font-family: var(--font-ui); }
  #toolsBox h2 { font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-1); margin: 0 0 4px; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); }
  #toolsBox h2 button { border: 1px solid var(--border-2); background: transparent; color: var(--text-4); width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 12px; }
  #toolsBox h2 button:hover { border-color: var(--red); color: var(--red); }
  #toolsBox h3 { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-5); margin: 16px 0 8px; font-family: var(--font-mono); }
  .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 10px; }
  .tool-thumb { border: 1px solid var(--border-2, #333); border-radius: 10px; padding: 8px; cursor: pointer; background: var(--bg-2, #1a1a1a); text-align: center; }
  .tool-thumb:hover { border-color: var(--accent); }
  .tool-thumb .tt-vis { height: 52px; border-radius: 6px; margin-bottom: 7px; overflow: hidden; position: relative; }
  .tool-thumb .tt-name { font-size: 10px; letter-spacing: 0.5px; color: var(--text-2); }
  .tools-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .tools-row .tool-inp { flex: 1; min-width: 100px; border: 1px solid var(--border-2); border-radius: 8px; padding: 9px 10px; text-align: center; font-size: 10.5px; letter-spacing: 0.5px; color: var(--text-2); cursor: pointer; background: var(--bg-2); }
  .tools-row .tool-inp:hover { border-color: var(--accent); color: var(--accent); }
  /* mini-visuais dos efeitos (CSS puro, paleta Athos) */
  .tt-halftone { background: radial-gradient(circle at 6px 8px, #2A8A7A 0 3px, transparent 3px), radial-gradient(circle at 20px 20px, #2A8A7A 0 4.5px, transparent 4.5px), radial-gradient(circle at 36px 10px, #2A8A7A 0 2px, transparent 2px), radial-gradient(circle at 52px 24px, #2A8A7A 0 5px, transparent 5px), radial-gradient(circle at 70px 12px, #2A8A7A 0 3px, transparent 3px), radial-gradient(circle at 88px 26px, #2A8A7A 0 4px, transparent 4px), #F8F5F0; }
  .tt-bayer { background: conic-gradient(#1A1818 25%, #2A8A7A 25% 50%, #1A1818 50% 75%, #D4A040 75%); background-size: 8px 8px; }
  .tt-pixelate { background: conic-gradient(#2A8A7A 25%, #D4A040 25% 50%, #99E0D2 50% 75%, #1A1818 75%); background-size: 26px 26px; }
  .tt-gradmap { background: linear-gradient(90deg, #1A1818, #2A8A7A 38%, #D4A040 72%, #F8F5F0); }
  .tt-posterize { background: linear-gradient(135deg, #1A1818 25%, #1B5A4E 25% 50%, #2A8A7A 50% 75%, #99E0D2 75%); }
  .tt-glitch { background: repeating-linear-gradient(0deg, #1A1818 0 6px, #2A8A7A 6px 9px, #1A1818 9px 14px, #D4A040 14px 16px); }
  .tt-wave { background: repeating-radial-gradient(circle at 50% 120%, #99E0D2 0 6px, #2A8A7A 6px 12px, #1B5A4E 12px 18px); }
  .tt-grain { background-color: #6b6459; background-image: radial-gradient(circle, rgba(248,245,240,.6) .8px, transparent .8px), radial-gradient(circle, rgba(26,24,24,.7) .8px, transparent .8px); background-size: 5px 5px, 7px 7px; background-position: 0 0, 3px 2px; }
  .tt-ascii { background: #141313; position: relative; }
  .tt-ascii::before { content: '@#*+=- .'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #99E0D2; font-family: monospace; font-size: 13px; letter-spacing: 2px; }
  .tt-duotone { background: linear-gradient(105deg, #1A1818 48%, #F8F5F0 52%); }
  .tt-blur { background: radial-gradient(circle at 40% 50%, #D4A040 0%, #2A8A7A 55%, #1A1818 100%); filter: blur(4px); }
  .tt-kaleido { background: conic-gradient(#2A8A7A 0 30deg, #99E0D2 30deg 60deg, #D4A040 60deg 90deg, #1A1818 90deg 120deg, #2A8A7A 120deg 150deg, #99E0D2 150deg 180deg, #D4A040 180deg 210deg, #1A1818 210deg 240deg, #2A8A7A 240deg 270deg, #99E0D2 270deg 300deg, #D4A040 300deg 330deg, #1A1818 330deg); }
  .tt-aberration { background: #141313; position: relative; }
  .tt-aberration::before { content: 'AB'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; color: #F8F5F0; text-shadow: -3px 0 0 rgba(255,40,40,.7), 3px 0 0 rgba(40,80,255,.7); }
  .tt-adjust { background: linear-gradient(90deg, #1A1818, #6a6a6a 35%, #F8F5F0 70%, #2A8A7A 70%, #D4A040); }

  /* ============ mobile ============ */
  @media (max-width: 768px) {
    #topbar { top: 8px; gap: 6px; padding: 6px 10px; max-width: calc(100vw - 16px); }
    #topbar .tb-title { display: none; }
    #inspector { top: auto; bottom: 0; left: 0; right: 0; width: auto; border-radius: 14px 14px 0 0; }
    #inspBody { max-height: 38vh; }
    #viewHud { bottom: auto; top: 60px; left: 10px; }
    #spaceHint { display: none; }
    .tipo-back-btn { top: 12px; }
  }
</style>

<body>

<div id="space">
  <div id="world">
    <svg id="wires"></svg>
  </div>
</div>

<div id="topbar">
  <span class="tb-title">TIP&Oacute; <i>STUDIO</i></span>
  <button class="tb-btn" onclick="newFrame()">+ Frame</button>
  <button class="tb-btn" onclick="resetSpace()" title="apaga o espa&ccedil;o salvo e recome&ccedil;a">Novo</button>
  <select id="presetSel" title="receitas">
    <option value="">receitas&hellip;</option>
    <option value="riso">Riso</option>
    <option value="print">Print</option>
    <option value="vhs">VHS</option>
    <option value="poster">Poster</option>
    <option value="zine">Zine</option>
    <option value="dream">Dream</option>
    <option value="terminal">Terminal</option>
    <option value="noir">Noir</option>
  </select>
  <button class="tb-btn" onclick="exportPNG()">PNG</button>
  <button class="tb-btn" id="recBtn" onclick="toggleRec()">&#9210; REC</button>
</div>

<div id="viewHud">
  <button onclick="fitView()">Reset view</button>
  <span class="vh-zoom" id="zoomLabel">100%</span>
</div>
<div id="spaceHint">arrasta o vazio pra navegar &middot; arrasta um frame pra mover &middot; scroll/pin&ccedil;a d&aacute; zoom &middot; solta m&iacute;dia aqui</div>

<div id="inspector">
  <div id="inspHead">
    <span class="stk-ico" id="inspIco"></span>
    <span id="inspName"></span>
    <button type="button" id="inspBypass" title="liga/desliga">&#9679;</button>
    <button type="button" class="insp-x" id="inspRemove" title="remover do stack">&#10005;</button>
    <button type="button" id="inspClose" title="fechar">&mdash;</button>
  </div>
  <div id="inspBody">
    <div id="paramsHost"></div>
    <div class="insp-hint">o "~" de cada slider anima &mdash; osciladores ou &#9834; &aacute;udio-reativo</div>
  </div>
</div>

<div id="toolsModal">
  <div id="toolsBox">
    <h2>Tools <button type="button" onclick="closeTools()">&#10005;</button></h2>
    <h3>Fonte do frame ativo</h3>
    <div class="tools-row">
      <div class="tool-inp" onclick="closeTools(); useDemo()">Demo TIP&Oacute;</div>
      <div class="tool-inp" onclick="closeTools(); document.getElementById('fileInput').click()">Imagem / V&iacute;deo</div>
      <div class="tool-inp" onclick="closeTools(); toggleWebcam()">Webcam</div>
    </div>
    <h3>Efeitos (entram no frame ativo)</h3>
    <div class="tools-grid" id="toolsGrid"></div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*" style="display:none">

<script>
// ============================================================
// TIPÓ — STUDIO (22.2 v3 — multi-frame)
// O espaço agora segura VÁRIAS mídias ao mesmo tempo: cada frame
// flutua no canvas infinito com sua fonte + seu stack de nodes,
// todos renderizando ao vivo no MESMO contexto WebGL2 (ping-pong
// por frame, glCanvas compartilhado dimensionado pro maior frame).
// Frames são arrastáveis; clique ativa (dock/inspector/export
// seguem o frame ativo). Compara receitas lado a lado.
// ============================================================

const glCanvas = document.createElement('canvas');
const gl = glCanvas.getContext('webgl2', { antialias: false, preserveDrawingBuffer: true });
let recorder = null;
let recFrameId = null;

const MAX_SHORT = 900, MAX_LONG = 1440;
const DOCK_GAP = 90, DOCK_W = 232, FRAME_GAP = 150;

// ============================================================
// FX REGISTRY
// ============================================================
const FRAG_HEAD = `#version 300 es
precision highp float;
uniform sampler2D uTex;
uniform vec2 uRes;
uniform float uTime;
in vec2 vUv;
out vec4 outC;
float lum(vec3 c){ return dot(c, vec3(0.299, 0.587, 0.114)); }
float hash2(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
`;

const FX = {
  pixelate: {
    name: 'Pixelate', ico: '#1B5A4E', sym: 'Px', anim: false,
    params: [
      { k: 'size', label: 'Cell', min: 2, max: 120, val: 16, u: 'uSize' },
      { k: 'shape', label: 'Shape', type: 'select', val: 0, u: 'uShape', options: ['Square', 'Dots', 'Diamond'] },
      { k: 'gap', label: 'Gap', min: 0, max: 60, val: 0, u: 'uGap' },
      { k: 'bg', label: 'Gap Color', type: 'color', val: '#1A1818', u: 'uBg' },
    ],
    frag: `uniform float uSize; uniform float uShape; uniform float uGap; uniform vec3 uBg;
void main(){
  float s = max(uSize, 1.0);
  vec2 cell = vec2(s) / uRes;
  vec2 uv = (floor(vUv / cell) + 0.5) * cell;
  vec3 c = texture(uTex, uv).rgb;
  vec2 dp = (fract(vUv / cell) - 0.5) * 2.0; // -1..1 dentro da célula
  float half_ = 1.0 - uGap / 100.0;
  float d = uShape < 0.5 ? max(abs(dp.x), abs(dp.y))
          : uShape < 1.5 ? length(dp)
          : abs(dp.x) + abs(dp.y);
  float m = 1.0 - smoothstep(half_ - 0.08, half_, d);
  outC = vec4(mix(uBg, c, uGap > 0.0 || uShape > 0.5 ? m : 1.0), 1.0);
}`,
  },
  bayer: {
    name: 'Dither (Bayer)', ico: '#1A1818', sym: 'Dt', anim: false,
    params: [
      { k: 'levels', label: 'Levels', min: 2, max: 8, val: 3, u: 'uLevels' },
      { k: 'scale', label: 'Scale', min: 1, max: 10, val: 2, u: 'uScale' },
      { k: 'pattern', label: 'Matrix', type: 'select', val: 1, u: 'uPattern', options: ['2×2 (grosso)', '4×4 (clássico)', '8×8 (fino)'] },

out vec2 vUv;
uniform float uFlipY;
void main(){
  vec2 p = vec2(float((gl_VertexID << 1) & 2), float(gl_VertexID & 2));
  vUv = mix(p, vec2(p.x, 1.0 - p.y), uFlipY);
  gl_Position = vec4(p * 2.0 - 1.0, 0.0, 1.0);
}`;

const programs = {};
function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error('shader: ' + gl.getShaderInfoLog(s));

  return s;
}
function getProgram(fxId) {
  if (programs[fxId]) return programs[fxId];
  const def = fxId === '_copy'
    ? { params: [], frag: 'void main(){ outC = texture(uTex, vUv); }' }
    : FX[fxId];
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG_HEAD + def.frag));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    throw new Error('link: ' + gl.getProgramInfoLog(prog));
  }
  const loc = {
    uTex: gl.getUniformLocation(prog, 'uTex'),
    uRes: gl.getUniformLocation(prog, 'uRes'),
    uTime: gl.getUniformLocation(prog, 'uTime'),
    uFlipY: gl.getUniformLocation(prog, 'uFlipY'),
    uAtlas: gl.getUniformLocation(prog, 'uAtlas'),
  };
  def.params.forEach(p => { loc[p.u] = gl.getUniformLocation(prog, p.u); });
  programs[fxId] = { prog, loc };
  return programs[fxId];
}

/** atlas de glifos do ASCII: 11 chars da ramp em células 32px, 1 textura */
let _asciiAtlasTex = null;
function asciiAtlas() {
  if (_asciiAtlasTex) return _asciiAtlasTex;
  const RAMP = ' .:-~=+*#%@';
  const CELL = 32;
  const c = document.createElement('canvas');
  c.width = CELL * RAMP.length;
  c.height = CELL;
  const x = c.getContext('2d');
  x.fillStyle = '#000';
  x.fillRect(0, 0, c.width, c.height);
  x.fillStyle = '#fff';
  x.font = `${CELL * 0.82}px "IBM Plex Mono", monospace`;
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  for (let i = 0; i < RAMP.length; i++) {
    x.fillText(RAMP[i], i * CELL + CELL / 2, CELL * 0.56);
  }
  _asciiAtlasTex = makeTex();
  gl.bindTexture(gl.TEXTURE_2D, _asciiAtlasTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, c);
  return _asciiAtlasTex;
}

function makeTex() {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return tex;
}
function makeTarget(w, h) {
  const tex = makeTex();
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { tex, fb };
}
function freeTarget(t) {
  if (!t) return;
  gl.deleteFramebuffer(t.fb);
  gl.deleteTexture(t.tex);
}

/** glCanvas compartilhado: sempre do tamanho do MAIOR frame */
function syncGlSize() {
  const gw = Math.max(2, ...frames.map(f => f.PW));
  const gh = Math.max(2, ...frames.map(f => f.PH));
  if (glCanvas.width !== gw || glCanvas.height !== gh) {
    glCanvas.width = gw;
    glCanvas.height = gh;
  }
}

// ============================================================
// FRAMES — múltiplas mídias no espaço
// ============================================================
let frames = [];
let activeId = null;
let frameSeq = 0;
let uidSeq = 0;
const F = () => frames.find(f => f.id === activeId) || frames[0];

// compat de testes/API: `stack`/`selUid` espelham o frame ativo
Object.defineProperty(window, 'stack', { get: () => (F() ? F().stack : []) });
Object.defineProperty(window, 'selUid', { get: () => (F() ? F().selUid : null) });

function newFrame(opts = {}) {
  const id = 'f' + (++frameSeq);
  // posiciona à direita do frame mais à direita (comparação lado a lado)
  const right = frames.length ? Math.max(...frames.map(f => f.x + f.PW + DOCK_GAP + DOCK_W)) : 0;
  const el = document.createElement('div');
  el.className = 'frame';
  el.dataset.fid = id;
  el.innerHTML =
    `<div class="frame-label"><span class="fl-name" title="clique pra renomear">frame</span> &middot; <b class="fl-chain"></b> &middot; <span class="fl-res"></span>` +
    `<span class="fl-actions">` +
    `<button type="button" class="fl-rec" title="gravar ESTE frame">&#9679;</button>` +
    `<button type="button" class="fl-png" title="PNG deste frame">&#10515;</button>` +
    `<button type="button" class="fl-dup" title="duplicar frame (mesma fonte + stack)">&#10697;</button>` +
    `<button type="button" class="fl-x" title="remover frame (Delete)">&#10005;</button>` +
    `</span></div>`;
  const canvas = document.createElement('canvas');
  canvas.className = 'frame-canvas';
  el.appendChild(canvas);
  document.getElementById('world').appendChild(el);
  const dock = document.createElement('div');
  dock.className = 'frame-dock';
  dock.dataset.fid = id;
  document.getElementById('world').appendChild(dock);

  const frame = {
    id,
    name: '',
    x: opts.x !== undefined ? opts.x : (frames.length ? right + FRAME_GAP : 0),
    y: opts.y !== undefined ? opts.y : 0,
    el, dock, canvas, ctx: canvas.getContext('2d'),
    sourceType: null, srcImage: null, srcVideo: null, webcamStream: null, mediaUrl: null,
    demoCanvas: document.createElement('canvas'),
    PW: 0, PH: 0,
    texSrc: makeTex(),
    chainA: null, chainB: null,
    stack: [], selUid: null,
    needsRender: true,
  };
  frame.demoCtx = frame.demoCanvas.getContext('2d');
  el.querySelector('.fl-x').addEventListener('click', e => { e.stopPropagation(); removeFrame(id); });
  el.querySelector('.fl-rec').addEventListener('click', e => { e.stopPropagation(); recFrame(id); });
  el.querySelector('.fl-png').addEventListener('click', e => { e.stopPropagation(); setActive(id); exportPNG(); });
  el.querySelector('.fl-dup').addEventListener('click', e => { e.stopPropagation(); dupFrame(id); });
  el.querySelector('.fl-name').addEventListener('click', e => { e.stopPropagation(); renameFrame(id); });
  el.querySelector('.fl-name').addEventListener('pointerdown', e => e.stopPropagation());
  el.querySelector('.fl-actions').addEventListener('pointerdown', e => e.stopPropagation());
  frames.push(frame);
  activeId = id;
  setFrameSize(frame, 960, 720);
  if (!opts.blank) {
    // frame novo nasce com uma receita diferente da do vizinho (comparação)
    const names = Object.keys(STACK_PRESETS);
    const used = frames.length > 1 ? names.indexOf('riso') + (frames.length - 1) : 0;
    applyStackPreset(names[used % names.length]);
  }
  syncStackUI();
  if (!opts.silent && frames.length > 1) TipoUI.showToast('Frame novo — arrasta pra posicionar');
  if (frames.length > 1) fitView();
  return frame;
}

function removeFrame(id) {
  if (frames.length <= 1) { TipoUI.showToast('Último frame não sai'); return; }
  const i = frames.findIndex(f => f.id === id);
  if (i < 0) return;
  const f = frames[i];
  releaseSource(f);
  freeTarget(f.chainA);
  freeTarget(f.chainB);
  gl.deleteTexture(f.texSrc);
  f.stack.forEach(n => {
    const pane = document.querySelector(`.fx-pane[data-uid="${n.uid}"]`);
    if (pane) pane.remove();
  });
  f.el.remove();
  f.dock.remove();
  frames.splice(i, 1);
  if (activeId === id) { activeId = frames[0].id; closeInspector(); }
  syncGlSize();
  syncStackUI();
}

function setActive(id) {
  if (activeId === id) return;
  activeId = id;
  closeInspector();
  syncStackUI();
}

/** REC direto no frame: escolhe EXPLICITAMENTE qual node grava */
async function recFrame(id) {
  if (recorder && recorder.isRecording && recFrameId !== id) {
    const rf = frames.find(f => f.id === recFrameId);
    TipoUI.showToast(`Já gravando ${frameName(rf)} — para lá primeiro`);
    return;
  }
  setActive(id);
  await toggleRec();
}

function frameName(f) {
  if (!f) return 'frame';
  return f.name || `frame ${frames.indexOf(f) + 1}`;
}

/** duplica fonte + stack — variações lado a lado da mesma mídia */
function dupFrame(id) {
  const src = frames.find(f => f.id === id);
  if (!src) return;
  const nf = newFrame({ blank: true, silent: true });
  nf.name = frameName(src) + ' copy';
  // fonte: imagem reusa o elemento; vídeo ganha player próprio na MESMA URL
  nf.mediaKey = src.mediaKey; // persistência compartilha a mídia
  if (src.sourceType === 'image' && src.srcImage) {
    nf.sourceType = 'image';
    nf.srcImage = src.srcImage;
    nf.mediaUrl = src.mediaUrl; // revoke é guardado (URL compartilhada)
    setFrameSize(nf, src.srcImage.naturalWidth, src.srcImage.naturalHeight);
  } else if (src.sourceType === 'video' && src.mediaUrl) {
    const v = document.createElement('video');
    v.src = src.mediaUrl;
    v.loop = true; v.muted = true; v.playsInline = true;
    v.addEventListener('loadedmetadata', () => {
      nf.sourceType = 'video';
      nf.srcVideo = v;
      nf.mediaUrl = src.mediaUrl;
      setFrameSize(nf, v.videoWidth, v.videoHeight);
      v.play();
      nf.needsRender = true;
      syncStackUI();
    });
  } // webcam/demo → demo (default do frame novo)
  // stack: mesmos efeitos + params
  src.stack.forEach(n => {
    addFx(n.fx, true);
    const copy = nf.stack[nf.stack.length - 1];
    Object.assign(copy.params, n.params);
    FX[n.fx].params.forEach(p => {
      const el = document.getElementById(`st_${copy.uid}_${p.k}`);
      if (!el) return;
      el.value = copy.params[p.k];
      const val = document.getElementById(`st_${copy.uid}_${p.k}Val`);
      if (val) val.textContent = copy.params[p.k];
    });
  });
  nf.selUid = nf.stack.length ? nf.stack[0].uid : null;
  closeInspector();
  syncStackUI();
  nf.needsRender = true;
  fitView();
  TipoUI.showToast('Frame duplicado — mexe num, compara com o outro');
}

/** nome editável inline no label */
function renameFrame(id) {
  const f = frames.find(x => x.id === id);
  if (!f) return;
  const span = f.el.querySelector('.fl-name');
  if (!span || span.querySelector('input')) return;
  const inp = document.createElement('input');
  inp.className = 'fl-name-input';
  inp.value = f.name || frameName(f);
  inp.maxLength = 24;
  span.textContent = '';
  span.appendChild(inp);
  inp.focus();
  inp.select();
  const commit = () => {
    f.name = inp.value.trim().slice(0, 24);
    inp.remove(); // senão o guard do syncStackUI nunca re-renderiza o label
    syncStackUI();
  };
  inp.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { inp.value = f.name; inp.blur(); }
  });
  inp.addEventListener('blur', commit);
  inp.addEventListener('pointerdown', e => e.stopPropagation());
}

// teclado: Delete/Backspace remove o frame ativo; Esc fecha camadas
document.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea, select') || e.target.isContentEditable) return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    e.preventDefault();
    if (recorder && recorder.isRecording && recFrameId === activeId) { TipoUI.showToast('Para a gravação antes de excluir'); return; }
    removeFrame(activeId);
  } else if (e.key === 'Escape') {
    closeTools();
    closeInspector();
  }
});

function setFrameSize(frame, sw, sh) {
  let w = sw, h = sh;
  const short = Math.min(w, h), long = Math.max(w, h);
  const k = Math.min(1, MAX_SHORT / short, MAX_LONG / long);
  w = Math.round(w * k); h = Math.round(h * k);
  if (w === frame.PW && h === frame.PH && frame.chainA) return;
  frame.PW = w; frame.PH = h;
  frame.canvas.width = w; frame.canvas.height = h;
  freeTarget(frame.chainA);
  freeTarget(frame.chainB);
  frame.chainA = makeTarget(w, h);
  frame.chainB = makeTarget(w, h);
  frame.demoCanvas.width = w; frame.demoCanvas.height = h;
  syncGlSize();
  layoutWorld();
}

function drawDemo(frame, tMs) {
  const c = frame.demoCtx, w = frame.demoCanvas.width, h = frame.demoCanvas.height;
  const t = tMs / 1000;
  c.fillStyle = '#F8F5F0';
  c.fillRect(0, 0, w, h);
  const cols = ['#2A8A7A', '#D4A040', '#1A1818', '#99E0D2'];
  const chars = ['T', 'I', 'P', 'Ó'];
  const cw = w * 0.19;
  for (let i = 0; i < 4; i++) {
    const cx = w * (0.16 + i * 0.225) + Math.sin(t * 0.7 + i * 1.7) * w * 0.012;
    const cy = h * 0.5 + Math.sin(t * 0.9 + i * 2.3) * h * 0.05;
    c.save();
    c.translate(cx, cy);
    c.rotate(Math.sin(t * 0.5 + i) * 0.05);
    c.fillStyle = cols[i];
    c.fillRect(-cw / 2, -cw / 2, cw, cw);
    c.fillStyle = (i === 0 || i === 2) ? '#F8F5F0' : '#1A1818';
    c.font = `900 ${cw * 0.62}px "Clash Display", "IBM Plex Mono", monospace`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(chars[i], 0, cw * 0.03);
    c.restore();
  }
  for (let i = 0; i < 5; i++) {
    const dx = w * (0.1 + i * 0.2) + Math.sin(t * 1.3 + i * 3.1) * w * 0.03;
    const dy = h * (i % 2 ? 0.16 : 0.85) + Math.cos(t + i) * h * 0.02;
    c.fillStyle = cols[i % 4] + '55';
    c.beginPath();
    c.arc(dx, dy, w * 0.028, 0, Math.PI * 2);
    c.fill();
  }
}

function currentSourceEl(frame) {
  if (frame.sourceType === 'video' || frame.sourceType === 'webcam') return frame.srcVideo;
  if (frame.sourceType === 'image') return frame.srcImage;
  return frame.demoCanvas;
}

function uploadSource(frame, tMs) {
  if (!frame.sourceType) drawDemo(frame, tMs);
  gl.bindTexture(gl.TEXTURE_2D, frame.texSrc);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
  try {
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, currentSourceEl(frame));
  } catch (e) { /* frame de vídeo ainda não pronto */ }
}

function runPass(fxId, inputTex, targetFb, w, h, tSec, params) {
  const { prog, loc } = getProgram(fxId);
  gl.bindFramebuffer(gl.FRAMEBUFFER, targetFb);
  gl.viewport(0, 0, w, h);
  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, inputTex);
  gl.uniform1i(loc.uTex, 0);
  if (loc.uAtlas) {
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, asciiAtlas());
    gl.uniform1i(loc.uAtlas, 1);
    gl.activeTexture(gl.TEXTURE0);
  }
  gl.uniform2f(loc.uRes, w, h);
  gl.uniform1f(loc.uTime, tSec);
  gl.uniform1f(loc.uFlipY, targetFb === null ? 1 : 0);
  if (params) {
    FX[fxId].params.forEach(p => {
      const v = params[p.k];
      if (p.type === 'color') {
        const n = parseInt(String(v).slice(1), 16);
        gl.uniform3f(loc[p.u], ((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255);
      } else {
        gl.uniform1f(loc[p.u], Number(v));
      }
    });
  }
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

function renderFrame(frame, tMs) {
  const tSec = tMs / 1000;
  const w = frame.PW, h = frame.PH;
  uploadSource(frame, tMs);
  let cur = frame.texSrc;
  let i = 0;
  for (const node of frame.stack) {
    if (!node.on) continue;
    const target = (i % 2 === 0) ? frame.chainA : frame.chainB;
    runPass(node.fx, cur, target.fb, w, h, tSec, node.params);
    cur = target.tex;
    i++;
  }
  runPass('_copy', cur, null, w, h, tSec, null);
  // conteúdo ocupa o canto inferior-esquerdo do glCanvas (origem GL)
  frame.ctx.drawImage(glCanvas, 0, glCanvas.height - h, w, h, 0, 0, w, h);
  if (recorder && recorder.isRecording && frame.id === recFrameId) recorder.captureFrame();
}

function frameDynamic(frame) {
  return !frame.sourceType || frame.sourceType === 'video' || frame.sourceType === 'webcam' ||
    frame.stack.some(n => n.on && FX[n.fx].anim) ||
    (recorder && recorder.isRecording && frame.id === recFrameId);
}

let lastFrameT = 0;
function tick(now) {
  requestAnimationFrame(tick);
  if (now - lastFrameT < 31) return;
  lastFrameT = now;
  for (const f of frames) {
    if (!frameDynamic(f) && !f.needsRender) continue;
    f.needsRender = false;
    renderFrame(f, now);
  }
}
function requestRender() { const f = F(); if (f) f.needsRender = true; }

// ============================================================
// O ESPAÇO — pan / zoom / drag de frames
// ============================================================
const space = document.getElementById('space');
const world = document.getElementById('world');
const GRID = 19;
let view = { x: 0, y: 0, z: 1 };

function applyView() {
  world.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.z})`;
  world.style.setProperty('--st-z', view.z);
  world.style.setProperty('--st-invz', 1 / view.z);
  const g = GRID * view.z;
  space.style.backgroundSize = `${g}px ${g}px`;
  space.style.backgroundPosition = `${view.x}px ${view.y}px`;
  document.getElementById('zoomLabel').textContent = Math.round(view.z * 100) + '%';
  if (typeof scheduleSave === 'function') scheduleSave();
}

function zoomAt(cx, cy, k) {
  const nz = Math.min(3, Math.max(0.15, view.z * k));
  const kk = nz / view.z;
  view.x = cx - (cx - view.x) * kk;
  view.y = cy - (cy - view.y) * kk;
  view.z = nz;
  applyView();
}

function fitView() {
  if (!frames.length) return;
  const x0 = Math.min(...frames.map(f => f.x));
  const y0 = Math.min(...frames.map(f => f.y)) - 40;
  const x1 = Math.max(...frames.map(f => f.x + f.PW + DOCK_GAP + DOCK_W));
  const y1 = Math.max(...frames.map(f => f.y + f.PH));
  const vw = window.innerWidth, vh = window.innerHeight;
  const z = Math.min(1.6, vw * 0.85 / (x1 - x0), vh * 0.72 / (y1 - y0));
  view.z = z;
  view.x = (vw - (x1 - x0) * z) / 2 - x0 * z;
  view.y = (vh - (y1 - y0) * z) / 2 - y0 * z + 10;
  applyView();
}

space.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.012));
  } else {
    view.x -= e.deltaX;
    view.y -= e.deltaY;
    applyView();
  }
}, { passive: false });

const pointers = new Map();
let pinchD0 = 0, pinchZ0 = 1;
let dragFrame = null; // {frame, dx, dy}
space.addEventListener('pointerdown', e => {
  if (e.target.closest('.stk-card, .stk-add, .fl-x, #topbar, #inspector, #toolsModal, #viewHud')) return;
  const frEl = e.target.closest('.frame');
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    pinchD0 = Math.hypot(a.x - b.x, a.y - b.y);
    pinchZ0 = view.z;
    dragFrame = null;
  } else if (frEl) {
    const frame = frames.find(f => f.id === frEl.dataset.fid);
    if (frame) {
      setActive(frame.id);
      dragFrame = { frame, x0: frame.x, y0: frame.y, sx: e.clientX, sy: e.clientY };
    }
  }
  space.setPointerCapture(e.pointerId);
  space.classList.add('panning');
});
space.addEventListener('pointermove', e => {
  const p = pointers.get(e.pointerId);
  if (!p) return;
  if (pointers.size === 2) {
    p.x = e.clientX; p.y = e.clientY;
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    if (pinchD0 > 0) zoomAt((a.x + b.x) / 2, (a.y + b.y) / 2, (pinchZ0 * (d / pinchD0)) / view.z);
  } else if (dragFrame) {
    dragFrame.frame.x = dragFrame.x0 + (e.clientX - dragFrame.sx) / view.z;
    dragFrame.frame.y = dragFrame.y0 + (e.clientY - dragFrame.sy) / view.z;
    layoutWorld();
  } else {
    view.x += e.clientX - p.x;
    view.y += e.clientY - p.y;
    p.x = e.clientX; p.y = e.clientY;
    applyView();
  }
});
const endPointer = e => {
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinchD0 = 0;
  if (!pointers.size) { space.classList.remove('panning'); dragFrame = null; }
};
space.addEventListener('pointerup', endPointer);
space.addEventListener('pointercancel', endPointer);
window.addEventListener('resize', fitView);

function layoutWorld() {
  const wires = document.getElementById('wires');
  let paths = '';
  let maxX = 0, maxY = 0;
  for (const f of frames) {
    f.el.style.left = f.x + 'px';
    f.el.style.top = f.y + 'px';
    f.dock.style.left = (f.x + f.PW + DOCK_GAP) + 'px';
    f.dock.style.top = f.y + 'px';
    const x0 = f.x + f.PW + 4, y0 = f.y + 40, x1 = f.x + f.PW + DOCK_GAP - 4, y1 = f.y + 26;
    paths += `<path d="M ${x0} ${y0} C ${x0 + 40} ${y0}, ${x1 - 40} ${y1}, ${x1} ${y1}"></path>`;
    maxX = Math.max(maxX, f.x + f.PW + DOCK_GAP + DOCK_W);
    maxY = Math.max(maxY, f.y + Math.max(f.PH, 400));
  }
  wires.setAttribute('width', maxX + 100);
  wires.setAttribute('height', maxY + 100);
  wires.innerHTML = paths;
}

// ============================================================
// STACK — modelo + UI (opera no frame ATIVO)
// ============================================================
function addFx(fxId, silent) {
  const f = F();
  const def = FX[fxId];
  if (!f || !def || f.stack.length >= 8) { if (f && f.stack.length >= 8) TipoUI.showToast('Stack cheio (8)'); return; }
  const uid = 'n' + (++uidSeq);
  const params = {};
  def.params.forEach(p => { params[p.k] = p.val; });
  f.stack.push({ uid, fx: fxId, on: true, params });
  f.selUid = uid;
  buildPane(f, uid);
  syncStackUI();
  openInspector();
  requestRender();
  if (!silent) TipoUI.showToast(def.name + ' no stack');
}

function removeFx(uid) {
  const f = frames.find(fr => fr.stack.some(n => n.uid === uid));
  if (!f) return;
  const i = f.stack.findIndex(n => n.uid === uid);
  f.stack.splice(i, 1);
  const pane = document.querySelector(`.fx-pane[data-uid="${uid}"]`);
  if (pane) pane.remove();
  if (f.selUid === uid) {
    f.selUid = f.stack.length ? f.stack[Math.min(i, f.stack.length - 1)].uid : null;
    if (!f.selUid) closeInspector();
  }
  f.needsRender = true;
  syncStackUI();
}

function moveFx(uid, dir) {
  const f = frames.find(fr => fr.stack.some(n => n.uid === uid));
  if (!f) return;
  const i = f.stack.findIndex(n => n.uid === uid);
  const j = i + dir;
  if (j < 0 || j >= f.stack.length) return;
  [f.stack[i], f.stack[j]] = [f.stack[j], f.stack[i]];
  f.needsRender = true;
  syncStackUI();
}

function toggleFx(uid) {
  const f = frames.find(fr => fr.stack.some(n => n.uid === uid));
  const n = f && f.stack.find(x => x.uid === uid);
  if (!n) return;
  n.on = !n.on;
  f.needsRender = true;
  syncStackUI();
}

function selectFx(uid) {
  const f = frames.find(fr => fr.stack.some(n => n.uid === uid));
  if (!f) return;
  activeId = f.id;
  f.selUid = uid;
  syncStackUI();
  openInspector();
}

const SRC_LABEL = { image: 'Imagem', video: 'Vídeo', webcam: 'Webcam' };
function syncStackUI() {
  frames.forEach((f, fi) => {
    const dock = f.dock;
    dock.innerHTML = '';
    const src = document.createElement('div');
    src.className = 'stk-card stk-src';
    src.innerHTML =
      `<span class="stk-ico" style="background:#2A8A7A;">Sr</span>` +
      `<span class="stk-name">${f.sourceType ? SRC_LABEL[f.sourceType] : 'Demo TIPÓ'}<span class="stk-sub">fonte</span></span>` +
      `<span class="stk-btns"><button type="button" title="trocar">&#8644;</button></span>`;
    src.addEventListener('click', () => { setActive(f.id); openTools(); });
    dock.appendChild(src);
    f.stack.forEach(n => {
      const def = FX[n.fx];
      const card = document.createElement('div');
      card.className = 'stk-card' + (f.id === activeId && n.uid === f.selUid ? ' sel' : '') + (n.on ? '' : ' off');
      card.dataset.uid = n.uid;
      card.innerHTML =
        `<span class="stk-ico" style="background:${def.ico};">${def.sym}</span>` +
        `<span class="stk-name">${def.name}</span>` +
        `<span class="stk-btns">` +
        `<button type="button" class="stk-up" title="sobe">&#9650;</button>` +
        `<button type="button" class="stk-dn" title="desce">&#9660;</button>` +
        `<button type="button" class="stk-x" title="remove">&times;</button></span>` +
        `<span class="stk-dot" title="on/off"></span>`;
      card.addEventListener('click', () => selectFx(n.uid));
      card.querySelector('.stk-dot').addEventListener('click', e => { e.stopPropagation(); toggleFx(n.uid); });
      card.querySelector('.stk-up').addEventListener('click', e => { e.stopPropagation(); moveFx(n.uid, -1); });
      card.querySelector('.stk-dn').addEventListener('click', e => { e.stopPropagation(); moveFx(n.uid, 1); });
      card.querySelector('.stk-x').addEventListener('click', e => { e.stopPropagation(); removeFx(n.uid); });
      dock.appendChild(card);
    });
    const add = document.createElement('button');
    add.type = 'button';
    add.className = 'stk-add';
    add.textContent = '+ efeito';
    add.addEventListener('click', () => { setActive(f.id); openTools(); });
    dock.appendChild(add);
    // label + outline
    f.el.classList.toggle('active', f.id === activeId);
    const nameEl = f.el.querySelector('.fl-name');
    if (!nameEl.querySelector('input')) nameEl.textContent = f.name || `frame ${fi + 1}`;
    const syms = f.stack.filter(n => n.on).map(n => FX[n.fx].sym.toLowerCase());
    f.el.querySelector('.fl-chain').textContent = syms.length ? syms.join(' → ') : 'passthrough';
    f.el.querySelector('.fl-res').textContent = `${f.PW}×${f.PH}`;
  });
  syncRecUI();
  document.querySelectorAll('.fx-pane').forEach(p => {
    const f = F();
    p.classList.toggle('sel', !!f && p.dataset.uid === f.selUid);
  });
  syncInspector();
  layoutWorld();
  if (typeof scheduleSave === 'function') scheduleSave();
}

function buildPane(frame, uid) {
  const n = frame.stack.find(x => x.uid === uid);
  const def = FX[n.fx];
  const pane = document.createElement('div');
  pane.className = 'fx-pane';
  pane.dataset.uid = uid;
  def.params.forEach(p => {
    const id = `st_${uid}_${p.k}`;
    if (p.type === 'color') {
      const row = document.createElement('div');
      row.className = 'color-row';
      row.innerHTML = `<label>${p.label}</label><input type="color" id="${id}" value="${p.val}">`;
      row.querySelector('input').addEventListener('input', e => { n.params[p.k] = e.target.value; frame.needsRender = true; });
      pane.appendChild(row);
    } else if (p.type === 'select') {
      const row = document.createElement('div');
      row.className = 'color-row';
      row.innerHTML = `<label>${p.label}</label>`;
      const sel = document.createElement('select');
      sel.id = id;
      p.options.forEach((o, i) => {
        const op = document.createElement('option');
        op.value = i; op.textContent = o;
        sel.appendChild(op);
      });
      sel.value = p.val;
      sel.addEventListener('change', e => { n.params[p.k] = Number(e.target.value); frame.needsRender = true; });
      row.appendChild(sel);
      pane.appendChild(row);
    } else {
      const row = document.createElement('div');
      row.className = 'range-row';
      row.innerHTML =
        `<span class="range-label">${p.label}</span>` +
        `<input type="range" id="${id}" min="${p.min}" max="${p.max}" step="1" value="${p.val}">` +
        `<span class="range-value" id="${id}Val">${p.val}</span>`;
      const inp = row.querySelector('input');
      inp.addEventListener('input', () => {
        n.params[p.k] = Number(inp.value);
        document.getElementById(id + 'Val').textContent = inp.value;
        frame.needsRender = true;
      });
      pane.appendChild(row);
    }
  });
  document.getElementById('paramsHost').appendChild(pane);
}

function clearStack() {
  const f = F();
  if (!f) return;
  f.stack.forEach(n => {
    const pane = document.querySelector(`.fx-pane[data-uid="${n.uid}"]`);
    if (pane) pane.remove();
  });
  f.stack = [];
  f.selUid = null;
  closeInspector();
  f.needsRender = true;
  syncStackUI();
}

// INSPECTOR flutuante (node selecionado do frame ativo)

const inspector = document.getElementById('inspector');
function openInspector() {
  const f = F();
  if (!f || !f.selUid) return;
  inspector.classList.add('open');
  syncInspector();
}
function closeInspector() { inspector.classList.remove('open'); }
function syncInspector() {
  const f = F();
  const n = f && f.stack.find(x => x.uid === f.selUid);
  if (!n) { closeInspector(); return; }
  const def = FX[n.fx];
  const ico = document.getElementById('inspIco');
  ico.style.background = def.ico;
  ico.textContent = def.sym;
  document.getElementById('inspName').textContent = def.name;
  document.getElementById('inspBypass').style.color = n.on ? 'var(--accent)' : 'var(--text-5)';
}
document.getElementById('inspClose').addEventListener('click', () => closeInspector());
document.getElementById('inspBypass').addEventListener('click', () => { const f = F(); if (f && f.selUid) toggleFx(f.selUid); });
document.getElementById('inspRemove').addEventListener('click', () => { const f = F(); if (f && f.selUid) removeFx(f.selUid); });

(() => {
  const head = document.getElementById('inspHead');
  let drag = null;
  head.addEventListener('pointerdown', e => {
    if (e.target.tagName === 'BUTTON' || window.innerWidth <= 768) return;
    const r = inspector.getBoundingClientRect();
    drag = { dx: e.clientX - r.left, dy: e.clientY - r.top };
    head.setPointerCapture(e.pointerId);
  });
  head.addEventListener('pointermove', e => {
    if (!drag) return;
    inspector.style.left = Math.max(4, Math.min(window.innerWidth - 260, e.clientX - drag.dx)) + 'px';
    inspector.style.top = Math.max(4, Math.min(window.innerHeight - 120, e.clientY - drag.dy)) + 'px';
  });
  head.addEventListener('pointerup', () => { drag = null; });
})();

// ============================================================
// PRESETS de receita (frame ativo)
// ============================================================
const STACK_PRESETS = {
  riso:   [{ fx: 'halftone', params: { cell: 11, angle: 15, gain: 108, ink: 2 } },
           { fx: 'grain', params: { amt: 28, vig: 22 } }],
  print:  [{ fx: 'bayer', params: { levels: 3, scale: 2 } },
           { fx: 'gradmap', params: {} }],
  vhs:    [{ fx: 'wave', params: { amp: 10, freq: 9, speed: 45 } },
           { fx: 'glitch', params: { shift: 9, slices: 45, scan: 45 } },
           { fx: 'grain', params: { amt: 42, vig: 38 } }],
  poster: [{ fx: 'posterize', params: { levels: 4, contrast: 30 } },
           { fx: 'gradmap', params: {} }],
  zine:   [{ fx: 'pixelate', params: { size: 5 } },
           { fx: 'bayer', params: { levels: 2, scale: 3 } },
           { fx: 'grain', params: { amt: 30, vig: 15 } }],
  dream:  [{ fx: 'wave', params: { amp: 26, freq: 4, speed: 18 } },
           { fx: 'gradmap', params: { c0: '#1B5A4E', c1: '#2A8A7A', c2: '#99E0D2', c3: '#F8F5F0' } },
           { fx: 'grain', params: { amt: 20, vig: 34 } }],
  terminal: [{ fx: 'ascii', params: { cell: 12, mode: 2, invert: 0 } },
             { fx: 'grain', params: { amt: 18, vig: 40 } }],
  noir:   [{ fx: 'adjust', params: { bright: -8, contrast: 35, sat: 0, hue: 0 } },
           { fx: 'duotone', params: { cut: 52, soft: 22, ink: '#1A1818', paper: '#F8F5F0' } },
           { fx: 'aberration', params: { amt: 18, edge: 80 } },
           { fx: 'grain', params: { amt: 38, size: 2, vig: 48 } }],
};

function applyStackPreset(name) {
  const recipe = STACK_PRESETS[name];
  const f = F();
  if (!recipe || !f) return;
  clearStack();
  recipe.forEach(r => {
    addFx(r.fx, true);
    const node = f.stack[f.stack.length - 1];
    Object.assign(node.params, r.params);
    FX[r.fx].params.forEach(p => {
      const el = document.getElementById(`st_${node.uid}_${p.k}`);
      if (!el) return;
      el.value = node.params[p.k];
      const val = document.getElementById(`st_${node.uid}_${p.k}Val`);
      if (val) val.textContent = node.params[p.k];
    });
  });
  f.selUid = f.stack.length ? f.stack[0].uid : null;
  closeInspector();
  syncStackUI();
  f.needsRender = true;
}
document.getElementById('presetSel').addEventListener('change', e => {
  if (e.target.value) { applyStackPreset(e.target.value); TipoUI.showToast('Receita ' + e.target.value); }
  e.target.value = '';
});
function resetAll() { applyStackPreset('riso'); }

// ============================================================
// PERSISTÊNCIA DO ESPAÇO (IndexedDB — auto-save com debounce)
// Frames (posição/nome/fonte/stack/params) + view sobrevivem ao
// reload. Mídia como ArrayBuffer+mime (GOTCHA Safari: Blob no IDB
// aborta no WebKit — mesmo padrão da galeria do Fotograma).
// Webcam não persiste (volta como demo, stack preservado).
// ============================================================
const DB_NAME = 'tipo-studio';
let _db = null;
let mediaSeq = 0;
let _saveT = null;
let _restoring = false;

function db() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const rq = indexedDB.open(DB_NAME, 1);
    rq.onupgradeneeded = () => {
      rq.result.createObjectStore('space');
      rq.result.createObjectStore('media');
    };
    rq.onsuccess = () => { _db = rq.result; res(_db); };
    rq.onerror = () => rej(rq.error);
  });
}
function idb(store, mode, fn) {
  return db().then(d => new Promise((res, rej) => {
    const tx = d.transaction(store, mode);
    const rq = fn(tx.objectStore(store));
    tx.oncomplete = () => res(rq && rq.result);
    tx.onerror = () => rej(tx.error);
  }));
}

function scheduleSave() {
  if (_restoring) return;
  clearTimeout(_saveT);
  _saveT = setTimeout(saveSpace, 800);
}

async function saveSpace() {
  try {
    const rec = {
      savedAt: Date.now(),
      view: { x: view.x, y: view.y, z: view.z },
      activeIdx: Math.max(0, frames.findIndex(f => f.id === activeId)),
      frames: frames.map(f => ({
        name: f.name, x: f.x, y: f.y,
        sourceType: (f.sourceType === 'image' || f.sourceType === 'video') ? f.sourceType : null,
        mediaKey: f.mediaKey || null,
        selIdx: f.stack.findIndex(n => n.uid === f.selUid),
        stack: f.stack.map(n => ({ fx: n.fx, on: n.on, params: { ...n.params } })),
      })),
    };
    await idb('space', 'readwrite', s => s.put(rec, 'current'));
    // GC de mídia órfã
    const used = new Set(rec.frames.map(f => f.mediaKey).filter(Boolean));
    const keys = await idb('media', 'readonly', s => s.getAllKeys());
    for (const k of keys || []) {
      if (!used.has(k)) await idb('media', 'readwrite', s => s.delete(k));
    }
  } catch (e) { console.warn('[studio] save:', e); }
}

async function persistMedia(frame, file) {
  try {
    const buf = await file.arrayBuffer();
    const key = 'm' + Date.now() + '-' + (++mediaSeq);
    await idb('media', 'readwrite', s => s.put({ buf, mime: file.type }, key));
    frame.mediaKey = key;
    scheduleSave();
  } catch (e) {
    frame.mediaKey = null;
    console.warn('[studio] mídia não persistida:', e);
    TipoUI.showToast('Mídia grande demais pra salvar — o setup fica salvo sem ela');
  }
}

async function restoreSpace() {
  try {
    const rec = await idb('space', 'readonly', s => s.get('current'));
    if (!rec || !rec.frames || !rec.frames.length) return false;
    _restoring = true;
    for (const fr of rec.frames) {
      const f = newFrame({ blank: true, silent: true, x: fr.x, y: fr.y });
      f.name = fr.name || '';
      fr.stack.forEach(n => {
        addFx(n.fx, true);
        const c = f.stack[f.stack.length - 1];
        c.on = n.on;
        Object.assign(c.params, n.params);
        FX[n.fx].params.forEach(p => {
          const el = document.getElementById(`st_${c.uid}_${p.k}`);
          if (!el) return;
          el.value = c.params[p.k];
          const val = document.getElementById(`st_${c.uid}_${p.k}Val`);
          if (val) val.textContent = c.params[p.k];
        });
      });
      f.selUid = (fr.selIdx >= 0 && f.stack[fr.selIdx]) ? f.stack[fr.selIdx].uid : null;
      if (fr.mediaKey) {
        f.mediaKey = fr.mediaKey;
        const m = await idb('media', 'readonly', s => s.get(fr.mediaKey));
        if (m && m.buf) loadFile(new Blob([m.buf], { type: m.mime }), f, { persist: false });
      }
    }
    activeId = frames[rec.activeIdx] ? frames[rec.activeIdx].id : frames[0].id;
    closeInspector();
    syncStackUI();
    if (rec.view && rec.view.z) { view = rec.view; applyView(); } else fitView();
    _restoring = false;
    return true;
  } catch (e) {
    console.warn('[studio] restore:', e);
    _restoring = false;
    return false;
  }
}

async function resetSpace() {
  if (!confirm('Apagar o espaço salvo e recomeçar do zero?')) return;
  try {
    await idb('space', 'readwrite', s => s.clear());
    await idb('media', 'readwrite', s => s.clear());
  } catch (e) {}
  location.reload();
}

// qualquer mexida nos params salva (delegado — panes são dinâmicos)
document.getElementById('paramsHost').addEventListener('input', scheduleSave);
document.getElementById('paramsHost').addEventListener('change', scheduleSave);

// ============================================================
// FONTE (por frame)
// ============================================================
function releaseSource(frame) {
  if (frame.webcamStream) { frame.webcamStream.getTracks().forEach(t => t.stop()); frame.webcamStream = null; }
  if (frame.srcVideo) { frame.srcVideo.pause(); frame.srcVideo = null; }
  if (frame.mediaUrl) {
    // frames duplicados compartilham a URL — só revoga o último usuário
    const shared = frames.some(o => o !== frame && o.mediaUrl === frame.mediaUrl);
    if (!shared) URL.revokeObjectURL(frame.mediaUrl);
    frame.mediaUrl = null;
  }
}

function useDemo() {
  const f = F();
  if (!f) return;
  releaseSource(f);
  f.mediaKey = null;
  f.sourceType = null;
  setFrameSize(f, 960, 720);
  f.needsRender = true;
  syncStackUI();
}

function loadFile(file, targetFrame, opts = {}) {
  const f = targetFrame || F();
  if (!f) return;
  releaseSource(f);
  if (opts.persist !== false) { f.mediaKey = null; persistMedia(f, file); }
  f.mediaUrl = URL.createObjectURL(file);
  if (file.type.startsWith('video/')) {
    const v = document.createElement('video');
    v.src = f.mediaUrl;
    v.loop = true; v.muted = true; v.playsInline = true;
    v.addEventListener('loadedmetadata', () => {
      f.sourceType = 'video';
      f.srcVideo = v;
      setFrameSize(f, v.videoWidth, v.videoHeight);
      v.play();
      f.needsRender = true;
      syncStackUI();
    });
  } else {
    const img = new Image();
    img.onload = () => {
      f.sourceType = 'image';
      f.srcImage = img;
      setFrameSize(f, img.naturalWidth, img.naturalHeight);
      f.needsRender = true;
      syncStackUI();
    };
    img.src = f.mediaUrl;
  }
}

async function toggleWebcam() {
  const f = F();
  if (!f) return;
  if (f.sourceType === 'webcam') { useDemo(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    releaseSource(f);
    f.webcamStream = stream;
    const v = document.createElement('video');
    v.srcObject = stream;
    v.muted = true; v.playsInline = true;
    v.addEventListener('loadedmetadata', () => {
      f.sourceType = 'webcam';
      f.srcVideo = v;
      setFrameSize(f, v.videoWidth, v.videoHeight);
      v.play();
      f.needsRender = true;
      syncStackUI();
    });
  } catch (e) {
    TipoUI.showToast('Webcam negada');
  }
}

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});
// drop: sobre um frame troca a fonte DELE; no vazio cria frame NOVO ali
space.addEventListener('dragover', e => e.preventDefault());
space.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const frEl = e.target.closest('.frame');
  if (frEl) {
    const f = frames.find(x => x.id === frEl.dataset.fid);
    if (f) { setActive(f.id); loadFile(file, f); }
  } else {
    const wx = (e.clientX - view.x) / view.z;
    const wy = (e.clientY - view.y) / view.z;
    const nf = newFrame({ x: wx, y: wy, blank: true, silent: true });
    loadFile(file, nf);
    TipoUI.showToast('Frame novo com tua mídia');
  }
});

// ============================================================
// EXPORT (frame ativo)
// ============================================================
function exportPNG() {
  const f = F();
  if (!f) return;
  renderFrame(f, performance.now());
  f.canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tipo-studio-${frameName(f).replace(/\s+/g, '-').toLowerCase()}.png`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }, 'image/png');
}

function syncRecUI() {
  const live = !!(recorder && recorder.isRecording);
  document.getElementById('recBtn').classList.toggle('rec-live', live);
  frames.forEach(f => {
    const isRec = live && f.id === recFrameId;
    f.el.classList.toggle('recording', isRec);
    const b = f.el.querySelector('.fl-rec');
    if (b) { b.classList.toggle('live', isRec); b.innerHTML = isRec ? '&#9632;' : '&#9679;'; b.title = isRec ? 'parar a gravação' : 'gravar ESTE frame'; }
  });
}

async function toggleRec() {
  const f = F();
  if (!f) return;
  recFrameId = f.id;
  recorder = await TipoUI.toggleVisualRec(f.canvas);
  syncRecUI();
}

// ============================================================
// BOOT — restaura o espaço salvo; sem save, nasce o frame Riso
// ============================================================
TipoUI.initChrome('visual');
(async () => {
  const restored = await restoreSpace();
  if (!restored) {
    newFrame({ silent: true }); // frame 1 nasce com a receita Riso
    fitView();
  }
  requestAnimationFrame(tick);
})();
