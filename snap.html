<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Snap</title>
<link rel="stylesheet" href="shared/style.css?v=20260612-bhv">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js?v=20260612-cap"></script>
<script src="shared/ui.js?v=20260702-gif1"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="tipo-panel" id="panel">
  <h1>Snap <span style="display:flex;gap:8px;"><a href="index.html#animation" class="back-link">KINETIC TYPE</a><a href="index.html" class="back-link">HOME</a></span></h1>
  <div class="section"><div class="section-title">Text</div><input type="text" id="textInput" value="TIPÓ" placeholder="Type here..."></div>
  <div class="section"><div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('elastic')">Elastic</span>
      <span class="preset-chip" onclick="applyPreset('stagger')">Stagger</span>
      <span class="preset-chip" onclick="applyPreset('wave')">Wave</span>
      <span class="preset-chip" onclick="applyPreset('bounce')">Bounce</span>
      <span class="preset-chip" onclick="applyPreset('pride')">Pride</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>
  <div class="section"><div class="section-title">Animation</div>
    <div class="range-row"><span class="range-label">Font Size</span><input type="range" id="fontSize" min="20" max="300" value="80"><span class="range-value" id="fontSizeVal">80</span></div>
    <div class="range-row"><span class="range-label">Speed</span><input type="range" id="speed" min="1" max="100" value="30"><span class="range-value" id="speedVal">30</span></div>
    <div class="range-row"><span class="range-label">Stagger</span><input type="range" id="stagger" min="0" max="100" value="30"><span class="range-value" id="staggerVal">30</span></div>
    <div class="range-row"><span class="range-label">Amplitude</span><input type="range" id="amplitude" min="0" max="100" value="50"><span class="range-value" id="amplitudeVal">50</span></div>
    <div class="range-row"><span class="range-label">Easing</span><input type="range" id="easing" min="0" max="9" value="7"><span class="range-value" id="easingVal">back</span></div>
    <div class="range-row"><span class="range-label">Organic</span><input type="range" id="organic" min="0" max="100" value="0"><span class="range-value" id="organicVal">0</span></div>
  </div>
  <div class="section"><div class="section-title">Color</div>
    <div class="color-section-row"><span class="range-label">Text</span><input type="color" id="typeColor" value="#1A1818"><button class="swap-btn" onclick="swapColors()" title="Swap">&#8646;</button><input type="color" id="bgColor" value="#F8F5F0"><span class="range-label">Bg</span></div>
  </div>
  <div class="section section-divider"><div class="section-title">Export</div><div class="btn-row"><button class="btn" onclick="savePNG()">PNG</button><button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button></div><div class="record-timer" id="recTimer"></div></div>
  <div style="height:40px;"></div>
</div>
<div id="canvasContainer"></div>
<div class="tipo-progress-overlay" id="exportProgress"><div class="progress-box"><div class="progress-title" id="progressTitle">Finalizing...</div><div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div><div class="progress-info" id="progressInfo"></div></div></div>
<div class="tipo-toast" id="toast"></div>
<script>
let font, recorder;
let prideMode = false;
const prideColors = ['#e70000','#ff8c00','#ffef00','#00811f','#0044ff','#760089'];

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }
function setup() {
  const c = createCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
  c.parent('canvasContainer'); textFont(font); pixelDensity(1);
  TipoUI.init({ mode: 'snap', formatters: { easing: v => TipoEase._names[v] } }); recorder = TipoUI.recorder;
}
function windowResized() { resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight); }
function val(id) { return TipoUI.val(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

// Professional easing via shared library
function ease(t) {
  t = constrain(t, 0, 1);
  return TipoEase.byIndex(val('easing'), 'out')(t);
}

function draw() {
  background(document.getElementById('bgColor').value);
  const txt = document.getElementById('textInput').value || 'TIPÓ';
  const fSize = val('fontSize');
  const spd = val('speed');
  const stag = val('stagger') / 10;
  const amp = val('amplitude') / 100;
  const txtC = document.getElementById('typeColor').value;
  const org = val('organic') * 0.3;
  TipoNoise.update();
  const totalFrames = 60 + txt.length * stag;
  const loopFrame = frameCount % totalFrames;

  textSize(fSize);
  textAlign(CENTER, CENTER);
  noStroke();

  for (let i = 0; i < txt.length; i++) {
    const delay = i * stag;
    const t = constrain((loopFrame - delay) / spd, 0, 1);
    const eased = ease(t);

    // Three-stage animation: enter → hold → exit
    const phase = (loopFrame - delay) / totalFrames * 3;
    let yOff = 0, xScale = 1, alpha = 255;

    if (phase < 1) {
      // Enter: slide up + scale
      yOff = (1 - eased) * height * amp;
      xScale = 0.5 + eased * 0.5;
      alpha = eased * 255;
    } else if (phase < 2) {
      // Hold
      yOff = 0; xScale = 1; alpha = 255;
    } else {
      // Exit: slide down
      const exitT = ease(constrain((phase - 2), 0, 1));
      yOff = -exitT * fSize * 2;
      alpha = (1 - exitT) * 255;
    }

    const c = prideMode ? color(prideColors[i % 6]) : color(txtC);
    c.setAlpha(alpha);
    fill(c);

    // Organic noise jitter
    const jx = org > 0 ? TipoNoise.jitter(i, org) : 0;
    const jy = org > 0 ? TipoNoise.jitter(i + 500, org) : 0;
    const jr = org > 0 ? TipoNoise.jitter(i + 1000, org * 0.01) : 0;

    push();
    translate(width / 2 - (txt.length - 1) * fSize * 0.3 + i * fSize * 0.6 + jx, height / 2 + yOff + jy);
    rotate(jr);
    scale(xScale, 1);
    text(txt.charAt(i), 0, 0);
    pop();
  }
  TipoUI.captureFrame();
}

function swapColors() { TipoUI.swapColors('typeColor', 'bgColor'); }
function resetAll() { prideMode = false; setVal('fontSize',80);setVal('speed',30);setVal('stagger',30);setVal('amplitude',50);setVal('easing',7);setVal('organic',0); document.getElementById('typeColor').value='#1A1818';document.getElementById('bgColor').value='#F8F5F0'; }
const PRESETS = {
  elastic: () => { resetAll(); setVal('speed',20);setVal('stagger',50);setVal('amplitude',70);setVal('easing',9); },
  stagger: () => { resetAll(); setVal('speed',40);setVal('stagger',80);setVal('amplitude',30);setVal('fontSize',120);setVal('easing',5); },
  wave: () => { resetAll(); setVal('speed',15);setVal('stagger',15);setVal('amplitude',40);setVal('fontSize',100);setVal('easing',0); document.getElementById('bgColor').value='#0000ff'; },
  bounce: () => { resetAll(); setVal('speed',10);setVal('stagger',40);setVal('amplitude',90);setVal('fontSize',150);setVal('easing',8); document.getElementById('bgColor').value='#ff0000'; },
  pride: () => { prideMode = true; },
};
function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
async function toggleRec() { await TipoUI.toggleRec(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body></html>
