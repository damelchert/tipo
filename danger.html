<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Danger</title>
<link rel="stylesheet" href="shared/style.css?v=20260713-id1">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js" integrity="sha384-6Twx1hAeKnwfOYJAHtYeJETRiGD5pRPkjjh0pVbG1QoesncjOpw5e75Y1kOkXeRI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js" integrity="sha384-ut5hA6QX8px1vwvHCiy1MqfODbif8Iy0Gr+X61/AoNxP3VXx2wF99Pu9PeTEkG5E" crossorigin="anonymous"></script>
<script src="shared/recorder.js?v=20260722-rec3"></script>
<script src="shared/ui.js?v=20260722-au4"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="tipo-panel" id="panel">
  <h1>Danger <span style="display:flex;gap:8px;"><a href="index.html#2d" class="back-link">KINETIC TYPE</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">
    <div class="section-title">Text</div>
    <input type="text" id="textInput" value="TIPÓ" placeholder="Type here... (use | for line breaks)">
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('allYours')">All Yours</span>
      <span class="preset-chip" onclick="applyPreset('justOK')">Just OK</span>
      <span class="preset-chip" onclick="applyPreset('notSoGood')">Not So Good</span>
      <span class="preset-chip" onclick="applyPreset('cheer')">Cheer</span>
      <span class="preset-chip" onclick="applyPreset('date')">Date</span>
      <span class="preset-chip" onclick="applyPreset('hopes')">Hopes</span>
      <span class="preset-chip" onclick="applyPreset('circle')">Circle</span>
      <span class="preset-chip" onclick="applyPreset('pride')">Pride</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Distortion</div>
    <div class="range-row"><span class="range-label">Speed</span><input type="range" id="noiseSpeed" min="1" max="50" value="20"><span class="range-value" id="noiseSpeedVal">20</span></div>
    <div class="range-row"><span class="range-label">Radius</span><input type="range" id="radiusNoise" min="0" max="100" value="25"><span class="range-value" id="radiusNoiseVal">0.25</span></div>
    <div class="range-row"><span class="range-label">Complexity</span><input type="range" id="tumult" min="0" max="188" value="63"><span class="range-value" id="tumultVal">6.28</span></div>
  </div>

  <div class="section">
    <div class="section-title">Grid</div>
    <div class="range-row"><span class="range-label">Columns</span><input type="range" id="columns" min="1" max="150" value="45"><span class="range-value" id="columnsVal">45</span></div>
    <div class="range-row"><span class="range-label">Rows</span><input type="range" id="rows" min="1" max="150" value="45"><span class="range-value" id="rowsVal">45</span></div>
  </div>

  <div class="section">
    <div class="section-title">Type</div>
    <div class="range-row"><span class="range-label">Font Size</span><input type="range" id="fontSize" min="1" max="500" value="170"><span class="range-value" id="fontSizeVal">170</span></div>
    <div class="range-row"><span class="range-label">Leading</span><input type="range" id="leading" min="0" max="200" value="60"><span class="range-value" id="leadingVal">0.60</span></div>
    <label class="checkbox-label"><input type="checkbox" id="invert"> Invert colors</label>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="color-section-row">
      <span class="range-label">Text</span>
      <input type="color" id="typeColor" value="#1A1818">
      <button class="swap-btn" onclick="swapColors()" title="Swap colors">&#8646;</button>
      <input type="color" id="bgColor" value="#F8F5F0">
      <span class="range-label">Bg</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Background</div>
    <input type="file" id="bgMediaInput" accept="image/*,video/*">
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="clearBackgroundMedia()">Clear Media</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Mouse</div>
    <label class="checkbox-label"><input type="checkbox" id="mouseReact"> Mouse React</label>
    <div class="range-row"><span class="range-label">Strength</span><input type="range" id="mouseStr" min="0" max="100" value="50"><span class="range-value" id="mouseStrVal">50</span></div>
  </div>

  <div class="section section-divider">
    <div class="section-title">Export</div>
    <div class="btn-row">
      <button class="btn" onclick="savePNG()">PNG</button>
      <button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button>
    </div>
    <div class="record-timer" id="recTimer"></div>
  </div>
  <div style="height:40px;"></div>
</div>

<div id="canvasContainer"></div>
<div class="tipo-progress-overlay" id="exportProgress">
  <div class="progress-box">
    <div class="progress-title" id="progressTitle">Finalizing...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-info" id="progressInfo"></div>
  </div>
</div>
<div class="tipo-toast" id="toast"></div>

<script>
// ============================================================
// TIPÓ — DANGER MODE
// Perlin noise distortion on text buffers.
// Text is rendered to an off-screen 2D buffer, then displaced
// in a cell grid so this mode stays in the 2D export path.
// ============================================================
let font, recorder, resizeObserver;
let prideMode = false;
const prideColors = ['#e70000','#ff8c00','#ffef00','#00811f','#0044ff','#760089'];
let textBuffers = [];
let lastText = '';
let lastFontSize = 0;
let lastLeading = 0;
let lastTypeColor = '';
let lastCanvasW = 0;
let bgMedia = null;
let bgMediaUrl = '';

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }
window.addEventListener('tipofont', e => { font = e.detail; textFont(font); lastText = ''; });

function setup() {
  const container = document.getElementById('canvasContainer');
  const c = createCanvas(10, 10);
  c.parent(container);
  pixelDensity(1);
  textFont(font);
  frameRate(30);
  fitCanvas();
  requestAnimationFrame(fitCanvas);
  if ('ResizeObserver' in window) {
    resizeObserver = new ResizeObserver(() => {
      fitCanvas();
      lastText = '';
    });
    resizeObserver.observe(container);
  }

  TipoUI.init({
    mode: 'danger',
    formatters: {
      radiusNoise: { div: 100, decimals: 2 },
      tumult: { div: 10, decimals: 2 },
      leading: { div: 100, decimals: 2 }
    }
  });
  recorder = TipoUI.recorder;
  TipoMouse.init(c);
  document.getElementById('bgMediaInput').addEventListener('change', handleBackgroundMedia);
}

function getCanvasSize() {
  const container = document.getElementById('canvasContainer');
  const rect = container.getBoundingClientRect();
  return {
    w: max(1, round(rect.width || container.clientWidth || window.innerWidth)),
    h: max(1, round(rect.height || container.clientHeight || window.innerHeight))
  };
}

function fitCanvas() {
  const s = getCanvasSize();
  if (width !== s.w || height !== s.h) resizeCanvas(s.w, s.h);
}

function windowResized() { fitCanvas(); lastText = ''; }

function val(id) { return TipoUI.val(id); }
function chk(id) { return TipoUI.chk(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

// Easing function: S-curve
function easer(step) {
  return pow(step, 4) / (pow(step, 4) + pow(1 - step, 4));
}

// Build one transparent text texture, then distort it in 2D cells.
function buildTextures(txt, fSize, ldng, foreC) {
  const lines = txt.split('|');
  textBuffers.forEach(b => b.remove()); // free old p5.Graphics (rebuilds happen often, e.g. during preset color morph)
  textBuffers = [];
  const lineH = fSize * 1.18;
  const leadingPx = fSize * ldng;
  const totalH = max(1, lines.length * lineH + max(0, lines.length - 1) * leadingPx);
  const g = createGraphics(width, ceil(totalH));
  g.pixelDensity(1);
  g.clear();
  g.noStroke();
  g.textFont(font);
  g.textSize(fSize);
  g.textAlign(CENTER, CENTER);
  for (let z = 0; z < lines.length; z++) {
    g.fill(prideMode ? prideColors[z % prideColors.length] : foreC);
    const y = z * (lineH + leadingPx) + lineH / 2;
    g.text(lines[z], g.width / 2, y);
  }
  textBuffers.push(g);
}

function draw() {
  fitCanvas();
  TipoMouse.update();
  const isInvert = chk('invert');
  const foreC = isInvert ? '#ffffff' : document.getElementById('typeColor').value;
  const bgC = isInvert ? '#000000' : document.getElementById('bgColor').value;
  drawBackground(prideMode ? '#000000' : bgC);

  const txt = document.getElementById('textInput').value || 'TIPÓ';
  const nSpeed = val('noiseSpeed');
  const radNoise = val('radiusNoise') / 100;
  const tumult = val('tumult') / 10;
  const cols = val('columns');
  const rws = val('rows');
  const fSize = val('fontSize');
  const ldng = val('leading') / 100;

  // Rebuild textures if needed
  if (
    txt !== lastText ||
    fSize !== lastFontSize ||
    ldng !== lastLeading ||
    foreC !== lastTypeColor ||
    width !== lastCanvasW
  ) {
    buildTextures(txt, fSize, ldng, foreC);
    lastText = txt;
    lastFontSize = fSize;
    lastLeading = ldng;
    lastTypeColor = foreC;
    lastCanvasW = width;
  }

  const buffer = textBuffers[0];
  if (!buffer) return;
  drawDistortedBuffer(buffer, cols, rws, nSpeed, radNoise, tumult);

  TipoUI.captureFrame();
}

function drawBackground(bgC) {
  background(bgC);
  if (!bgMedia || !bgMedia.ready) return;

  const el = bgMedia.el;
  const sw = bgMedia.type === 'video' ? el.videoWidth : el.naturalWidth;
  const sh = bgMedia.type === 'video' ? el.videoHeight : el.naturalHeight;
  if (!sw || !sh) return;

  const scale = max(width / sw, height / sh);
  const dw = sw * scale;
  const dh = sh * scale;
  const dx = (width - dw) / 2;
  const dy = (height - dh) / 2;
  drawingContext.drawImage(el, dx, dy, dw, dh);
}

function handleBackgroundMedia(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  clearBackgroundMedia(false);

  bgMediaUrl = URL.createObjectURL(file);
  if (file.type.startsWith('video/')) {
    const video = document.createElement('video');
    video.src = bgMediaUrl;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.autoplay = true;
    bgMedia = { type: 'video', el: video, ready: false };
    video.addEventListener('loadeddata', () => {
      bgMedia.ready = true;
      video.play().catch(() => {});
    }, { once: true });
    video.load();
  } else {
    const img = new Image();
    bgMedia = { type: 'image', el: img, ready: false };
    img.onload = () => { bgMedia.ready = true; };
    img.src = bgMediaUrl;
  }
}

function clearBackgroundMedia(clearInput = true) {
  if (bgMedia && bgMedia.type === 'video') {
    bgMedia.el.pause();
    bgMedia.el.removeAttribute('src');
    bgMedia.el.load();
  }
  if (bgMediaUrl) URL.revokeObjectURL(bgMediaUrl);
  bgMedia = null;
  bgMediaUrl = '';
  if (clearInput) document.getElementById('bgMediaInput').value = '';
}

function drawDistortedBuffer(buffer, cols, rws, nSpeed, radNoise, tumult) {
  const ctx = drawingContext;
  ctx.save();
  ctx.imageSmoothingEnabled = true;

  const drawCols = min(max(1, cols), 110);
  const drawRows = min(max(1, rws), 110);
  const cellW = buffer.width / drawCols;
  const cellH = buffer.height / drawRows;
  const topY = height / 2 - buffer.height / 2;
  let anchorX = width / 2;
  let anchorY = height / 2;

  if (chk('mouseReact') && TipoMouse.active) {
    const mStr = val('mouseStr') / 100;
    anchorX = lerp(anchorX, (TipoMouse.sx * 0.5 + 0.5) * width, mStr);
    anchorY = lerp(anchorY, (TipoMouse.sy * 0.5 + 0.5) * height, mStr);
  }

  const baseSpot = max(width, height) * 0.72;
  const strength = radNoise * min(width, height) * 0.22;

  for (let y = 0; y < drawRows; y++) {
    for (let x = 0; x < drawCols; x++) {
      const sx = x * cellW;
      const sy = y * cellH;
      const cx = sx + cellW / 2;
      const cy = topY + sy + cellH / 2;
      const d = dist(cx, cy, anchorX, anchorY);
      const falloff = easer(constrain(1 - d / baseSpot, 0, 1));
      const n = noise(
        (cx - nSpeed * 18 * frameCount) * 0.004,
        (cy + nSpeed * 8 * frameCount) * 0.004,
        frameCount * nSpeed * 0.0009
      );
      const angle = map(n, 0, 1, -tumult, tumult);
      const lineWave = sin((cy + frameCount * nSpeed) * 0.025) * strength * 0.08;
      const dx = sx + cos(angle) * strength * falloff + lineWave;
      const dy = topY + sy + sin(angle) * strength * falloff;
      ctx.drawImage(
        buffer.elt,
        sx, sy, cellW + 1, cellH + 1,
        dx, dy, cellW + 1, cellH + 1
      );
    }
  }
  ctx.restore();
}

// ============================================================
// PRESETS
// ============================================================
function swapColors() { TipoUI.swapColors('typeColor', 'bgColor'); }

function resetAll() {
  prideMode = false;
  setVal('noiseSpeed', 20); setVal('radiusNoise', 25); setVal('tumult', 63);
  setVal('columns', 45); setVal('rows', 45);
  setVal('fontSize', 170); setVal('leading', 60); setVal('invert', false);
  document.getElementById('typeColor').value = '#1A1818';
  document.getElementById('bgColor').value = '#F8F5F0';
  lastText = '';
}

const PRESETS = {
  allYours: () => { resetAll();
    setVal('noiseSpeed',20);setVal('radiusNoise',80);setVal('tumult',157);
    setVal('columns',45);setVal('rows',45);setVal('fontSize',85);setVal('leading',75);setVal('invert',false);
  },
  justOK: () => { resetAll();
    setVal('noiseSpeed',12);setVal('radiusNoise',80);setVal('tumult',157);
    setVal('columns',15);setVal('rows',150);setVal('fontSize',500);setVal('leading',60);setVal('invert',false);
  },
  notSoGood: () => { resetAll();
    setVal('noiseSpeed',10);setVal('radiusNoise',100);setVal('tumult',157);
    setVal('columns',30);setVal('rows',30);setVal('fontSize',220);setVal('leading',65);setVal('invert',true);
  },
  cheer: () => { resetAll();
    setVal('noiseSpeed',15);setVal('radiusNoise',20);setVal('tumult',126);
    setVal('columns',40);setVal('rows',50);setVal('fontSize',110);setVal('leading',40);setVal('invert',true);
  },
  date: () => { resetAll();
    setVal('noiseSpeed',15);setVal('radiusNoise',20);setVal('tumult',188);
    setVal('columns',80);setVal('rows',80);setVal('fontSize',50);setVal('leading',65);setVal('invert',true);
  },
  hopes: () => { resetAll();
    setVal('noiseSpeed',10);setVal('radiusNoise',100);setVal('tumult',94);
    setVal('columns',25);setVal('rows',25);setVal('fontSize',50);setVal('leading',40);setVal('invert',false);
  },
  circle: () => { resetAll();
    setVal('noiseSpeed',20);setVal('radiusNoise',100);setVal('tumult',63);
    setVal('columns',30);setVal('rows',150);setVal('fontSize',500);setVal('leading',0);setVal('invert',true);
  },
  pride: () => { prideMode = true; lastText = ''; },
};

function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
async function toggleRec() { await TipoUI.toggleRec(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body>
</html>
