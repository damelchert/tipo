<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Glitch</title>
<link rel="stylesheet" href="shared/style.css">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js"></script>
<script src="shared/ui.js"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
  .drop-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-5); letter-spacing: 2px; pointer-events: none; text-transform: uppercase; }
</style>
</head>
<body>

<div class="tipo-panel" id="panel">
  <h1>Glitch <span style="display:flex;gap:8px;"><a href="index.html#visual" class="back-link">VISUAL TOOLS</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">
    <div class="section-title">Image</div>
    <div class="btn-row">
      <button class="btn" onclick="document.getElementById('fileInput').click()">Upload Image</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('subtle')">Subtle</span>
      <span class="preset-chip" onclick="applyPreset('vhs')">VHS</span>
      <span class="preset-chip" onclick="applyPreset('corrupt')">Corrupt</span>
      <span class="preset-chip" onclick="applyPreset('rgb')">RGB Split</span>
      <span class="preset-chip" onclick="applyPreset('scan')">Scanlines</span>
      <span class="preset-chip" onclick="applyPreset('chaos')">Chaos</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Distortion</div>
    <div class="range-row"><span class="range-label">Channel Shift</span><input type="range" id="channelShift" min="0" max="100" value="20"><span class="range-value" id="channelShiftVal">20</span></div>
    <div class="range-row"><span class="range-label">Slice Count</span><input type="range" id="sliceCount" min="0" max="50" value="10"><span class="range-value" id="sliceCountVal">10</span></div>
    <div class="range-row"><span class="range-label">Slice Offset</span><input type="range" id="sliceOffset" min="0" max="100" value="30"><span class="range-value" id="sliceOffsetVal">30</span></div>
    <div class="range-row"><span class="range-label">Noise</span><input type="range" id="noiseAmt" min="0" max="100" value="10"><span class="range-value" id="noiseAmtVal">10</span></div>
    <div class="range-row"><span class="range-label">Scanlines</span><input type="range" id="scanlines" min="0" max="100" value="0"><span class="range-value" id="scanlinesVal">0</span></div>
    <div class="range-row"><span class="range-label">Speed</span><input type="range" id="speed" min="0" max="100" value="30"><span class="range-value" id="speedVal">30</span></div>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="color-section-row">
      <span class="range-label">Background</span>
      <input type="color" id="bgColor" value="#000000">
    </div>
  </div>

  <div class="section section-divider">
    <div class="section-title">Export</div>
    <div class="btn-row">
      <button class="btn" onclick="savePNG()">PNG</button>
      <button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button>
    </div>
    <div class="record-timer" id="recTimer"></div>
  </div>
  <div style="height:40px;"></div>
</div>

<div id="canvasContainer">
  <div class="drop-hint" id="dropHint">Drop image here</div>
</div>
<div class="tipo-progress-overlay" id="exportProgress"><div class="progress-box"><div class="progress-title" id="progressTitle">Finalizing...</div><div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div><div class="progress-info" id="progressInfo"></div></div></div>
<div class="tipo-toast" id="toast"></div>

<script>
let font, recorder, sourceImg = null;

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }

function setup() {
  const c = createCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
  c.parent('canvasContainer');
  textFont(font); pixelDensity(1);
  TipoUI.init({ mode: 'glitch', formatters: {} });
  recorder = TipoUI.recorder;
  createDefaultImage();
  bindInputs();
}

function windowResized() { resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight); }

function val(id) { return TipoUI.val(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

function createDefaultImage() {
  const g = createGraphics(640, 480);
  g.background(20);
  g.noStroke(); g.fill(255); g.textSize(80); g.textAlign(CENTER,CENTER);
  g.text('TIPÓ', 320, 200);
  g.textSize(16); g.fill(150);
  g.text('drop image here', 320, 320);
  sourceImg = g;
}

function bindInputs() {
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadImage(URL.createObjectURL(file), img => { sourceImg = img; document.getElementById('dropHint').style.display='none'; });
  });
  const cc = document.getElementById('canvasContainer');
  cc.addEventListener('dragover', e => e.preventDefault());
  cc.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(URL.createObjectURL(file), img => { sourceImg = img; document.getElementById('dropHint').style.display='none'; });
  });
}

function draw() {
  if (!sourceImg) return;
  const bgC = document.getElementById('bgColor').value;
  background(bgC);

  const chShift = val('channelShift');
  const sliceN = val('sliceCount');
  const sliceOff = val('sliceOffset');
  const noiseN = val('noiseAmt');
  const scanN = val('scanlines');
  const spd = val('speed') / 100;

  // Fit image
  const sc = min(width / sourceImg.width, height / sourceImg.height);
  const iw = sourceImg.width * sc;
  const ih = sourceImg.height * sc;
  const ox = (width - iw) / 2;
  const oy = (height - ih) / 2;

  // Base image
  image(sourceImg, ox, oy, iw, ih);

  // Channel shift (RGB split)
  if (chShift > 0) {
    const shift = chShift * 0.5 * (1 + sin(frameCount * spd * 3) * 0.5);
    push();
    blendMode(ADD);
    tint(255, 0, 0, 120);
    image(sourceImg, ox - shift, oy, iw, ih);
    tint(0, 0, 255, 120);
    image(sourceImg, ox + shift, oy + shift * 0.3, iw, ih);
    pop();
    blendMode(BLEND);
    noTint();
  }

  // Horizontal slices
  if (sliceN > 0 && random() < 0.3 + spd * 0.5) {
    for (let s = 0; s < sliceN; s++) {
      const sy = random(oy, oy + ih);
      const sh = random(2, ih / sliceN);
      const sx = random(-sliceOff, sliceOff);
      const sliceImg = get(ox, floor(sy), floor(iw), floor(sh));
      image(sliceImg, ox + sx, sy);
    }
  }

  // Noise overlay
  if (noiseN > 0) {
    loadPixels();
    const density = pixelDensity();
    const total = width * height * density * density;
    const prob = noiseN / 500;
    for (let i = 0; i < total; i++) {
      if (random() < prob) {
        const idx = i * 4;
        const v = random(255);
        pixels[idx] = v;
        pixels[idx + 1] = v;
        pixels[idx + 2] = v;
      }
    }
    updatePixels();
  }

  // Scanlines
  if (scanN > 0) {
    stroke(0, scanN * 2);
    strokeWeight(1);
    for (let y = 0; y < height; y += 3) {
      line(0, y, width, y);
    }
    noStroke();
  }

  if (recorder) recorder.captureFrame();
}

function savePNG() { saveCanvas('tipo-glitch','png'); TipoUI.showToast('PNG saved'); }
async function toggleRec() { await TipoUI.toggleRec(); }

function resetAll() {
  setVal('channelShift',20);setVal('sliceCount',10);setVal('sliceOffset',30);
  setVal('noiseAmt',10);setVal('scanlines',0);setVal('speed',30);
  document.getElementById('bgColor').value='#000000';
}

function applyPreset(name) {
  const P = {
    subtle:()=>{resetAll();setVal('channelShift',5);setVal('sliceCount',3);setVal('sliceOffset',10);setVal('noiseAmt',5);setVal('speed',10);},
    vhs:()=>{resetAll();setVal('channelShift',15);setVal('sliceCount',8);setVal('sliceOffset',20);setVal('noiseAmt',15);setVal('scanlines',40);setVal('speed',20);},
    corrupt:()=>{resetAll();setVal('channelShift',50);setVal('sliceCount',30);setVal('sliceOffset',80);setVal('noiseAmt',20);setVal('speed',50);},
    rgb:()=>{resetAll();setVal('channelShift',60);setVal('sliceCount',0);setVal('sliceOffset',0);setVal('noiseAmt',0);setVal('speed',15);},
    scan:()=>{resetAll();setVal('channelShift',5);setVal('sliceCount',0);setVal('scanlines',80);setVal('noiseAmt',8);setVal('speed',10);},
    chaos:()=>{resetAll();setVal('channelShift',80);setVal('sliceCount',50);setVal('sliceOffset',100);setVal('noiseAmt',40);setVal('scanlines',50);setVal('speed',80);},
  };
  if(P[name]) P[name]();
  document.querySelectorAll('.preset-chip').forEach(el=>el.classList.remove('active'));
  if(event&&event.target) event.target.classList.add('active');
}
</script>
</body>
</html>
