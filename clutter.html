<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Clutter</title>
<link rel="stylesheet" href="shared/style.css?v=20260711-pol1">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js?v=20260612-cap"></script>
<script src="shared/ui.js?v=20260711-pol1"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
  .color-row { display: flex; align-items: center; gap: 6px; }
  .color-row input[type="color"] { width: 28px; height: 22px; }
  .color-row label { font-size: 10px; color: var(--text-4); }
</style>
</head>
<body>

<div class="tipo-panel" id="panel">
  <h1>Clutter <span style="display:flex;gap:8px;"><a href="index.html#composition" class="back-link">KINETIC TYPE</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">
    <div class="section-title">Text</div>
    <input type="text" id="textInput" value="TIPÓ" placeholder="Type here...">
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('ring')">Ring</span>
      <span class="preset-chip" onclick="applyPreset('cloud')">Cloud</span>
      <span class="preset-chip" onclick="applyPreset('cosmic')">Cosmic</span>
      <span class="preset-chip" onclick="applyPreset('sphere')">Sphere</span>
      <span class="preset-chip" onclick="applyPreset('scatter')">Scatter</span>
      <span class="preset-chip" onclick="applyPreset('vortex')">Vortex</span>
      <span class="preset-chip" onclick="applyPreset('pride')">Pride</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Layout</div>
    <div class="range-row"><span class="range-label">Text Size</span><input type="range" id="textSize" min="10" max="200" value="60"><span class="range-value" id="textSizeVal">60</span></div>
    <div class="range-row"><span class="range-label">Count</span><input type="range" id="count" min="1" max="100" value="20"><span class="range-value" id="countVal">20</span></div>
    <div class="range-row"><span class="range-label">Radius</span><input type="range" id="radius" min="0" max="100" value="50"><span class="range-value" id="radiusVal">50</span></div>
    <div class="range-row"><span class="range-label">Speed</span><input type="range" id="speed" min="0" max="100" value="20"><span class="range-value" id="speedVal">20</span></div>
    <div class="range-row"><span class="range-label">Spread</span><input type="range" id="spread" min="0" max="100" value="50"><span class="range-value" id="spreadVal">50</span></div>
  </div>

  <div class="section">
    <div class="section-title">Mode</div>
    <select id="mode" style="width:100%;background:var(--bg-2);color:var(--text-1);border:1px solid var(--border-2);padding:6px;font-size:11px;font-family:var(--font-ui);">
      <option value="ring">Ring</option>
      <option value="cloud">Cloud</option>
      <option value="cosmic">Cosmic</option>
      <option value="sphere">Sphere</option>
      <option value="scatter">Scatter</option>
      <option value="vortex">Vortex</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">Colors</div>
    <div class="color-row"><input type="color" id="c1" value="#D4A040"><label>1</label>
      <input type="color" id="c2" value="#2A8A7A"><label>2</label>
      <input type="color" id="c3" value="#1A1818"><label>3</label></div>
    <div class="color-section-row">
      <span class="range-label">Text</span>
      <input type="color" id="typeColor" value="#1A1818">
      <button class="swap-btn" onclick="swapColors()" title="Swap">&#8646;</button>
      <input type="color" id="bgColor" value="#F8F5F0">
      <span class="range-label">Bg</span>
    </div>
  </div>

  <div class="section section-divider">
    <div class="section-title">Export</div>
    <div class="btn-row">
      <button class="btn" onclick="savePNG()">PNG</button>
      <button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button>
    </div>
    <div class="record-timer" id="recTimer"></div>
  </div>
  <div style="height:40px;"></div>
</div>

<div id="canvasContainer"></div>
<div class="tipo-progress-overlay" id="exportProgress">
  <div class="progress-box">
    <div class="progress-title" id="progressTitle">Finalizing...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-info" id="progressInfo"></div>
  </div>
</div>
<div class="tipo-toast" id="toast"></div>

<script>
// ============================================================
// TIPÓ — CLUTTER MODE
// Procedural text composition with multiple layout modes.
// Ring, cloud, cosmic, sphere, scatter, vortex sub-modes.
// ============================================================
let font, recorder;
let prideMode = false;
const prideColors = ['#e70000','#ff8c00','#ffef00','#00811f','#0044ff','#760089'];

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }

function setup() {
  setAttributes('preserveDrawingBuffer', true);
  const c = createCanvas(
    document.getElementById('canvasContainer').offsetWidth,
    document.getElementById('canvasContainer').offsetHeight,
    WEBGL
  );
  c.parent('canvasContainer');
  textFont(font);
  frameRate(30);
  TipoUI.init({ mode: 'clutter', formatters: {} });
  recorder = TipoUI.recorder;
}

function windowResized() {
  resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
}

function val(id) { return TipoUI.val(id); }
function chk(id) { return TipoUI.chk(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }
function col(id) { return TipoUI.col(id); }

function getColor(i) {
  if (prideMode) return prideColors[i % 6];
  const colors = [col('c1'), col('c2'), col('c3')];
  return colors[i % 3];
}

function draw() {
  const bgC = document.getElementById('bgColor').value;
  background(bgC);

  const txt = document.getElementById('textInput').value || 'TIPÓ';
  const tSize = val('textSize');
  const cnt = val('count');
  const rad = map(val('radius'), 0, 100, 0, min(width, height) * 0.4);
  const spd = val('speed') / 1000;
  const spr = val('spread') / 100;
  const mode = document.getElementById('mode').value;
  const txtC = document.getElementById('typeColor').value;

  textSize(tSize);
  textAlign(CENTER, CENTER);
  noStroke();

  for (let i = 0; i < cnt; i++) {
    const t = i / cnt;
    const ch = txt.charAt(i % txt.length);
    const c = prideMode ? color(prideColors[i % 6]) : color(getColor(i));
    fill(c);

    let x = 0, y = 0, z = 0, rot = 0;

    switch (mode) {
      case 'ring': {
        const a = t * TWO_PI + frameCount * spd;
        x = cos(a) * rad;
        y = sin(a) * rad;
        rot = a + HALF_PI;
        break;
      }
      case 'cloud': {
        const seed = i * 137.508;
        const a = t * TWO_PI * 3 + frameCount * spd;
        const r = rad * sqrt(t) * spr + sin(frameCount * spd * 2 + i) * rad * 0.2;
        x = cos(a + seed) * r;
        y = sin(a + seed) * r;
        z = sin(frameCount * spd + i * 0.5) * rad * 0.3;
        rot = a;
        break;
      }
      case 'cosmic': {
        const a = t * TWO_PI + i * 0.3;
        const r = rad * (0.3 + t * 0.7) + sin(frameCount * spd * 3 + i) * 20;
        x = cos(a + frameCount * spd) * r;
        y = sin(a + frameCount * spd) * r;
        // Lines from center
        stroke(c); strokeWeight(1);
        line(0, 0, 0, x, y, 0);
        noStroke();
        rot = a + frameCount * spd;
        break;
      }
      case 'sphere': {
        const phi = acos(1 - 2 * t);
        const theta = PI * (1 + sqrt(5)) * i + frameCount * spd;
        x = cos(theta) * sin(phi) * rad;
        y = sin(theta) * sin(phi) * rad;
        z = cos(phi) * rad * 0.5;
        rot = theta;
        break;
      }
      case 'scatter': {
        // Seeded random positions that drift
        const sx = sin(i * 73.17 + frameCount * spd) * rad * spr;
        const sy = cos(i * 47.83 + frameCount * spd * 0.7) * rad * spr;
        x = sx + sin(i * 23.1) * rad * 0.5;
        y = sy + cos(i * 31.7) * rad * 0.5;
        rot = sin(frameCount * spd + i) * PI;
        break;
      }
      case 'vortex': {
        const a = t * TWO_PI * 3 + frameCount * spd * 3;
        const r = rad * t;
        x = cos(a) * r;
        y = sin(a) * r;
        z = -t * rad * 0.5;
        rot = a;
        break;
      }
    }

    push();
    translate(x, y, z);
    rotateZ(rot);
    text(ch, 0, 0);
    pop();
  }

  TipoUI.captureFrame();
}

// ============================================================
// PRESETS
// ============================================================
function swapColors() { TipoUI.swapColors('typeColor', 'bgColor'); }

function resetAll() {
  prideMode = false;
  setVal('textSize',60);setVal('count',20);setVal('radius',50);setVal('speed',20);setVal('spread',50);
  document.getElementById('mode').value='ring';
  document.getElementById('c1').value='#D4A040';document.getElementById('c2').value='#2A8A7A';document.getElementById('c3').value='#1A1818';
  document.getElementById('typeColor').value='#1A1818';document.getElementById('bgColor').value='#F8F5F0';
}

const PRESETS = {
  ring: () => { resetAll(); document.getElementById('mode').value='ring';
    setVal('count',30);setVal('radius',60);setVal('speed',15);setVal('textSize',50);
  },
  cloud: () => { resetAll(); document.getElementById('mode').value='cloud';
    setVal('count',50);setVal('radius',70);setVal('speed',10);setVal('textSize',40);setVal('spread',80);
  },
  cosmic: () => { resetAll(); document.getElementById('mode').value='cosmic';
    setVal('count',20);setVal('radius',60);setVal('speed',8);setVal('textSize',30);
    document.getElementById('bgColor').value='#000000';document.getElementById('typeColor').value='#ffffff';
  },
  sphere: () => { resetAll(); document.getElementById('mode').value='sphere';
    setVal('count',60);setVal('radius',55);setVal('speed',12);setVal('textSize',25);
    document.getElementById('bgColor').value='#0000ff';
  },
  scatter: () => { resetAll(); document.getElementById('mode').value='scatter';
    setVal('count',40);setVal('radius',80);setVal('speed',15);setVal('textSize',70);setVal('spread',90);
    document.getElementById('bgColor').value='#ffffff';document.getElementById('typeColor').value='#000000';
    document.getElementById('c1').value='#ff0000';document.getElementById('c2').value='#0000ff';document.getElementById('c3').value='#000000';
  },
  vortex: () => { resetAll(); document.getElementById('mode').value='vortex';
    setVal('count',80);setVal('radius',65);setVal('speed',25);setVal('textSize',20);
    document.getElementById('bgColor').value='#000000';
    document.getElementById('c1').value='#00ff00';document.getElementById('c2').value='#ff0000';document.getElementById('c3').value='#0000ff';
  },
  pride: () => { prideMode = true; },
};

function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
async function toggleRec() { await TipoUI.toggleRec(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body>
</html>
