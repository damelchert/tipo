<body>

<div class="tipo-panel" id="panel">
  <h1>String <span style="display:flex;gap:8px;"><a href="index.html#2d" class="back-link">KINETIC TYPE</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">

  </div>

  <div class="section">

    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('vote')">Vote</span>

      <span class="preset-chip" onclick="applyPreset('juicy')">Juicy</span>
      <span class="preset-chip" onclick="applyPreset('guts')">Guts</span>
      <span class="preset-chip" onclick="applyPreset('spiral')">Spiral</span>
      <span class="preset-chip" onclick="applyPreset('wave')">Wave</span>
      <span class="preset-chip" onclick="applyPreset('pride')">Pride</span>

  <div class="section">

    </select>
    <div class="range-row"><span class="range-label">Strip Height</span><input type="range" id="stripHeight" min="10" max="300" value="70"><span class="range-value" id="stripHeightVal">70</span></div>
    <div class="range-row"><span class="range-label">Strip Count</span><input type="range" id="stripCount" min="1" max="6" value="1"><span class="range-value" id="stripCountVal">1</span></div>
    <div class="range-row"><span class="range-label">Points</span><input type="range" id="points" min="3" max="30" value="7"><span class="range-value" id="pointsVal">7</span></div>
    <div class="range-row"><span class="range-label">Curve</span><input type="range" id="curve" min="0" max="100" value="50"><span class="range-value" id="curveVal">50</span></div>
    <div class="range-row"><span class="range-label">Randomize</span><input type="range" id="randomize" min="0" max="100" value="30"><span class="range-value" id="randomizeVal">30</span></div>

      <input type="color" id="c5" value="#1A1818"><label>5</label></div>

<div id="canvasContainer"></div>
<div class="tipo-progress-overlay" id="exportProgress">
  <div class="progress-box">
    <div class="progress-title" id="progressTitle">Finalizing...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-info" id="progressInfo"></div>
  </div>
</div>
<div class="tipo-toast" id="toast"></div>

<script>
// ============================================================
// TIPÓ — STRING MODE
// Bezier curve ribbons with text moving along the path.
// Auto-generated control points with adjustable curve/randomness.
// ============================================================
let font, recorder, resizeObserver;
let prideMode = false;
const prideColors = ['#e70000','#ff8c00','#ffef00','#00811f','#0044ff','#760089'];

let particles = [];
let lastPoints = 0;
let lastRandom = -1;
let lastCurve = -1;
let lastPattern = '';
const STEPS = 70;

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }

function setup() {
  const container = document.getElementById('canvasContainer');
  const c = createCanvas(10, 10);
  c.parent(container);
  pixelDensity(1);
  textFont(font);
  frameRate(30);
  fitCanvas();
  requestAnimationFrame(fitCanvas);
  if ('ResizeObserver' in window) {
    resizeObserver = new ResizeObserver(() => {
      fitCanvas();
      lastPoints = 0;
    });
    resizeObserver.observe(container);
  }

  TipoUI.init({
    mode: 'string',
    formatters: {}
  });
  recorder = TipoUI.recorder;

  generateParticles(7, 50, 30, 'wave');
}

function getCanvasSize() {
  const container = document.getElementById('canvasContainer');
  const rect = container.getBoundingClientRect();
  return {
    w: max(1, round(rect.width || container.clientWidth || window.innerWidth)),
    h: max(1, round(rect.height || container.clientHeight || window.innerHeight))
  };
}

function fitCanvas() {
  const s = getCanvasSize();
  if (width !== s.w || height !== s.h) resizeCanvas(s.w, s.h);
}

function windowResized() {
  fitCanvas();
  lastPoints = 0; // Force regeneration
}

function val(id) { return TipoUI.val(id); }
function chk(id) { return TipoUI.chk(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }
function col(id) { return TipoUI.col(id); }

function setPattern(name) {
  const el = document.getElementById('pathPattern');
  if (el) el.value = name;
  lastPattern = '';
}

// Generate control points along a path
function generateParticles(count, curveAmt, randomAmt, pattern) {
  particles = [];
  randomSeed(1000 + count * 31 + round(curveAmt) * 17 + round(randomAmt) * 13 + pattern.length * 19);
  const w = max(1, width - 120);
  const h = max(1, height - 160);
  const cx = width / 2;
  const cy = height / 2;
  const randF = randomAmt / 100;
  const curveF = curveAmt / 100;

  for (let i = 0; i < count; i++) {
    const t = count <= 1 ? 0 : i / (count - 1);
    let x, y, baseAngle;

    if (pattern === 'river') {
      x = 60 + t * w;
      y = cy + sin(t * TWO_PI * 1.25 + 0.4) * h * 0.24 + sin(t * TWO_PI * 3.1) * h * 0.08 * curveF;
      baseAngle = cos(t * TWO_PI * 1.25 + 0.4) * 0.55 * curveF;
    } else if (pattern === 'vertical') {
      x = cx + sin(t * TWO_PI * 1.35) * w * 0.22 * curveF;
      y = 80 + t * h;
      baseAngle = HALF_PI + cos(t * TWO_PI * 1.35) * 0.55 * curveF;
    } else if (pattern === 'orbit') {
      const a = -PI * 0.92 + t * TWO_PI * 1.84;
      x = cx + cos(a) * w * 0.34;
      y = cy + sin(a) * h * 0.28;
      baseAngle = a + HALF_PI;
    } else if (pattern === 'spiral') {
      const a = -HALF_PI + t * TWO_PI * 1.65;
      const r = lerp(min(w, h) * 0.06, min(w, h) * 0.40, t);
      x = cx + cos(a) * r;
      y = cy + sin(a) * r;
      baseAngle = a + HALF_PI;
    } else if (pattern === 'harp') {
      x = lerp(70, width - 70, t);
      y = lerp(height * 0.78, height * 0.22, t) + sin(t * PI * count) * h * 0.045 * curveF;
      baseAngle = -0.55 + sin(t * TWO_PI) * 0.35 * curveF;
    } else if (pattern === 'constellation') {
      x = lerp(90, width - 90, t) + random(-1, 1) * w * 0.08 * randF;
      y = cy + (i % 2 === 0 ? -1 : 1) * h * (0.15 + random(0, 0.22) * randF);
      baseAngle = random(-PI, PI) * curveF;
    } else {
      x = 60 + t * w;
      y = cy + sin(t * TWO_PI) * h * 0.16 * curveF;
      baseAngle = cos(t * TWO_PI) * 0.35 * curveF;
    }

    x += random(-1, 1) * w * 0.06 * randF;
    y += random(-1, 1) * h * 0.10 * randF;
    const angle = baseAngle + random(-PI, PI) * curveF * 0.45;
    const handleLen = (w / max(count - 1, 1)) * (0.35 + curveF * 0.65);

    particles.push({ x, y, angle, handleLen });
  }
}

// Get gradient color for position along path
function getGradColor(t) {
  if (prideMode) return color(prideColors[floor(t * 6) % 6]);
  const n = val('numColors');
  const colors = [col('c1'), col('c2'), col('c3'), col('c4'), col('c5')];
  if (n <= 1) return color(colors[0]);
  const segments = n - 1;
  const segIdx = min(floor(t * segments), segments - 1);
  const segT = (t * segments) - segIdx;
  return lerpColor(color(colors[segIdx]), color(colors[segIdx + 1]), segT);
}

function draw() {
  fitCanvas();
  const bgC = document.getElementById('bgColor').value;
  background(bgC);

  const txt = document.getElementById('textInput').value || 'TIPÓ';
  const stripH = val('stripHeight');
  const stripCnt = val('stripCount');
  const pts = val('points');
  const curveAmt = val('curve');
  const randomAmt = val('randomize');
  const pattern = document.getElementById('pathPattern').value;
  const isOutline = chk('outline');
  const txtC = document.getElementById('typeColor').value;

  // Regenerate particles if changed
  if (pts !== lastPoints || randomAmt !== lastRandom || curveAmt !== lastCurve || pattern !== lastPattern) {
    generateParticles(pts, curveAmt, randomAmt, pattern);
    lastPoints = pts;
    lastRandom = randomAmt;
    lastCurve = curveAmt;
    lastPattern = pattern;
  }

  if (particles.length < 2) return;

  // Render each strip
  for (let m = 0; m < stripCnt; m++) {
    const offset = (m - (stripCnt - 1) / 2) * stripH * 0.55;
    const samples = samplePath(offset);
    drawStringPath(samples, m, stripH, isOutline);
    drawMovingText(samples, txt, txtC, stripH, m, isOutline);
  }

  TipoUI.captureFrame();
}

function samplePath(offset) {
  const samples = [];
  let total = 0;
  let prev = null;
  for (let seg = 0; seg < particles.length - 1; seg++) {
    const p0 = particles[seg];
    const p1 = particles[seg + 1];
    const hx0 = p0.x + cos(p0.angle) * p0.handleLen;
    const hy0 = p0.y + sin(p0.angle) * p0.handleLen;
    const hx1 = p1.x - cos(p1.angle) * p1.handleLen;
    const hy1 = p1.y - sin(p1.angle) * p1.handleLen;

    for (let s = 0; s <= STEPS; s++) {
      if (seg > 0 && s === 0) continue;
      const t = s / STEPS;
      const bx = bezierPoint(p0.x, hx0, hx1, p1.x, t);
      const by = bezierPoint(p0.y, hy0, hy1, p1.y, t);
      const tx = bezierTangent(p0.x, hx0, hx1, p1.x, t);
      const ty = bezierTangent(p0.y, hy0, hy1, p1.y, t);
      const len = max(0.001, sqrt(tx * tx + ty * ty));
      const nx = -ty / len;
      const ny = tx / len;
      const x = bx + nx * offset;
      const y = by + ny * offset;
      if (prev) total += dist(prev.x, prev.y, x, y);
      const globalT = (seg + t) / max(1, particles.length - 1);
      const sample = { x, y, angle: atan2(ty, tx), d: total, t: globalT };
      samples.push(sample);
      prev = sample;
    }
  }
  return samples;
}

function drawStringPath(samples, stripIndex, stripH, isOutline) {
  if (samples.length < 2) return;
  noFill();
  strokeCap(ROUND);
  strokeJoin(ROUND);
  const sw = isOutline ? max(1.5, stripH * 0.035) : max(6, stripH * 0.36);
  strokeWeight(sw);

  for (let i = 1; i < samples.length; i++) {
    const t = i / (samples.length - 1);
    const c = getGradColor((t + stripIndex * 0.08) % 1);
    stroke(c);
    line(samples[i - 1].x, samples[i - 1].y, samples[i].x, samples[i].y);
  }
}

function pointAtDistance(samples, d) {
  if (!samples.length) return null;
  const total = samples[samples.length - 1].d;
  const target = constrain(d, 0, total);
  for (let i = 1; i < samples.length; i++) {
    if (samples[i].d >= target) {
      const a = samples[i - 1];
      const b = samples[i];
      const span = max(0.001, b.d - a.d);
      const t = (target - a.d) / span;
      return {
        x: lerp(a.x, b.x, t),
        y: lerp(a.y, b.y, t),
        angle: lerp(a.angle, b.angle, t)
      };
    }
  }
  return samples[samples.length - 1];
}

function drawMovingText(samples, txt, txtC, stripH, stripIndex, isOutline) {
  if (samples.length < 2) return;
  const total = samples[samples.length - 1].d;
  fill(prideMode ? prideColors[(stripIndex + 3) % prideColors.length] : txtC);
  noStroke();
  textFont(font);
  textSize(max(10, stripH * (isOutline ? 0.48 : 0.38)));
  textAlign(CENTER, CENTER);
  const token = txt + ' ';
  const spacing = max(textWidth(token) + stripH * 0.45, stripH * 1.15);
  const offset = (frameCount * (1.4 + stripIndex * 0.35)) % spacing;

  for (let d = offset; d < total; d += spacing) {
    const p = pointAtDistance(samples, d);
    if (!p) continue;
    push();
    translate(p.x, p.y);
    rotate(p.angle);
    text(token, 0, 0);
    pop();
  }
}

// ============================================================
// PRESETS
// ============================================================
function swapColors() { TipoUI.swapColors('typeColor', 'bgColor'); }

function resetAll() {
  prideMode = false;
  setPattern('wave');
  setVal('stripHeight', 70); setVal('stripCount', 1);
  setVal('points', 7); setVal('curve', 50); setVal('randomize', 30);
  setVal('outline', false); setVal('numColors', 4);
  document.getElementById('c1').value = '#2A8A7A';
  document.getElementById('c2').value = '#D4A040';
  document.getElementById('c3').value = '#1A1818';
  document.getElementById('c4').value = '#99E0D2';
  document.getElementById('c5').value = '#1A1818';
  document.getElementById('typeColor').value = '#F8F5F0';
  document.getElementById('bgColor').value = '#F8F5F0';
  lastPoints = 0;
  lastCurve = -1;
}

const PRESETS = {
  vote: () => { resetAll();
    setPattern('river');
    setVal('stripHeight',180);setVal('stripCount',4);setVal('points',7);setVal('curve',65);setVal('randomize',20);
    setVal('numColors',5);
    document.getElementById('c1').value='#009c3b';document.getElementById('c2').value='#ffdf00';
    document.getElementById('c3').value='#ffffff';document.getElementById('c4').value='#002776';
    document.getElementById('c5').value='#009c3b';
    document.getElementById('typeColor').value='#ffffff';document.getElementById('bgColor').value='#002776';
    lastPoints=0;
  },
  dreamer: () => { resetAll();
    setPattern('constellation');
    setVal('stripHeight',44);setVal('stripCount',2);setVal('points',20);setVal('curve',40);setVal('randomize',50);
    setVal('outline',true);
    setVal('numColors',5);
    document.getElementById('c1').value='#030a8c';document.getElementById('c2').value='#030ba6';
    document.getElementById('c3').value='#f21d1d';document.getElementById('c4').value='#fcbc1b';
    document.getElementById('c5').value='#f2c4e6';
    document.getElementById('typeColor').value='#030a8c';document.getElementById('bgColor').value='#f2c4e6';
    lastPoints=0;
  },
  tracks: () => { resetAll();
    setPattern('harp');
    setVal('stripHeight',60);setVal('stripCount',1);setVal('points',28);setVal('curve',70);setVal('randomize',10);
    setVal('outline',true);
    setVal('numColors',5);
    document.getElementById('c1').value='#ffffff';document.getElementById('c2').value='#0d0d0d';
    document.getElementById('c3').value='#000000';document.getElementById('c4').value='#b7b7b7';
    document.getElementById('c5').value='#e2e2e2';
    document.getElementById('typeColor').value='#000000';document.getElementById('bgColor').value='#858585';
    lastPoints=0;
  },
  juicy: () => { resetAll();
    setPattern('river');
    setVal('stripHeight',100);setVal('stripCount',2);setVal('points',10);setVal('curve',50);setVal('randomize',60);
    setVal('numColors',5);
    document.getElementById('c1').value='#0f5cbf';document.getElementById('c2').value='#25d964';
    document.getElementById('c3').value='#f2b90f';document.getElementById('c4').value='#f24f13';
    document.getElementById('c5').value='#0d0d0d';
    document.getElementById('typeColor').value='#ffffff';document.getElementById('bgColor').value='#000000';
    lastPoints=0;
  },
  guts: () => { resetAll();
    setPattern('vertical');
    setVal('stripHeight',100);setVal('stripCount',3);setVal('points',28);setVal('curve',60);setVal('randomize',20);
    setVal('outline',true);
    setVal('numColors',5);
    document.getElementById('c1').value='#ffffff';document.getElementById('c2').value='#ffffff';
    document.getElementById('c3').value='#f28599';document.getElementById('c4').value='#d94625';
    document.getElementById('c5').value='#f2ca50';
    document.getElementById('typeColor').value='#000000';document.getElementById('bgColor').value='#000000';
    lastPoints=0;
  },
  spiral: () => { resetAll();
    setPattern('spiral');
    setVal('stripHeight',80);setVal('stripCount',2);setVal('points',15);setVal('curve',80);setVal('randomize',5);
    setVal('numColors',3);
    document.getElementById('c1').value='#ff0000';document.getElementById('c2').value='#ffffff';
    document.getElementById('c3').value='#0000ff';
    document.getElementById('typeColor').value='#000000';document.getElementById('bgColor').value='#ffffff';
    lastPoints=0;
  },
  wave: () => { resetAll();
    setPattern('orbit');
    setVal('stripHeight',120);setVal('stripCount',4);setVal('points',12);setVal('curve',40);setVal('randomize',15);
    setVal('numColors',4);
    document.getElementById('c1').value='#000000';document.getElementById('c2').value='#ff0000';
    document.getElementById('c3').value='#ffff00';document.getElementById('c4').value='#0000ff';
    document.getElementById('typeColor').value='#ffffff';document.getElementById('bgColor').value='#000000';
    lastPoints=0;
  },
  pride: () => { prideMode = true; setPattern('orbit'); lastPoints=0; },
};

function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
async function toggleRec() { await TipoUI.toggleRec(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body>
</html>
