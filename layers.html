<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Layers</title>
<link rel="stylesheet" href="shared/style.css?v=20260713-id1">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js" integrity="sha384-6Twx1hAeKnwfOYJAHtYeJETRiGD5pRPkjjh0pVbG1QoesncjOpw5e75Y1kOkXeRI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js" integrity="sha384-ut5hA6QX8px1vwvHCiy1MqfODbif8Iy0Gr+X61/AoNxP3VXx2wF99Pu9PeTEkG5E" crossorigin="anonymous"></script>
<script src="shared/recorder.js?v=20260722-rec2"></script>
<script src="shared/ui.js?v=20260722-au3"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="tipo-panel" id="panel">
  <h1>Layers <span style="display:flex;gap:8px;"><a href="index.html#2d" class="back-link">KINETIC TYPE</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">
    <div class="section-title">Text</div>
    <input type="text" id="textInput" value="TIPÓ " placeholder="Type here...">
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('speedRacer')">Speed Racer</span>
      <span class="preset-chip" onclick="applyPreset('toSpace')">To Space</span>
      <span class="preset-chip" onclick="applyPreset('lostTime')">Lost Time</span>
      <span class="preset-chip" onclick="applyPreset('dotSpiral')">Dot Spiral</span>
      <span class="preset-chip" onclick="applyPreset('aggressive')">Be Aggressive</span>
      <span class="preset-chip" onclick="applyPreset('meatSpace')">Meat Space</span>
      <span class="preset-chip" onclick="applyPreset('pride')">Pride</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Layers</div>
    <div class="range-row"><span class="range-label">Count</span><input type="range" id="stackCount" min="1" max="40" value="14"><span class="range-value" id="stackCountVal">14</span></div>
    <div class="range-row"><span class="range-label">Font Size</span><input type="range" id="fontSize" min="50" max="300" value="100"><span class="range-value" id="fontSizeVal">100</span></div>
    <div class="range-row"><span class="range-label">Speed</span><input type="range" id="motionSpeed" min="0" max="200" value="100"><span class="range-value" id="motionSpeedVal">1.00</span></div>
    <div class="range-row"><span class="range-label">Inner H</span><input type="range" id="innerH" min="-500" max="1500" value="100"><span class="range-value" id="innerHVal">100</span></div>
    <div class="range-row"><span class="range-label">Inner V</span><input type="range" id="innerV" min="-500" max="1500" value="100"><span class="range-value" id="innerVVal">100</span></div>
    <div class="range-row"><span class="range-label">Rotate</span><input type="range" id="rotateFactor" min="-78" max="78" value="0"><span class="range-value" id="rotateFactorVal">0.00</span></div>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="color-section-row">
      <span class="range-label">Text</span>
      <input type="color" id="typeColor" value="#1A1818">
      <button class="swap-btn" onclick="swapColors()" title="Swap colors">&#8646;</button>
      <input type="color" id="bgColor" value="#F8F5F0">
      <span class="range-label">Bg</span>
    </div>
    <div class="color-section-row">
      <span class="range-label">Block</span>
      <input type="color" id="blockColor" value="#2A8A7A">
      <span class="range-label" style="margin-left:8px">Stroke</span>
      <input type="color" id="strokeColor" value="#D4A040">
    </div>
  </div>

  <div class="section section-divider">
    <div class="section-title">Export</div>
    <div class="btn-row">
      <button class="btn" onclick="savePNG()">PNG</button>
      <button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button>
    </div>
    <div class="record-timer" id="recTimer"></div>
  </div>
  <div style="height:40px;"></div>
</div>

<div id="canvasContainer"></div>
<div class="tipo-progress-overlay" id="exportProgress">
  <div class="progress-box">
    <div class="progress-title" id="progressTitle">Finalizing...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-info" id="progressInfo"></div>
  </div>
</div>
<div class="tipo-toast" id="toast"></div>

<script>
// ============================================================
// TIPÓ — LAYERS MODE
// 2D stacked text strips with depth cycling.
// 4-fold symmetry, clipped strips, stable MP4 export path.
// ============================================================
let font, recorder, resizeObserver;
let prideMode = false;
const prideColors = ['#e70000','#ff8c00','#ffef00','#00811f','#0044ff','#760089'];

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }

function setup() {
  const container = document.getElementById('canvasContainer');
  const c = createCanvas(10, 10);
  c.parent(container);
  pixelDensity(1);
  textFont(font);
  frameRate(30);
  fitCanvas();
  requestAnimationFrame(fitCanvas);
  if ('ResizeObserver' in window) {
    resizeObserver = new ResizeObserver(fitCanvas);
    resizeObserver.observe(container);
  }

  TipoUI.init({
    mode: 'layers',
    formatters: {
      motionSpeed: { div: 100, decimals: 2 },
      rotateFactor: { div: 100, decimals: 2 }
    }
  });
  recorder = TipoUI.recorder;
}

function getCanvasSize() {
  const container = document.getElementById('canvasContainer');
  const rect = container.getBoundingClientRect();
  return {
    w: max(1, round(rect.width || container.clientWidth || window.innerWidth)),
    h: max(1, round(rect.height || container.clientHeight || window.innerHeight))
  };
}

function fitCanvas() {
  const s = getCanvasSize();
  if (width !== s.w || height !== s.h) resizeCanvas(s.w, s.h);
}

function windowResized() { fitCanvas(); }

function val(id) { return TipoUI.val(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

function draw() {
  fitCanvas();
  const bgC = document.getElementById('bgColor').value;
  background(bgC);

  const txt = (document.getElementById('textInput').value || 'TIPÓ ').trimEnd() + ' ';
  const stacks = val('stackCount');
  const fSize = val('fontSize');
  const speed = val('motionSpeed') / 100;
  const innerH = val('innerH');
  const innerV = val('innerV');
  const rotFactor = val('rotateFactor') / 100;

  const txtC = document.getElementById('typeColor').value;
  const blockC = document.getElementById('blockColor').value;
  const strkC = document.getElementById('strokeColor').value;

  textSize(fSize);
  textAlign(LEFT, CENTER);
  const textRunW = max(textWidth(txt), fSize);
  const stripH = fSize * 1.12;
  const cx = width / 2;
  const cy = height / 2;
  const t = frameCount * speed;
  const scrollPhase = (t * 0.035) % 1;
  const maxH = height * 0.62;
  const maxV = width * 0.62;
  const startH = map(innerH, -500, 1500, -height * 0.18, height * 0.32);
  const startV = map(innerV, -500, 1500, -width * 0.18, width * 0.32);

  for (let i = stacks - 1; i >= 0; i--) {
    const rawDepth = ((i / max(stacks - 1, 1)) + scrollPhase) % 1;
    const depth = TipoEase.out.cubic(rawDepth);
    const scale = lerp(0.22, 1.12, depth);
    const alpha = lerp(45, 255, depth);
    const hDist = lerp(startH, maxH, depth);
    const vDist = lerp(startV, maxV, depth);
    const angle = rotFactor * (i - stacks / 2) * 0.16 + sin(t * 0.01 + i) * rotFactor * 0.08;
    const layerBlock = prideMode ? prideColors[i % prideColors.length] : blockC;
    const layerText = prideMode ? prideColors[(i + 3) % prideColors.length] : txtC;
    const stripW = max(width * 1.45, textRunW * 3);

    drawLayerStrip(cx, cy - hDist, stripW, stripH * scale, angle, txt, layerText, layerBlock, strkC, alpha, i, speed);
    drawLayerStrip(cx, cy + hDist, stripW, stripH * scale, -angle, txt, layerText, layerBlock, strkC, alpha, i + 23, speed);
    drawLayerStrip(cx - vDist, cy, stripW, stripH * scale, HALF_PI + angle, txt, layerText, layerBlock, strkC, alpha, i + 47, speed);
    drawLayerStrip(cx + vDist, cy, stripW, stripH * scale, HALF_PI - angle, txt, layerText, layerBlock, strkC, alpha, i + 71, speed);
  }

  TipoUI.captureFrame();
}

function drawLayerStrip(x, y, w, h, angle, txt, txtC, blockC, strokeC, alpha, seed, speed) {
  push();
  translate(x, y);
  rotate(angle);

  const block = color(blockC);
  block.setAlpha(alpha);
  const strokeCol = color(strokeC);
  strokeCol.setAlpha(min(180, alpha));
  fill(block);
  stroke(strokeCol);
  strokeWeight(1);
  rectMode(CENTER);
  rect(0, 0, w, h);

  drawingContext.save();
  drawingContext.beginPath();
  drawingContext.rect(-w / 2, -h / 2, w, h);
  drawingContext.clip();

  const textCol = color(txtC);
  textCol.setAlpha(alpha);
  fill(textCol);
  noStroke();
  textSize(h * 0.72);
  textAlign(LEFT, CENTER);
  const run = txt + ' ';
  const runW = max(textWidth(run), h);
  const offset = -((frameCount * speed * (2.4 + seed * 0.018)) % runW);
  for (let tx = -w / 2 + offset - runW; tx < w / 2 + runW; tx += runW) {
    text(run, tx, 0);
  }
  drawingContext.restore();
  pop();
}

// ============================================================
// PRESETS
// ============================================================
function swapColors() { TipoUI.swapColors('typeColor', 'bgColor'); }

function resetAll() {
  prideMode = false;
  setVal('stackCount', 14); setVal('fontSize', 100);
  setVal('motionSpeed', 100);
  setVal('innerH', 100); setVal('innerV', 100); setVal('rotateFactor', 0);
  document.getElementById('typeColor').value = '#1A1818';
  document.getElementById('blockColor').value = '#2A8A7A';
  document.getElementById('strokeColor').value = '#D4A040';
  document.getElementById('bgColor').value = '#F8F5F0';
}

const PRESETS = {
  speedRacer: () => { resetAll();
    setVal('stackCount',14);setVal('fontSize',90);setVal('innerH',985);setVal('innerV',-225);setVal('rotateFactor',-11);
    document.getElementById('typeColor').value='#000000';document.getElementById('blockColor').value='#ffffff';
    document.getElementById('strokeColor').value='#ff7e79';document.getElementById('bgColor').value='#0000ff';
  },
  toSpace: () => { resetAll();
    setVal('stackCount',14);setVal('fontSize',300);setVal('innerH',-10);setVal('innerV',-10);setVal('rotateFactor',-28);
    document.getElementById('typeColor').value='#000000';document.getElementById('blockColor').value='#ffffff';
    document.getElementById('strokeColor').value='#000000';document.getElementById('bgColor').value='#0000ff';
  },
  lostTime: () => { resetAll();
    setVal('stackCount',14);setVal('fontSize',100);setVal('innerH',600);setVal('innerV',50);setVal('rotateFactor',0);
    document.getElementById('typeColor').value='#ffffff';document.getElementById('blockColor').value='#000000';
    document.getElementById('strokeColor').value='#ff7e79';document.getElementById('bgColor').value='#ff7e79';
  },
  dotSpiral: () => { resetAll();
    setVal('stackCount',20);setVal('fontSize',250);setVal('innerH',-50);setVal('innerV',-165);setVal('rotateFactor',42);
    document.getElementById('typeColor').value='#ffffff';document.getElementById('blockColor').value='#000000';
    document.getElementById('strokeColor').value='#000000';document.getElementById('bgColor').value='#0000ff';
  },
  aggressive: () => { resetAll();
    setVal('stackCount',20);setVal('fontSize',110);setVal('innerH',-150);setVal('innerV',-250);setVal('rotateFactor',-10);
    document.getElementById('typeColor').value='#ff7e79';document.getElementById('blockColor').value='#000000';
    document.getElementById('strokeColor').value='#000000';document.getElementById('bgColor').value='#ffffff';
  },
  meatSpace: () => { resetAll();
    setVal('stackCount',20);setVal('fontSize',100);setVal('innerH',415);setVal('innerV',1035);setVal('rotateFactor',0);
    document.getElementById('typeColor').value='#73fa79';document.getElementById('blockColor').value='#000000';
    document.getElementById('strokeColor').value='#ffffff';document.getElementById('bgColor').value='#ffffff';
  },
  pride: () => { prideMode = true; },
};

function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
async function toggleRec() { await TipoUI.toggleRec(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body>
</html>
