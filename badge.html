<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Badge</title>
<link rel="stylesheet" href="shared/style.css?v=20260612-bhv">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js?v=20260612-cap"></script>
<script src="shared/ui.js?v=20260612-bhv"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="tipo-panel" id="panel">
  <h1>Badge <span style="display:flex;gap:8px;"><a href="index.html#composition" class="back-link">KINETIC TYPE</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">
    <div class="section-title">Text</div>
    <input type="text" id="textInput" value="TIPÓ" placeholder="Main text...">
    <input type="text" id="textInput2" value="KINETIC TYPE" placeholder="Ring text..." style="margin-top:6px">
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('classic')">Classic</span>
      <span class="preset-chip" onclick="applyPreset('seal')">Seal</span>
      <span class="preset-chip" onclick="applyPreset('orbit')">Orbit</span>
      <span class="preset-chip" onclick="applyPreset('tunnel')">Tunnel</span>
      <span class="preset-chip" onclick="applyPreset('spread')">Spread</span>
      <span class="preset-chip" onclick="applyPreset('minimal')">Minimal</span>
      <span class="preset-chip" onclick="applyPreset('cosmic')">Cosmic</span>
      <span class="preset-chip" onclick="applyPreset('retro')">Retro</span>
      <span class="preset-chip" onclick="applyPreset('pride')">Pride</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Strip (Center)</div>
    <div class="range-row"><span class="range-label">Height</span><input type="range" id="stripHeight" min="0" max="100" value="40"><span class="range-value" id="stripHeightVal">40</span></div>
    <div class="range-row"><span class="range-label">Position</span><input type="range" id="stripPos" min="0" max="100" value="50"><span class="range-value" id="stripPosVal">50</span></div>
    <label class="checkbox-label"><input type="checkbox" id="showStrip" checked> Show strip</label>
  </div>

  <div class="section">
    <div class="section-title">Ring</div>
    <div class="range-row"><span class="range-label">Radius</span><input type="range" id="ringRadius" min="0" max="100" value="34"><span class="range-value" id="ringRadiusVal">34</span></div>
    <div class="range-row"><span class="range-label">Height</span><input type="range" id="ringHeight" min="0" max="100" value="20"><span class="range-value" id="ringHeightVal">20</span></div>
    <div class="range-row"><span class="range-label">Arc</span><input type="range" id="ringArc" min="0" max="100" value="100"><span class="range-value" id="ringArcVal">100</span></div>
    <label class="checkbox-label"><input type="checkbox" id="showRing" checked> Show ring</label>
  </div>

  <div class="section">
    <div class="section-title">Tunnel</div>
    <div class="range-row"><span class="range-label">Count</span><input type="range" id="tunnelCount" min="2" max="20" value="8"><span class="range-value" id="tunnelCountVal">8</span></div>
    <div class="range-row"><span class="range-label">Inner</span><input type="range" id="tunnelInner" min="0" max="100" value="10"><span class="range-value" id="tunnelInnerVal">10</span></div>
    <label class="checkbox-label"><input type="checkbox" id="showTunnel"> Show tunnel</label>
    <label class="checkbox-label"><input type="checkbox" id="animate" checked> Animate</label>
  </div>

  <div class="section">
    <div class="section-title">Spread</div>
    <div class="range-row"><span class="range-label">Radius</span><input type="range" id="spreadRadius" min="0" max="100" value="65"><span class="range-value" id="spreadRadiusVal">65</span></div>
    <div class="range-row"><span class="range-label">Font Size</span><input type="range" id="spreadSize" min="0" max="100" value="30"><span class="range-value" id="spreadSizeVal">30</span></div>
    <label class="checkbox-label"><input type="checkbox" id="showSpread"> Show spread</label>
  </div>

  <div class="section">
    <div class="section-title">Master</div>
    <div class="range-row"><span class="range-label">Scale</span><input type="range" id="masterRadius" min="0" max="100" value="50"><span class="range-value" id="masterRadiusVal">50</span></div>
    <div class="range-row"><span class="range-label">Speed</span><input type="range" id="speed" min="0" max="100" value="20"><span class="range-value" id="speedVal">20</span></div>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="color-section-row">
      <span class="range-label">Text</span>
      <input type="color" id="typeColor" value="#1A1818">
      <button class="swap-btn" onclick="swapColors()" title="Swap colors">&#8646;</button>
      <input type="color" id="bgColor" value="#F8F5F0">
      <span class="range-label">Bg</span>
    </div>
  </div>

  <div class="section section-divider">
    <div class="section-title">Export</div>
    <div class="btn-row">
      <button class="btn" onclick="savePNG()">PNG</button>
      <button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button>
    </div>
    <div class="record-timer" id="recTimer"></div>
  </div>
  <div style="height:40px;"></div>
</div>

<div id="canvasContainer"></div>
<div class="tipo-progress-overlay" id="exportProgress">
  <div class="progress-box">
    <div class="progress-title" id="progressTitle">Finalizing...</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-info" id="progressInfo"></div>
  </div>
</div>
<div class="tipo-toast" id="toast"></div>

<script>
// ============================================================
// TIPÓ — BADGE MODE
// Circular text composition: strip, ring, tunnel, spread layers.
// Simplified from original 41-control system to ~15 controls.
// ============================================================
let font, recorder;
let prideMode = false;
const prideColors = ['#e70000','#ff8c00','#ffef00','#00811f','#0044ff','#760089'];
let textBuf = null, ringBuf = null;
let lastTxt = '', lastRingTxt = '';

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }

function setup() {
  setAttributes('preserveDrawingBuffer', true);
  const c = createCanvas(
    document.getElementById('canvasContainer').offsetWidth,
    document.getElementById('canvasContainer').offsetHeight,
    WEBGL
  );
  c.parent('canvasContainer');
  textFont(font);
  frameRate(30);
  TipoUI.init({ mode: 'badge', formatters: {} });
  recorder = TipoUI.recorder;
}

function windowResized() {
  resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
  lastTxt = ''; lastRingTxt = '';
}

function val(id) { return TipoUI.val(id); }
function chk(id) { return TipoUI.chk(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

function buildTextBuf(txt, h) {
  const g = createGraphics(2000, max(h, 10));
  g.background(0, 0);
  g.fill(255);
  g.noStroke();
  g.textFont(font);
  g.textSize(h * 0.8);
  g.textAlign(LEFT, CENTER);
  const w = g.textWidth(txt + '  ') || 1;
  const reps = ceil(2000 / w) + 1;
  for (let r = 0; r < reps; r++) g.text(txt + '  ', r * w, h / 2);
  return g;
}

function draw() {
  const bgC = document.getElementById('bgColor').value;
  const txtC = document.getElementById('typeColor').value;
  background(bgC);
  ortho(-width / 2, width / 2, -height / 2, height / 2, 0, 2000);

  const txt = document.getElementById('textInput').value || 'TIPÓ';
  const ringTxt = document.getElementById('textInput2').value || 'KINETIC TYPE';
  const uR = map(val('masterRadius'), 0, 100, 100, 500);
  const spd = val('speed') / 1000;
  const doAnim = chk('animate');

  // Rebuild textures
  if (txt !== lastTxt) { if (textBuf) textBuf.remove(); textBuf = buildTextBuf(txt, 60); lastTxt = txt; }
  if (ringTxt !== lastRingTxt) { if (ringBuf) ringBuf.remove(); ringBuf = buildTextBuf(ringTxt, 40); lastRingTxt = ringTxt; }

  push();

  // === TUNNEL (concentric expanding rings) ===
  if (chk('showTunnel')) {
    const tCount = val('tunnelCount');
    const tInner = val('tunnelInner') / 100;
    for (let t = 0; t < tCount; t++) {
      const progress = doAnim ? (t / tCount + frameCount * spd * 2) % 1 : t / tCount;
      const r = map(progress, 0, 1, uR * tInner, uR);
      const alpha = map(progress, 0, 1, 255, 50);
      const col = prideMode ? color(prideColors[t % 6]) : color(txtC);
      col.setAlpha(alpha);
      push();
      translate(0, 0, -2);
      noFill(); stroke(col); strokeWeight(2);
      ellipse(0, 0, r * 2, r * 2);
      pop();
    }
  }

  // === RING (text wrapped around circle) ===
  if (chk('showRing') && ringBuf) {
    const rRad = map(val('ringRadius'), 0, 100, 0, uR * 2);
    const rH = map(val('ringHeight'), 0, 100, 0, uR * 0.8);
    const rArc = map(val('ringArc'), 0, 100, 0, TWO_PI);
    const segments = 60;
    const segAngle = rArc / segments;
    const scrollU = doAnim ? (frameCount * spd * 3) % 1 : 0;

    push();
    translate(0, 0, -1);
    textureMode(NORMAL);
    texture(ringBuf);
    noStroke();
    beginShape(TRIANGLE_STRIP);
    for (let s = 0; s <= segments; s++) {
      const a = -HALF_PI + s * segAngle;
      const u = ((s / segments + scrollU) % 1);
      const outerX = cos(a) * (rRad + rH / 2);
      const outerY = sin(a) * (rRad + rH / 2);
      const innerX = cos(a) * (rRad - rH / 2);
      const innerY = sin(a) * (rRad - rH / 2);
      vertex(outerX, outerY, 0, u, 0);
      vertex(innerX, innerY, 0, u, 1);
    }
    endShape();
    pop();
  }

  // === SPREAD (letters distributed radially) ===
  if (chk('showSpread')) {
    const sRad = map(val('spreadRadius'), 0, 100, 0, uR * 1.5);
    const sFSize = map(val('spreadSize'), 0, 100, 0, 200);
    const letters = ringTxt;
    const eAngle = TWO_PI / letters.length;
    const rotOff = doAnim ? frameCount * spd : 0;

    push();
    noStroke();
    textSize(sFSize);
    textAlign(CENTER, CENTER);
    for (let j = 0; j < letters.length; j++) {
      const a = j * eAngle + PI + rotOff;
      const x = cos(a) * sRad;
      const y = sin(a) * sRad;
      const col = prideMode ? color(prideColors[j % 6]) : color(txtC);
      fill(col);
      push();
      translate(x, y);
      rotate(a + HALF_PI);
      text(letters.charAt(j), 0, 0);
      pop();
    }
    pop();
  }

  // === STRIP (center horizontal bar with scrolling text) ===
  if (chk('showStrip') && textBuf) {
    const sH = map(val('stripHeight'), 0, 100, 0, uR);
    const sPos = map(val('stripPos'), 0, 100, -uR, uR);

    push();
    translate(0, sPos, 1);
    // Background bar
    const stripC = prideMode ? color(prideColors[0]) : color(txtC);
    fill(stripC);
    noStroke();
    rect(-width, -sH / 2, width * 2, sH);
    // Scrolling text
    textureMode(NORMAL);
    texture(textBuf);
    const scrollX = doAnim ? (frameCount * spd * 5) % 1 : 0;
    beginShape();
    vertex(-width / 2, -sH / 2 + 2, 0.5, scrollX, 0);
    vertex(width / 2, -sH / 2 + 2, 0.5, scrollX + 0.5, 0);
    vertex(width / 2, sH / 2 - 2, 0.5, scrollX + 0.5, 1);
    vertex(-width / 2, sH / 2 - 2, 0.5, scrollX, 1);
    endShape(CLOSE);
    pop();
  }

  pop();
  TipoUI.captureFrame();
}

// ============================================================
// PRESETS
// ============================================================
function swapColors() { TipoUI.swapColors('typeColor', 'bgColor'); }

function resetAll() {
  prideMode = false;
  setVal('stripHeight',40);setVal('stripPos',50);setVal('showStrip',true);
  setVal('ringRadius',34);setVal('ringHeight',20);setVal('ringArc',100);setVal('showRing',true);
  setVal('tunnelCount',8);setVal('tunnelInner',10);setVal('showTunnel',false);setVal('animate',true);
  setVal('spreadRadius',65);setVal('spreadSize',30);setVal('showSpread',false);
  setVal('masterRadius',50);setVal('speed',20);
  document.getElementById('typeColor').value='#1A1818';
  document.getElementById('bgColor').value='#F8F5F0';
  lastTxt='';lastRingTxt='';
}

const PRESETS = {
  classic: () => { resetAll();
    setVal('showStrip',true);setVal('showRing',true);setVal('showTunnel',false);setVal('showSpread',false);
    setVal('stripHeight',50);setVal('stripPos',50);setVal('ringRadius',50);setVal('ringHeight',25);setVal('ringArc',100);
    setVal('masterRadius',50);setVal('speed',15);
    document.getElementById('typeColor').value='#ffffff';document.getElementById('bgColor').value='#000000';
  },
  seal: () => { resetAll();
    setVal('showStrip',true);setVal('showRing',true);setVal('showTunnel',false);setVal('showSpread',true);
    setVal('stripHeight',30);setVal('stripPos',50);setVal('ringRadius',60);setVal('ringHeight',15);setVal('ringArc',100);
    setVal('spreadRadius',40);setVal('spreadSize',20);
    setVal('masterRadius',55);setVal('speed',10);
    document.getElementById('typeColor').value='#ffffff';document.getElementById('bgColor').value='#011993';
  },
  orbit: () => { resetAll();
    setVal('showStrip',false);setVal('showRing',true);setVal('showTunnel',false);setVal('showSpread',false);
    setVal('ringRadius',45);setVal('ringHeight',35);setVal('ringArc',100);
    setVal('masterRadius',60);setVal('speed',25);
    document.getElementById('typeColor').value='#ff0000';document.getElementById('bgColor').value='#ffffff';
  },
  tunnel: () => { resetAll();
    setVal('showStrip',true);setVal('showRing',false);setVal('showTunnel',true);setVal('showSpread',false);
    setVal('stripHeight',20);setVal('tunnelCount',15);setVal('tunnelInner',5);
    setVal('masterRadius',60);setVal('speed',30);
    document.getElementById('typeColor').value='#00ff00';document.getElementById('bgColor').value='#000000';
  },
  spread: () => { resetAll();
    setVal('showStrip',false);setVal('showRing',false);setVal('showTunnel',false);setVal('showSpread',true);
    setVal('spreadRadius',50);setVal('spreadSize',60);
    setVal('masterRadius',50);setVal('speed',8);
    document.getElementById('typeColor').value='#000000';document.getElementById('bgColor').value='#ffff00';
  },
  minimal: () => { resetAll();
    setVal('showStrip',true);setVal('showRing',false);setVal('showTunnel',false);setVal('showSpread',false);
    setVal('stripHeight',15);setVal('stripPos',50);
    setVal('masterRadius',40);setVal('speed',10);
    document.getElementById('typeColor').value='#000000';document.getElementById('bgColor').value='#ffffff';
  },
  cosmic: () => { resetAll();
    setVal('showStrip',true);setVal('showRing',true);setVal('showTunnel',true);setVal('showSpread',true);
    setVal('stripHeight',25);setVal('ringRadius',55);setVal('ringHeight',15);
    setVal('tunnelCount',12);setVal('tunnelInner',20);
    setVal('spreadRadius',35);setVal('spreadSize',25);
    setVal('masterRadius',55);setVal('speed',20);
    document.getElementById('typeColor').value='#ffffff';document.getElementById('bgColor').value='#0000ff';
  },
  retro: () => { resetAll();
    setVal('showStrip',true);setVal('showRing',true);setVal('showTunnel',false);setVal('showSpread',false);
    setVal('stripHeight',60);setVal('stripPos',50);setVal('ringRadius',70);setVal('ringHeight',30);setVal('ringArc',80);
    setVal('masterRadius',45);setVal('speed',5);
    document.getElementById('typeColor').value='#ff7e79';document.getElementById('bgColor').value='#000000';
  },
  pride: () => { prideMode = true; },
};

function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
async function toggleRec() { await TipoUI.toggleRec(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body>
</html>
