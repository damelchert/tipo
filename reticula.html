<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Retícula</title>
<link rel="stylesheet" href="shared/style.css">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js"></script>
<script src="shared/ui.js"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
  .drop-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-5); letter-spacing: 2px; pointer-events: none; text-transform: uppercase; }
</style>
</head>
<body>

<div class="tipo-panel" id="panel">
  <h1>Retícula <span style="display:flex;gap:8px;"><a href="index.html#visual" class="back-link">VISUAL TOOLS</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">
    <div class="section-title">Image</div>
    <div class="btn-row">
      <button class="btn" onclick="document.getElementById('fileInput').click()">Upload Image</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('classic')">Classic</span>
      <span class="preset-chip" onclick="applyPreset('fine')">Fine</span>
      <span class="preset-chip" onclick="applyPreset('coarse')">Coarse</span>
      <span class="preset-chip" onclick="applyPreset('square')">Square</span>
      <span class="preset-chip" onclick="applyPreset('diamond')">Diamond</span>
      <span class="preset-chip" onclick="applyPreset('cross')">Cross</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Grid</div>
    <div class="range-row"><span class="range-label">Resolution</span><input type="range" id="resolution" min="5" max="100" value="30"><span class="range-value" id="resolutionVal">30</span></div>
    <div class="range-row"><span class="range-label">Min Size</span><input type="range" id="minSize" min="0" max="100" value="5"><span class="range-value" id="minSizeVal">5</span></div>
    <div class="range-row"><span class="range-label">Max Size</span><input type="range" id="maxSize" min="0" max="100" value="95"><span class="range-value" id="maxSizeVal">95</span></div>
    <div class="range-row"><span class="range-label">Angle</span><input type="range" id="angle" min="0" max="90" value="0"><span class="range-value" id="angleVal">0</span></div>
  </div>

  <div class="section">
    <div class="section-title">Shape</div>
    <select id="shape" style="width:100%;background:var(--bg-2);color:var(--text-1);border:1px solid var(--border-2);padding:6px;font-size:11px;font-family:var(--font-ui);">
      <option value="circle">Circle</option>
      <option value="square">Square</option>
      <option value="diamond">Diamond</option>
      <option value="cross">Cross</option>
      <option value="line">Line</option>
    </select>
    <label class="checkbox-label" style="margin-top:8px"><input type="checkbox" id="invert"> Invert</label>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="color-section-row">
      <span class="range-label">Dot</span>
      <input type="color" id="dotColor" value="#000000">
      <button class="swap-btn" onclick="swapC()" title="Swap">&#8646;</button>
      <input type="color" id="bgColor" value="#ffffff">
      <span class="range-label">Bg</span>
    </div>
    <label class="checkbox-label"><input type="checkbox" id="useOriginal"> Use original colors</label>
  </div>

  <div class="section section-divider">
    <div class="section-title">Export</div>
    <div class="btn-row">
      <button class="btn" onclick="savePNG()">PNG</button>
    </div>
  </div>
  <div style="height:40px;"></div>
</div>

<div id="canvasContainer">
  <div class="drop-hint" id="dropHint">Drop image here</div>
</div>
<div class="tipo-toast" id="toast"></div>

<script>
let font, sourceImg = null;

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }

function setup() {
  const c = createCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
  c.parent('canvasContainer');
  textFont(font); pixelDensity(1); noLoop();
  TipoUI.init({ mode: 'reticula', formatters: {} });
  createDefaultImage();
  bindInputs();
}

function windowResized() { resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight); redraw(); }

function val(id) { return TipoUI.val(id); }
function chk(id) { return TipoUI.chk(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

function createDefaultImage() {
  const g = createGraphics(640, 480);
  for (let y = 0; y < 480; y++) { const t = y/480; g.stroke(lerpColor(color('#ff6600'), color('#000033'), t)); g.line(0,y,640,y); }
  g.noStroke(); g.fill(255); g.textSize(60); g.textAlign(CENTER,CENTER); g.text('TIPÓ', 320, 200);
  g.textSize(16); g.text('drop image here', 320, 300);
  sourceImg = g;
  redraw();
}

function bindInputs() {
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) { loadImage(URL.createObjectURL(file), img => { sourceImg = img; document.getElementById('dropHint').style.display='none'; redraw(); }); }
  });
  const cc = document.getElementById('canvasContainer');
  cc.addEventListener('dragover', e => e.preventDefault());
  cc.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) { loadImage(URL.createObjectURL(file), img => { sourceImg = img; document.getElementById('dropHint').style.display='none'; redraw(); }); }
  });
  document.querySelectorAll('input[type="range"], input[type="checkbox"], input[type="color"], select').forEach(el => el.addEventListener('input', () => redraw()));
}

function draw() {
  if (!sourceImg) return;
  const bgC = document.getElementById('bgColor').value;
  const dotC = document.getElementById('dotColor').value;
  const useOrig = chk('useOriginal');
  const inv = chk('invert');
  const res = val('resolution');
  const minS = val('minSize') / 100;
  const maxS = val('maxSize') / 100;
  const ang = radians(val('angle'));
  const shape = document.getElementById('shape').value;

  background(bgC);

  // Fit image to canvas
  const scale = min(width / sourceImg.width, height / sourceImg.height);
  const iw = sourceImg.width * scale;
  const ih = sourceImg.height * scale;
  const ox = (width - iw) / 2;
  const oy = (height - ih) / 2;

  // Sample source at grid resolution
  const cellSize = max(width, height) / res;

  push();
  translate(width/2, height/2);
  rotate(ang);
  translate(-width/2, -height/2);

  noStroke();

  const cols = ceil(width / cellSize) + 2;
  const rows = ceil(height / cellSize) + 2;

  for (let r = -1; r < rows; r++) {
    for (let c = -1; c < cols; c++) {
      const cx = c * cellSize + cellSize / 2;
      const cy = r * cellSize + cellSize / 2;

      // Map to source image coords
      const sx = map(cx, ox, ox + iw, 0, sourceImg.width);
      const sy = map(cy, oy, oy + ih, 0, sourceImg.height);

      if (sx < 0 || sx >= sourceImg.width || sy < 0 || sy >= sourceImg.height) continue;

      const pixel = sourceImg.get(floor(sx), floor(sy));
      const bright = (red(pixel) * 0.299 + green(pixel) * 0.587 + blue(pixel) * 0.114) / 255;
      const b = inv ? bright : 1 - bright;
      const dotSize = cellSize * (minS + b * (maxS - minS));

      if (dotSize < 0.5) continue;

      if (useOrig) {
        fill(red(pixel), green(pixel), blue(pixel));
      } else {
        fill(dotC);
      }

      switch (shape) {
        case 'circle': ellipse(cx, cy, dotSize, dotSize); break;
        case 'square': rectMode(CENTER); rect(cx, cy, dotSize, dotSize); break;
        case 'diamond': push(); translate(cx,cy); rotate(PI/4); rectMode(CENTER); rect(0,0,dotSize*0.7,dotSize*0.7); pop(); break;
        case 'cross': rectMode(CENTER); rect(cx,cy,dotSize,dotSize*0.25); rect(cx,cy,dotSize*0.25,dotSize); break;
        case 'line': strokeWeight(dotSize*0.3); stroke(useOrig ? color(red(pixel),green(pixel),blue(pixel)) : dotC); line(cx-dotSize/2,cy,cx+dotSize/2,cy); noStroke(); break;
      }
    }
  }
  pop();
}

function swapC() { TipoUI.swapColors('dotColor','bgColor'); redraw(); }
function savePNG() { saveCanvas('tipo-reticula','png'); TipoUI.showToast('PNG saved'); }

function resetAll() {
  setVal('resolution',30);setVal('minSize',5);setVal('maxSize',95);setVal('angle',0);
  setVal('invert',false);setVal('useOriginal',false);
  document.getElementById('shape').value='circle';
  document.getElementById('dotColor').value='#000000';document.getElementById('bgColor').value='#ffffff';
  redraw();
}

function applyPreset(name) {
  const P = {
    classic:()=>{resetAll();},
    fine:()=>{resetAll();setVal('resolution',60);setVal('minSize',0);setVal('maxSize',80);},
    coarse:()=>{resetAll();setVal('resolution',12);setVal('maxSize',100);},
    square:()=>{resetAll();document.getElementById('shape').value='square';setVal('resolution',25);},
    diamond:()=>{resetAll();document.getElementById('shape').value='diamond';setVal('resolution',20);setVal('angle',45);},
    cross:()=>{resetAll();document.getElementById('shape').value='cross';setVal('resolution',15);document.getElementById('dotColor').value='#ff0000';},
  };
  if(P[name]) P[name]();
  document.querySelectorAll('.preset-chip').forEach(el=>el.classList.remove('active'));
  if(event&&event.target) event.target.classList.add('active');
  redraw();
}
</script>
</body>
</html>
