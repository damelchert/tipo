<style>
  body { display: flex; height: 100vh; }
  #canvasWrap { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: var(--bg-0); }
  #canvasWrap canvas { max-width: 100%; max-height: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.35); }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
  .drop-hint { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-5); letter-spacing: 2px; pointer-events: none; text-transform: uppercase; }
  select { width: 100%; background: var(--bg-2); color: var(--text-1); border: 1px solid var(--border-2); padding: 6px; font-size: 11px; font-family: var(--font-ui); }
  .help-icon { display: inline-flex; align-items: center; justify-content: center; width: 13px; height: 13px; border-radius: 50%; border: 1px solid var(--border-2); color: var(--text-5); font-size: 9px; font-weight: 400; cursor: help; margin-left: 6px; flex: none; user-select: none; text-transform: none; letter-spacing: 0; vertical-align: middle; }
  .help-icon:hover { border-color: var(--accent); color: var(--accent); }
  #helpTooltip { position: fixed; z-index: 9999; max-width: 250px; background: var(--bg-2); border: 1px solid var(--border-2); color: var(--text-2); font-size: 11px; line-height: 1.55; padding: 9px 11px; border-radius: 6px; pointer-events: none; opacity: 0; transition: opacity .15s; letter-spacing: 0; text-transform: none; box-shadow: 0 4px 16px rgba(0,0,0,.35); }
  /* gradient editor */
  #gradEditor { position: relative; margin-top: 8px; user-select: none; }
  #gradBar { width: 100%; height: 30px; border: 1px solid var(--border-2); border-radius: 4px; cursor: copy; display: block; }
  #gradStops { position: relative; height: 18px; }
  .grad-stop { position: absolute; top: 1px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.4); transform: translateX(-50%); cursor: grab; }
  .grad-stop.sel { outline: 2px solid var(--accent); outline-offset: 1px; }
  #gradHint { font-size: 9px; color: var(--text-5); margin-top: 4px; letter-spacing: 0.4px; }
  #stopColorRow { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
  #stopColor { width: 40px; height: 24px; border: 1px solid var(--border-2); background: var(--bg-2); }
  #stopColorRow .btn { padding: 4px 9px; font-size: 10px; }
</style>
</head>
<body>

<div class="tipo-panel" id="panel">
  <h1>Gradient Map <span style="display:flex;gap:8px;"><a href="index.html#visual" class="back-link">VISUAL TOOLS</a><a href="index.html" class="back-link">HOME</a></span></h1>

  <div class="section">
    <div class="section-title">Source</div>
    <div class="btn-row">
      <button class="btn" onclick="document.getElementById('fileInput').click()">Upload</button>
      <button class="btn btn-secondary" id="webcamBtn" onclick="toggleWebcam()">Webcam</button>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('athos')">Athos</span>
      <span class="preset-chip" onclick="applyPreset('duotone')">Duotone</span>
      <span class="preset-chip" onclick="applyPreset('sunset')">Sunset</span>
      <span class="preset-chip" onclick="applyPreset('infrared')">Infrared</span>
      <span class="preset-chip" onclick="applyPreset('chrome')">Chrome</span>
      <span class="preset-chip" onclick="applyPreset('neon')">Neon</span>
      <span class="preset-chip" onclick="applyPreset('sepia')">Sepia</span>
      <span class="preset-chip" onclick="applyPreset('acid')">Acid</span>
      <span class="preset-chip" onclick="applyPreset('athos')" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Gradient<span class="help-icon" data-help="O mapa: a luminância de cada pixel (escuro→claro) vira a cor correspondente da rampa. Clique na barra pra ADICIONAR um stop, arraste pra mover, duplo-clique pra remover (mín. 2). Clique num stop pra selecionar e trocar a cor abaixo.">?</span></div>
    <div id="gradEditor">
      <canvas id="gradBar" width="300" height="30"></canvas>
      <div id="gradStops"></div>
      <div id="gradHint">click bar = add &bull; drag = move &bull; double-click = remove</div>
      <div id="stopColorRow">
        <input type="color" id="stopColor" value="#2A8A7A">
        <button class="btn btn-secondary" onclick="removeSelectedStop()">Remove stop</button>
        <button class="btn btn-secondary" onclick="distributeStops()">Distribute</button>
      </div>
    </div>
    <label class="checkbox-label" style="font-size:11px;margin-top:8px;"><input type="checkbox" id="reverseGrad"> Reverse gradient</label>
  </div>

  <div class="section">
    <div class="section-title">Tone<span class="help-icon" data-help="Contrast: curva S aplicada na luminância ANTES do mapeamento — empurra tons pros extremos da rampa. Brightness desloca a janela. Posterize: degraus discretos de cor (0 = gradiente contínuo; 3-8 = look serigrafia). Mix: mistura com a imagem original.">?</span></div>
    <div class="range-row"><span class="range-label">Contrast</span><input type="range" id="contrast" min="-100" max="100" value="0"><span class="range-value" id="contrastVal">0</span></div>
    <div class="range-row"><span class="range-label">Brightness</span><input type="range" id="brightness" min="-100" max="100" value="0"><span class="range-value" id="brightnessVal">0</span></div>
    <div class="range-row"><span class="range-label">Posterize</span><input type="range" id="posterize" min="0" max="16" value="0"><span class="range-value" id="posterizeVal">0</span></div>
    <div class="range-row"><span class="range-label">Mix</span><input type="range" id="mix" min="0" max="100" value="100"><span class="range-value" id="mixVal">100</span></div>
  </div>

  <div class="section">
    <div class="section-title">Motion<span class="help-icon" data-help="Cycle: desloca a rampa ao longo do tempo (a paleta gira pela imagem) — anima uma imagem parada na gravação de MP4. Vídeo e webcam já são remapeados a cada frame.">?</span></div>
    <div class="range-row"><span class="range-label">Cycle</span><input type="range" id="cycle" min="0" max="100" value="0"><span class="range-value" id="cycleVal">0</span></div>
  </div>

  <div class="section section-divider">
    <div class="section-title">Export</div>
    <div class="btn-row">
      <button class="btn" onclick="exportPNG()">PNG</button>
      <button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button>
    </div>
    <div class="record-timer" id="recTimer"></div>
  </div>
  <div style="height:40px;"></div>
</div>

<div id="canvasWrap">
  <div class="drop-hint" id="dropHint">Drop image or video &bull; demo mode</div>
  <canvas id="mainCanvas"></canvas>
</div>

<script>
// ============================================================
// TIPÓ — GRADIENT MAP
// Luminance → color ramp with draggable stops (Photoshop-style
// gradient map, but live, with video/webcam and animated cycle).
// ============================================================
const mainCanvas = document.getElementById('mainCanvas');
const mainCtx = mainCanvas.getContext('2d', { willReadFrequently: true });
const workCanvas = document.createElement('canvas');
const workCtx = workCanvas.getContext('2d', { willReadFrequently: true });

let sourceImg = null;
let sourceVideo = null;
let webcamStream = null;
let sourceType = null; // null (demo) | 'image' | 'video' | 'webcam'
let recorder = null;
let mediaUrl = null;
let needsRender = true;
let cycleT = 0;

function val(id) { return Number(document.getElementById(id).value); }
function chk(id) { return document.getElementById(id).checked; }
function requestRender() { needsRender = true; }

// ============================================================
// GRADIENT STOPS (model) + LUT
// ============================================================
// stops: [{pos: 0..1, color: '#rrggbb'}], always >= 2
let stops = [];
let selectedStop = -1;
let lut = new Uint8ClampedArray(256 * 3);
let lutDirty = true;

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function buildLUT() {
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  const rev = chk('reverseGrad');
  for (let i = 0; i < 256; i++) {
    let t = i / 255;
    if (rev) t = 1 - t;
    let a = sorted[0], b = sorted[sorted.length - 1];
    if (t <= sorted[0].pos) { a = b = sorted[0]; }
    else if (t >= sorted[sorted.length - 1].pos) { a = b = sorted[sorted.length - 1]; }
    else {
      for (let s = 0; s < sorted.length - 1; s++) {
        if (t >= sorted[s].pos && t <= sorted[s + 1].pos) { a = sorted[s]; b = sorted[s + 1]; break; }
      }
    }
    const span = b.pos - a.pos;
    const f = span > 0.0001 ? (t - a.pos) / span : 0;
    const ca = hexToRgb(a.color), cb = hexToRgb(b.color);
    lut[i * 3]     = ca[0] + (cb[0] - ca[0]) * f;
    lut[i * 3 + 1] = ca[1] + (cb[1] - ca[1]) * f;
    lut[i * 3 + 2] = ca[2] + (cb[2] - ca[2]) * f;
  }
  lutDirty = false;
}

// ============================================================
// GRADIENT EDITOR UI
// ============================================================
const gradBar = document.getElementById('gradBar');
const gradStopsEl = document.getElementById('gradStops');

function drawGradBar() {
  const g = gradBar.getContext('2d');
  const w = gradBar.width, h = gradBar.height;
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  const grad = g.createLinearGradient(0, 0, w, 0);
  sorted.forEach(s => grad.addColorStop(Math.max(0, Math.min(1, s.pos)), s.color));
  g.fillStyle = grad;
  g.fillRect(0, 0, w, h);
}

function renderStopsUI() {
  gradStopsEl.innerHTML = '';
  stops.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'grad-stop' + (i === selectedStop ? ' sel' : '');
    el.style.left = (s.pos * 100) + '%';
    el.style.background = s.color;
    el.dataset.idx = i;
    gradStopsEl.appendChild(el);
  });
  drawGradBar();
  if (selectedStop >= 0 && stops[selectedStop]) {
    document.getElementById('stopColor').value = stops[selectedStop].color;
  }
}

function gradChanged() { lutDirty = true; renderStopsUI(); requestRender(); }

function selectStop(i) {
  selectedStop = i;
  renderStopsUI();
}

function addStopAt(pos) {
  if (stops.length >= 10) return;
  // color = current gradient color at pos
  if (lutDirty) buildLUT();
  const idx = Math.round(Math.max(0, Math.min(1, pos)) * 255);
  const i = chk('reverseGrad') ? 255 - idx : idx;
  const hex = '#' + [lut[i * 3], lut[i * 3 + 1], lut[i * 3 + 2]]
    .map(v => Math.round(v).toString(16).padStart(2, '0')).join('');
  stops.push({ pos, color: hex });
  selectedStop = stops.length - 1;
  gradChanged();
}

function removeStop(i) {
  if (stops.length <= 2) return;
  stops.splice(i, 1);
  if (selectedStop >= stops.length) selectedStop = stops.length - 1;
  gradChanged();
}

function removeSelectedStop() {
  if (selectedStop >= 0) removeStop(selectedStop);
}

function distributeStops() {
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  sorted.forEach((s, i) => { s.pos = sorted.length === 1 ? 0.5 : i / (sorted.length - 1); });
  stops = sorted;
  gradChanged();
}

// pointer interactions
let dragIdx = -1, dragMoved = false;
gradStopsEl.addEventListener('pointerdown', e => {
  const t = e.target.closest('.grad-stop');
  if (!t) return;
  dragIdx = Number(t.dataset.idx);
  dragMoved = false;
  selectStop(dragIdx);
  gradStopsEl.setPointerCapture(e.pointerId);
});
gradStopsEl.addEventListener('pointermove', e => {
  if (dragIdx < 0) return;
  const r = gradBar.getBoundingClientRect();
  const pos = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  if (Math.abs(pos - stops[dragIdx].pos) > 0.002) dragMoved = true;
  stops[dragIdx].pos = pos;
  gradChanged();
});
gradStopsEl.addEventListener('pointerup', () => { dragIdx = -1; });
gradStopsEl.addEventListener('dblclick', e => {
  const t = e.target.closest('.grad-stop');
  if (t) removeStop(Number(t.dataset.idx));
});
gradBar.addEventListener('click', e => {
  const r = gradBar.getBoundingClientRect();
  addStopAt((e.clientX - r.left) / r.width);
});
document.getElementById('stopColor').addEventListener('input', e => {
  if (selectedStop >= 0 && stops[selectedStop]) {
    stops[selectedStop].color = e.target.value;
    gradChanged();
  }
});
['input', 'change'].forEach(ev => document.getElementById('reverseGrad').addEventListener(ev, () => { lutDirty = true; drawGradBar(); requestRender(); }));

// ============================================================
// SOURCE / MEDIA
// ============================================================
function setMediaUrl(url) { if (mediaUrl) URL.revokeObjectURL(mediaUrl); mediaUrl = url; }

function releaseVideo() {
  if (!sourceVideo) return;
  sourceVideo.pause();
  sourceVideo.srcObject = null;
  sourceVideo.removeAttribute('src');
  sourceVideo.load();
  sourceVideo = null;
}

function handleFile(file) {
  document.getElementById('dropHint').style.display = 'none';
  if (file.type.startsWith('image/')) {
    if (webcamStream) { webcamStream.getTracks().forEach(t => t.stop()); webcamStream = null; }
    releaseVideo();
    setMediaUrl(null);
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); sourceImg = img; sourceType = 'image'; requestRender(); };
    img.onerror = () => URL.revokeObjectURL(url);
    img.src = url;
  } else if (file.type.startsWith('video/')) {
    if (webcamStream) { webcamStream.getTracks().forEach(t => t.stop()); webcamStream = null; }
    releaseVideo();
    const url = URL.createObjectURL(file);
    setMediaUrl(url);
    const vid = document.createElement('video');
    vid.src = url;
    vid.loop = true; vid.muted = true; vid.playsInline = true;
    vid.play();
    sourceVideo = vid; sourceImg = null; sourceType = 'video';
    document.getElementById('webcamBtn').textContent = 'Webcam';
    document.getElementById('webcamBtn').style.borderColor = '';
    requestRender();
  }
}

function toggleWebcam() {
  if (webcamStream) {
    webcamStream.getTracks().forEach(t => t.stop());
    webcamStream = null;
    releaseVideo();
    sourceType = sourceImg ? 'image' : null;
    document.getElementById('webcamBtn').textContent = 'Webcam';
    document.getElementById('webcamBtn').style.borderColor = '';
    requestRender();
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
    .then(stream => {
      webcamStream = stream;
      releaseVideo();
      setMediaUrl(null);
      const vid = document.createElement('video');
      vid.srcObject = stream; vid.muted = true; vid.playsInline = true;
      vid.play();
      sourceVideo = vid; sourceType = 'webcam';
      document.getElementById('dropHint').style.display = 'none';
      document.getElementById('webcamBtn').textContent = 'Stop Cam';
      document.getElementById('webcamBtn').style.borderColor = 'var(--red)';
      requestRender();
    })
    .catch(err => {
      console.error('Webcam error:', err);
      const btn = document.getElementById('webcamBtn');
      btn.textContent = 'Cam denied';
      setTimeout(() => { btn.textContent = 'Webcam'; }, 2000);
    });
}

function getCurrentFrame() {
  if ((sourceType === 'video' || sourceType === 'webcam') && sourceVideo) return sourceVideo;
  return sourceImg; // null = demo
}

// ============================================================
// DEMO SOURCE
// ============================================================
let demoCanvas = null;
function getDemo() {
  if (demoCanvas) return demoCanvas;
  demoCanvas = document.createElement('canvas');
  demoCanvas.width = 900; demoCanvas.height = 620;
  const g = demoCanvas.getContext('2d');
  const bg = g.createLinearGradient(0, 0, 900, 620);
  bg.addColorStop(0, '#0a0a0a'); bg.addColorStop(1, '#e8e8e8');
  g.fillStyle = bg; g.fillRect(0, 0, 900, 620);
  // luminance spheres
  for (const [x, y, r] of [[210, 200, 130], [630, 380, 170], [720, 140, 75], [200, 470, 85]]) {
    const sp = g.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.08, x, y, r);
    sp.addColorStop(0, '#ffffff'); sp.addColorStop(0.6, '#777777'); sp.addColorStop(1, 'rgba(0,0,0,0.85)');
    g.fillStyle = sp;
    g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2); g.fill();
  }
  g.fillStyle = '#fff';
  g.font = '900 130px "IBM Plex Mono", monospace';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = '#000'; g.shadowBlur = 30;
  g.fillText('MAP', 450, 312);
  g.shadowBlur = 0;
  return demoCanvas;
}

// ============================================================
// RENDER
// ============================================================
function workingSize() {
  const frame = getCurrentFrame() || getDemo();
  const sw = frame.videoWidth || frame.naturalWidth || frame.width;
  const sh = frame.videoHeight || frame.naturalHeight || frame.height;
  const cap = sourceType === 'image' || sourceType === null ? 1100 : 860;
  const sc = Math.min(1, cap / Math.max(sw, sh));
  let w = Math.max(2, Math.round(sw * sc)), h = Math.max(2, Math.round(sh * sc));
  w += w % 2; h += h % 2;
  return { w, h };
}

// 256-entry tone curve: brightness shift + S-curve contrast (+ posterize + cycle)
const tone = new Uint8Array(256);
function buildToneCurve() {
  const c = val('contrast') / 100;          // -1..1
  const b = val('brightness') / 100;        // -1..1
  const post = val('posterize');
  const cyc = val('cycle') / 100;
  const shift = cyc > 0 ? (cycleT % 1) : 0;
  for (let i = 0; i < 256; i++) {
    let t = i / 255 + b * 0.5;
    // S-curve around 0.5 (positive c) / flatten (negative c)
    if (c > 0) {
      const k = 1 + c * 6;
      t = 0.5 + Math.tanh((t - 0.5) * k) / (2 * Math.tanh(0.5 * k));
    } else if (c < 0) {
      t = 0.5 + (t - 0.5) * (1 + c * 0.9);
    }
    if (post >= 2) t = Math.round(t * (post - 1)) / (post - 1);
    if (shift > 0) t = (t + shift) % 1;
    tone[i] = Math.max(0, Math.min(255, Math.round(t * 255)));
  }
}

function render() {
  const frame = getCurrentFrame() || getDemo();
  if ((sourceType === 'video' || sourceType === 'webcam') && frame.readyState < 2) return;
  const { w, h } = workingSize();
  if (mainCanvas.width !== w || mainCanvas.height !== h) { mainCanvas.width = w; mainCanvas.height = h; }
  if (workCanvas.width !== w || workCanvas.height !== h) { workCanvas.width = w; workCanvas.height = h; }

  // source → work canvas (cover fit)
  const sw = frame.videoWidth || frame.naturalWidth || frame.width;
  const sh = frame.videoHeight || frame.naturalHeight || frame.height;
  const sc = Math.max(w / sw, h / sh);
  const cw = w / sc, ch = h / sc;
  workCtx.drawImage(frame, (sw - cw) / 2, (sh - ch) / 2, cw, ch, 0, 0, w, h);

  if (lutDirty) buildLUT();
  buildToneCurve();

  const id = workCtx.getImageData(0, 0, w, h);
  const d = id.data;
  const mix = val('mix') / 100;
  const keep = 1 - mix;
  for (let p = 0; p < d.length; p += 4) {
    const l = tone[(d[p] * 77 + d[p + 1] * 150 + d[p + 2] * 29) >> 8]; // 0.299/0.587/0.114 fixed-point
    const q = l * 3;
    if (keep > 0) {
      d[p]     = lut[q]     * mix + d[p]     * keep;
      d[p + 1] = lut[q + 1] * mix + d[p + 1] * keep;
      d[p + 2] = lut[q + 2] * mix + d[p + 2] * keep;
    } else {
      d[p] = lut[q]; d[p + 1] = lut[q + 1]; d[p + 2] = lut[q + 2];
    }
  }
  mainCtx.putImageData(id, 0, 0);

  if (recorder && recorder.isRecording) recorder.captureFrame();
}

// ============================================================
// LOOP — continuous only when dynamic (video/webcam/cycle/rec)
// ============================================================
function isDynamic() {
  return sourceType === 'video' || sourceType === 'webcam' || val('cycle') > 0 || (recorder && recorder.isRecording);
}

let last = 0;
function loop(now) {
  requestAnimationFrame(loop);
  if (now - last < 33) return; // ~30fps
  last = now;
  if (isDynamic()) {
    cycleT += 0.004 * (1 + val('cycle') / 25);
    render();
    needsRender = false;
  } else if (needsRender) {
    render();
    needsRender = false;
  }
}
requestAnimationFrame(loop);

// ============================================================
// EXPORT
// ============================================================
function exportPNG() {
  mainCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.download = 'tipo-gradientmap.png';
    a.href = url;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }, 'image/png');
}

async function toggleRec() {
  if (!recorder) {
    recorder = new TipoRecorder(mainCanvas);
    recorder.setTimerElement(document.getElementById('recTimer'));
  }
  const btn = document.getElementById('recBtn');
  if (!recorder.isRecording) {
    await recorder.start(8000000);
    btn.textContent = 'Stop Recording';
    btn.style.borderColor = 'var(--red)';
  } else {
    const result = await recorder.stop();
    TipoRecorder.download(result.blob, result.filename);
    btn.textContent = 'Record MP4';
    btn.style.borderColor = '';
  }
}

// ============================================================
// PRESETS
// ============================================================
const PRESETS = {
  athos:    { stops: [['#1A1818', 0], ['#2A8A7A', 0.45], ['#D4A040', 0.78], ['#F8F5F0', 1]], contrast: 0,  brightness: 0, posterize: 0, mix: 100, cycle: 0 },
  duotone:  { stops: [['#101060', 0], ['#ff5a36', 1]], contrast: 20, brightness: 0, posterize: 0, mix: 100, cycle: 0 },
  sunset:   { stops: [['#1c0030', 0], ['#7a1060', 0.35], ['#ff4060', 0.62], ['#ffb030', 0.85], ['#fff6d8', 1]], contrast: 12, brightness: 0, posterize: 0, mix: 100, cycle: 0 },
  infrared: { stops: [['#03052e', 0], ['#3b0f6e', 0.3], ['#c4205a', 0.58], ['#ff7a18', 0.8], ['#ffffff', 1]], contrast: 25, brightness: 0, posterize: 0, mix: 100, cycle: 0 },
  chrome:   { stops: [['#000000', 0], ['#8aa0b4', 0.3], ['#f8fbff', 0.5], ['#46586a', 0.72], ['#ffffff', 1]], contrast: 35, brightness: 0, posterize: 0, mix: 100, cycle: 0 },
  neon:     { stops: [['#05010d', 0], ['#2de2e6', 0.4], ['#f706cf', 0.7], ['#f9f871', 1]], contrast: 30, brightness: 0, posterize: 0, mix: 100, cycle: 0 },
  sepia:    { stops: [['#241608', 0], ['#6b4a26', 0.45], ['#c49a64', 0.8], ['#f4e8d0', 1]], contrast: -10, brightness: 5, posterize: 0, mix: 100, cycle: 0 },
  acid:     { stops: [['#001a00', 0], ['#19c400', 0.35], ['#e0ff20', 0.6], ['#ff20c0', 0.82], ['#20f0ff', 1]], contrast: 18, brightness: 0, posterize: 6, mix: 100, cycle: 24 },
};

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  stops = p.stops.map(([color, pos]) => ({ color, pos }));
  selectedStop = 0;
  ['contrast', 'brightness', 'posterize', 'mix', 'cycle'].forEach(id => {
    document.getElementById(id).value = p[id];
  });
  document.getElementById('reverseGrad').checked = false;
  updateLabels();
  gradChanged();
  if (typeof event !== 'undefined' && event && event.target) {
    document.querySelectorAll('.preset-chip').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
  }
}

function updateLabels() {
  ['contrast', 'brightness', 'posterize', 'mix', 'cycle'].forEach(id => {
    document.getElementById(id + 'Val').textContent = document.getElementById(id).value;
  });
}

// ============================================================
// BINDINGS
// ============================================================
['contrast', 'brightness', 'posterize', 'mix', 'cycle'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { updateLabels(); requestRender(); });
});

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
const wrap = document.getElementById('canvasWrap');
wrap.addEventListener('dragover', e => e.preventDefault());
wrap.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// ============================================================
// HELP TOOLTIPS
// ============================================================
(function initHelp() {
  const tip = document.createElement('div');
  tip.id = 'helpTooltip';
  document.body.appendChild(tip);
  let pinned = null;
  function show(el) {
    tip.textContent = el.dataset.help;
    tip.style.left = '0px'; tip.style.top = '0px';
    tip.style.opacity = '1';
    const r = el.getBoundingClientRect();
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let x = r.right + 10, y = r.top - 4;
    if (x + tw > window.innerWidth - 8) x = Math.max(8, r.left - tw - 10);
    if (y + th > window.innerHeight - 8) y = Math.max(8, window.innerHeight - th - 8);
    tip.style.left = x + 'px'; tip.style.top = y + 'px';
  }
  function hide() { tip.style.opacity = '0'; pinned = null; }
  document.querySelectorAll('.help-icon').forEach(el => {
    el.addEventListener('mouseenter', () => show(el));
    el.addEventListener('mouseleave', () => { if (pinned !== el) hide(); });
    el.addEventListener('click', (e) => {
      e.stopPropagation(); e.preventDefault();
      if (pinned === el) hide(); else { pinned = el; show(el); }
    });
  });
  document.addEventListener('click', () => { if (pinned) hide(); });
  document.getElementById('panel').addEventListener('scroll', hide);
})();

// ============================================================
// THEME + BACK (standalone, same as riso/datamosh/pixelsort)
// ============================================================
(function initTheme() {
  const saved = localStorage.getItem('tipo-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.createElement('button');
  btn.className = 'tipo-theme-toggle';
  btn.title = 'Toggle light/dark theme';
  btn.textContent = saved === 'dark' ? '\u263C' : '\u263E';
  btn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('tipo-theme', next);
    btn.textContent = next === 'dark' ? '\u263C' : '\u263E';
  });
  document.body.appendChild(btn);

  const back = document.createElement('a');
  back.className = 'tipo-back-btn';
  back.href = 'index.html#visual';
  back.title = 'Back to menu';
  back.textContent = '\u2190';
  document.body.appendChild(back);
})();

// Init
applyPreset('athos');
</script>
