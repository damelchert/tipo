<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Tipó — Kinetic type, motion typography &amp; visual tools. 100% browser, zero install.">
<meta name="theme-color" content="#0a0a0a">
<title>Tipó — Flash</title>
<link rel="stylesheet" href="shared/style.css?v=20260711-typ2">
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/build/mp4-muxer.min.js"></script>
<script src="shared/recorder.js?v=20260612-cap"></script>
<script src="shared/ui.js?v=20260711-typ2"></script>
<style>
  body { display: flex; height: 100vh; }
  #canvasContainer { flex: 1; position: relative; overflow: hidden; }
  #canvasContainer canvas { display: block; }
  .back-link { font-size: 9px; color: var(--text-5); text-decoration: none; letter-spacing: 1px; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="tipo-panel" id="panel">
  <h1>Flash <span style="display:flex;gap:8px;"><a href="index.html#animation" class="back-link">KINETIC TYPE</a><a href="index.html" class="back-link">HOME</a></span></h1>
  <div class="section"><div class="section-title">Text</div><input type="text" id="textInput" value="TIPÓ" placeholder="Type here..."></div>
  <div class="section"><div class="section-title">Presets</div>
    <div class="preset-grid">
      <span class="preset-chip" onclick="applyPreset('rapid')">Rapid</span>
      <span class="preset-chip" onclick="applyPreset('slow')">Slow</span>
      <span class="preset-chip" onclick="applyPreset('big')">Big</span>
      <span class="preset-chip" onclick="applyPreset('chaos')">Chaos</span>
      <span class="preset-chip" onclick="applyPreset('pride')">Pride</span>
      <span class="preset-chip" onclick="resetAll()" style="border-color:#ff4444;color:#ff4444;">Reset</span>
    </div>
  </div>
  <div class="section"><div class="section-title">Animation</div>
    <div class="range-row"><span class="range-label">Font Size</span><input type="range" id="fontSize" min="20" max="300" value="100"><span class="range-value" id="fontSizeVal">100</span></div>
    <div class="range-row"><span class="range-label">Scene Length</span><input type="range" id="sceneLen" min="10" max="120" value="30"><span class="range-value" id="sceneLenVal">30</span></div>
    <div class="range-row"><span class="range-label">Repeat</span><input type="range" id="repeat" min="1" max="10" value="1"><span class="range-value" id="repeatVal">1</span></div>
    <div class="range-row"><span class="range-label">Easing</span><input type="range" id="easing" min="0" max="9" value="2"><span class="range-value" id="easingVal">cubic</span></div>
    <div class="range-row"><span class="range-label">Organic</span><input type="range" id="organic" min="0" max="100" value="0"><span class="range-value" id="organicVal">0</span></div>
  </div>
  <div class="section"><div class="section-title">Color</div>
    <div class="color-section-row"><span class="range-label">Text</span><input type="color" id="typeColor" value="#1A1818"><button class="swap-btn" onclick="swapColors()" title="Swap">&#8646;</button><input type="color" id="bgColor" value="#F8F5F0"><span class="range-label">Bg</span></div>
  </div>
  <div class="section section-divider"><div class="section-title">Export</div><div class="btn-row"><button class="btn" onclick="savePNG()">PNG</button><button class="btn btn-secondary" id="recBtn" onclick="toggleRec()">Record MP4</button></div><div class="record-timer" id="recTimer"></div></div>
  <div style="height:40px;"></div>
</div>
<div id="canvasContainer"></div>
<div class="tipo-progress-overlay" id="exportProgress"><div class="progress-box"><div class="progress-title" id="progressTitle">Finalizing...</div><div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div><div class="progress-info" id="progressInfo"></div></div></div>
<div class="tipo-toast" id="toast"></div>
<script>
let font, recorder;
let prideMode = false;
const prideColors = ['#e70000','#ff8c00','#ffef00','#00811f','#0044ff','#760089'];
const effects = ['scale-in','shear','rotate','split','slide-up','slide-down','fade','zoom'];

function preload() { font = loadFont('assets/fonts/IBMPlexMono-Regular.ttf'); }
function setup() {
  const c = createCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight);
  c.parent('canvasContainer'); textFont(font); pixelDensity(1);
  TipoUI.init({ mode: 'flash', formatters: { easing: v => TipoEase._names[v] } }); recorder = TipoUI.recorder;
}
function windowResized() { resizeCanvas(document.getElementById('canvasContainer').offsetWidth, document.getElementById('canvasContainer').offsetHeight); }
function val(id) { return TipoUI.val(id); }
function setVal(id, v) { TipoUI.setVal(id, v); }

// Easing via shared library — uses slider selection
function getEaseFn() { return TipoEase.byIndex(val('easing'), 'inOut'); }

function draw() {
  background(document.getElementById('bgColor').value);
  const txt = document.getElementById('textInput').value || 'TIPÓ';
  const fSize = val('fontSize');
  const sceneLen = val('sceneLen');
  const rep = val('repeat');
  const txtC = document.getElementById('typeColor').value;
  const totalCycle = sceneLen * effects.length * rep;
  const f = frameCount % totalCycle;
  const effectIdx = floor(f / sceneLen) % effects.length;
  const t = getEaseFn()((f % sceneLen) / sceneLen);
  const fx = effects[effectIdx];

  const org = val('organic') * 0.15;
  TipoNoise.update();
  textSize(fSize); textAlign(CENTER, CENTER); noStroke();
  const col = prideMode ? color(prideColors[effectIdx % 6]) : color(txtC);
  fill(col);

  push(); translate(width/2 + (org > 0 ? TipoNoise.jitter(0, org) : 0), height/2 + (org > 0 ? TipoNoise.jitter(500, org) : 0));
  if (fx === 'scale-in') { const s = 0.2 + t * 0.8; scale(s); }
  else if (fx === 'shear') { const sh = sin(t * PI) * 0.5; applyMatrix(1, 0, sh, 1, 0, 0); }
  else if (fx === 'rotate') { rotate(sin(t * PI) * QUARTER_PI); }
  else if (fx === 'split') {
    const off = sin(t * PI) * fSize * 0.5;
    for (let i = 0; i < txt.length; i++) {
      const xp = (i - (txt.length-1)/2) * fSize * 0.6;
      const yp = (i % 2 === 0 ? -off : off);
      text(txt.charAt(i), xp, yp);
    }
    pop(); TipoUI.captureFrame(); return;
  }
  else if (fx === 'slide-up') { translate(0, (1 - sin(t * PI)) * height * 0.4); }
  else if (fx === 'slide-down') { translate(0, -(1 - sin(t * PI)) * height * 0.4); }
  else if (fx === 'fade') { col.setAlpha(sin(t * PI) * 255); fill(col); }
  else if (fx === 'zoom') { const s = 1 + sin(t * PI) * 2; scale(s); }
  text(txt, 0, 0);
  pop();
  TipoUI.captureFrame();
}

function swapColors() { TipoUI.swapColors('typeColor', 'bgColor'); }
function resetAll() { prideMode = false; setVal('fontSize',100);setVal('sceneLen',30);setVal('repeat',1);setVal('easing',2);setVal('organic',0); document.getElementById('typeColor').value='#1A1818';document.getElementById('bgColor').value='#F8F5F0'; }
const PRESETS = {
  rapid: () => { resetAll(); setVal('sceneLen',12);setVal('repeat',3);setVal('easing',5); },
  slow: () => { resetAll(); setVal('sceneLen',90);setVal('fontSize',150);setVal('easing',0); },
  big: () => { resetAll(); setVal('fontSize',250);setVal('sceneLen',40);setVal('easing',7); },
  chaos: () => { resetAll(); setVal('sceneLen',8);setVal('repeat',5);setVal('fontSize',80);setVal('easing',9); document.getElementById('bgColor').value='#1a0033'; },
  pride: () => { prideMode = true; },
};
function applyPreset(name) { TipoUI.applyPreset(name, PRESETS); }
function savePNG() { TipoUI.savePNG(); }
async function toggleRec() { await TipoUI.toggleRec(); }
function showToast(msg) { TipoUI.showToast(msg); }
</script>
</body></html>
